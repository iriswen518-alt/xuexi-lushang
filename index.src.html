<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>學習路上</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230d5b56'/><path d='M14 46 L28 30 L38 40 L52 20' fill='none' stroke='%23c8971b' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='52' cy='20' r='4' fill='%23c8971b'/></svg>">
<style>
  :root {
    --primary: #019ab3;      /* 理財小幫手 brand aqua */
    --primary-deep: #003d91; /* 理財小幫手 brand deep */
    --gold: #c79a00;         /* 展開/重點 you-are-here 金黃（與理財小幫手一致） */
    --gold-soft: #e8c25a;
    --active: #e5f2f5;       /* 選中分頁：水藍淡底（比照理財小幫手選中樣式） */
    --active-text: #003d91;
    --active-icon: #019ab3;
    --bg: #f5f8fa;
    --card: #ffffff;
    --text: #1a2733;
    --muted: #6b7785;
    --border: #e2e8ee;
    --success: #17b5ad;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    height: 100%; display: flex; flex-direction: column;
    font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif;
    background: var(--bg); color: var(--text); letter-spacing: .01em;
    -webkit-font-smoothing: antialiased;
  }
  #page-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  a { color: var(--primary); }

  /* HERO */
  .hero {
    background: linear-gradient(120deg, #003d91 0%, #019ab3 60%, #17b5ad 100%);
    color: #eef4fb; padding: 1.2rem 1.4rem 1.5rem; text-align: center; position: relative; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--gold-soft), var(--gold));
  }
  .hero .road { font-size: 1.9rem; margin-bottom: .2rem; }
  .hero h1 { font-size: clamp(1.6rem, 5vw, 2.3rem); font-weight: 800; letter-spacing: .08em; }
  .hero p { font-size: .9rem; opacity: .9; margin-top: .35rem; }
  .hero .stat { margin-top: .9rem; display: inline-block; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.25); border-radius: 40px; padding: .35rem 1rem; font-size: .85rem; font-weight: 700; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: relative; z-index: 9000; flex-shrink: 0; background: rgba(255,255,255,.97);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--border); box-shadow: 0 -2px 16px rgba(0,31,77,.08);
    display: flex; justify-content: space-around; align-items: stretch;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .bottom-nav button {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    background: none; border: none; padding: 8px 0 9px; cursor: pointer;
    color: var(--muted); font-size: .68rem; font-weight: 700; font-family: inherit; white-space: nowrap;
    -webkit-tap-highlight-color: transparent; transition: color .18s, background .18s;
  }
  .bottom-nav button .ic { font-size: 1.25rem; line-height: 1; }
  .bottom-nav button.active { color: var(--active-text); background: var(--active); }
  .bottom-nav button.active .ic-svg { stroke-width: 2; }
  .bottom-nav button.active .ic { filter: none; }

  .wrap { max-width: 820px; margin: 0 auto; padding: 1.1rem 1rem 5rem; }
  .tab { display: none; }
  .tab.active { display: block; animation: fade .25s; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .subj-head { display: flex; align-items: center; gap: .6rem; margin-bottom: .3rem; }
  .subj-head .em { font-size: 1.8rem; }
  .subj-head h2 { font-size: 1.3rem; color: var(--primary); font-weight: 800; }
  .lead { color: var(--muted); font-size: .9rem; line-height: 1.6; margin-bottom: 1rem; }

  /* 專業精進計畫區塊 */
  .plan-block { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 1rem 1.1rem 1.1rem; margin-bottom: 1.2rem; box-shadow: 0 2px 12px rgba(0,31,77,.05); }
  .plan-block .pb-note { color: var(--active-text); border-left: 3px solid var(--primary); padding: .1rem .85rem; font-size: .84rem; line-height: 1.6; margin-bottom: 1rem; }
  .plan-block .pb-title { font-size: 1rem; font-weight: 800; color: var(--primary); margin-bottom: .8rem; padding-bottom: .5rem; border-bottom: 2px solid var(--gold-soft); }
  .plan-block .pb-pillar { padding: .7rem 0; border-bottom: 1px dashed var(--border); }
  .plan-block .pb-pillar:last-of-type { border-bottom: none; }
  .plan-block .pb-h { display: flex; align-items: center; gap: .5rem; font-weight: 800; color: var(--primary); font-size: .95rem; }
  .plan-block .pb-num { flex-shrink: 0; width: 1.5rem; height: 1.5rem; display: inline-flex; align-items: center; justify-content: center; color: var(--gold); font-size: .8rem; }
  .plan-block .pb-d { color: var(--muted); font-size: .85rem; line-height: 1.6; margin: .35rem 0 .5rem 2rem; }
  .plan-block .pb-goal { display: inline-block; margin-left: 2rem; color: var(--active-text); border-left: 3px solid var(--gold); padding: .1rem .7rem; font-size: .78rem; font-weight: 700; }
  .plan-block .pb-foot { margin-top: 1rem; padding-top: .8rem; border-top: 2px solid var(--gold-soft); font-size: .85rem; font-weight: 700; color: var(--primary); line-height: 1.6; }

  .mode-btns { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; margin-bottom: 1.1rem; }
  .mode-btn {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 1rem .8rem;
    text-align: center; cursor: pointer; font-family: inherit; transition: .15s;
  }
  .mode-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
  .mode-btn .mi { font-size: 1.6rem; }
  .ic-svg { width: 1em; height: 1em; display: inline-block; vertical-align: -0.14em; }
  .bottom-nav .ic .ic-svg { width: 22px; height: 22px; }
  .mode-btn .mi .ic-svg { width: 30px; height: 30px; color: var(--gold); }
  .subj-head .em .ic-svg { width: 30px; height: 30px; color: var(--primary); }
  .e-btn .ic-svg, .e-prompt .ic-svg, .prog-card .pt .ic-svg { width: 1.05em; height: 1.05em; }
  .mode-btn .mt { font-weight: 800; color: var(--primary); margin-top: .3rem; font-size: 1rem; }
  .mode-btn .ms { font-size: .76rem; color: var(--muted); margin-top: .2rem; }

  /* QUIZ */
  .q-start { text-align: center; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem 1.1rem; }
  .q-start h3 { color: var(--primary); margin: .4rem 0; }
  .q-start p { color: var(--muted); font-size: .9rem; margin-bottom: 1rem; }
  .btn { display: inline-block; background: linear-gradient(135deg, #019ab3, #003d91); color: #fff; font-weight: 800; font-size: 1rem; font-family: inherit; border: none; border-radius: 40px; padding: .72rem 1.7rem; cursor: pointer; box-shadow: 0 4px 12px rgba(0,31,77,.3); }
  .btn:hover { transform: translateY(-2px); transition: .15s; }
  .btn-ghost { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); box-shadow: none; }
  .btn-gold { background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color: #4a3708; box-shadow: 0 4px 12px rgba(200,151,27,.35); }

  .q-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: .8rem; font-weight: 700; color: var(--primary); font-size: .88rem; }
  .q-prog { flex: 1; height: 9px; background: #e2e8ee; border-radius: 20px; margin: 0 .7rem; overflow: hidden; }
  .q-prog > div { height: 100%; background: linear-gradient(90deg, var(--gold-soft), var(--gold)); transition: width .3s; }
  .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.2rem 1.1rem; }
  .q-tag { font-size: .72rem; font-weight: 700; color: var(--primary); background: #e5f2f5; display: inline-block; padding: .12rem .6rem; border-radius: 20px; margin-bottom: .6rem; }
  .q-text { font-size: 1.08rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.55; }
  .spk-btn { display: inline-flex; align-items: center; gap: .3rem; background: #fff; border: 1.5px solid var(--primary); color: var(--primary); border-radius: 30px; padding: .34rem .8rem; font-weight: 800; font-size: .82rem; font-family: inherit; cursor: pointer; margin-bottom: 1rem; }
  .spk-btn .ic-svg { width: 1.05em; height: 1.05em; }
  .spk-btn.playing { background: #e5f2f5; }
  .opt { display: block; width: 100%; text-align: left; font-family: inherit; background: #f5f8fa; border: 1.5px solid var(--border); border-radius: 12px; padding: .75rem .9rem; margin-bottom: .55rem; font-size: .98rem; font-weight: 600; color: var(--text); cursor: pointer; transition: .12s; }
  .opt:hover:not(:disabled) { border-color: var(--primary); }
  .opt.correct { background: #e5f2f5; border-color: var(--success); color: #17b5ad; }
  .opt.wrong { background: #fde8e8; border-color: #e88; color: #b45; }
  .q-fb { margin-top: .8rem; font-weight: 800; text-align: center; font-size: 1rem; }
  .q-fb.ok { color: var(--success); }
  .q-fb.no { color: #d67; }
  .q-exp { margin-top: .7rem; padding: .7rem .85rem; border-radius: 12px; background: #fbf4dd; border: 1px dashed var(--gold); color: #6b5210; font-weight: 600; font-size: .9rem; line-height: 1.6; text-align: left; }
  .q-next { display: block; width: 100%; margin-top: .9rem; }
  .q-result { text-align: center; background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.7rem 1.1rem; }
  .q-result .big { font-size: 2.6rem; }
  .q-result h3 { color: var(--primary); margin: .4rem 0; }
  .q-result .sc { font-weight: 700; margin-bottom: 1.1rem; }

  /* ESSAY */
  .essay-list .e-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: .9rem 1rem; margin-bottom: .6rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: .6rem; }
  .essay-list .e-item:hover { border-color: var(--primary); }
  .essay-list .e-q { font-weight: 700; line-height: 1.5; }
  .essay-list .go { color: var(--gold); font-weight: 800; flex: none; }
  .essay-panel .e-prompt { border-left: 3px solid var(--primary); padding: .1rem 1rem; font-weight: 700; color: var(--primary); line-height: 1.6; margin-bottom: .3rem; }
  .essay-panel .e-guide { font-size: .82rem; color: var(--muted); margin: .3rem 0 .8rem; line-height: 1.6; }
  .essay-tools { display: flex; gap: .5rem; margin-bottom: .5rem; }
  .e-btn { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); border-radius: 30px; padding: .42rem .95rem; font-weight: 800; font-size: .86rem; font-family: inherit; cursor: pointer; }
  .e-btn.rec { background: #ffe0e0; border-color: #e88; color: #c44; }
  .essay-input { width: 100%; min-height: 170px; border: 1.5px solid var(--border); border-radius: 14px; padding: .85rem; font-size: 1rem; font-family: inherit; line-height: 1.8; outline: none; resize: vertical; background: #fff; color: var(--text); }
  .essay-input:focus { border-color: var(--primary); }
  .essay-fb { margin-top: .9rem; background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--gold); border-radius: 14px; padding: 1rem 1.1rem; line-height: 1.85; white-space: pre-wrap; }
  .essay-fb h4 { color: var(--primary); margin: .6rem 0 .2rem; font-size: 1rem; }
  .back-link { color: var(--muted); font-size: .85rem; font-weight: 700; cursor: pointer; display: inline-block; margin-bottom: .7rem; }

  /* PROGRESS */
  .prog-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1rem 1.1rem; margin-bottom: .8rem; }
  .prog-card .pt { font-weight: 800; color: var(--primary); display: flex; justify-content: space-between; }
  .prog-bar { height: 12px; background: #e2e8ee; border-radius: 20px; overflow: hidden; margin-top: .5rem; }
  .prog-bar > div { height: 100%; background: linear-gradient(90deg, var(--gold-soft), var(--gold)); }
  .prog-sub { font-size: .8rem; color: var(--muted); margin-top: .35rem; }
  .note { background: #eef4fb; border: 1px solid var(--border); border-radius: 12px; padding: .75rem .95rem; font-size: .86rem; color: #33475b; line-height: 1.6; margin-top: 1rem; }
  footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 1.4rem 1rem 1rem; }
  /* ===== 路上聊聊 FAB ===== */
  .lu-fab {
    position: fixed; right: 16px; bottom: 96px; z-index: 9500;
    display: flex; align-items: center; gap: .45rem;
    background: linear-gradient(135deg, var(--primary) 0%, #019ab3 55%, #17b5ad 100%);
    color: #fff; font-weight: 800; font-size: .88rem; font-family: inherit;
    padding: .5rem 1rem .5rem .5rem; border-radius: 40px; cursor: pointer;
    box-shadow: 0 8px 22px rgba(0,31,77,.42); border: 2px solid rgba(255,255,255,.75);
  }
  .lu-fab:hover { transform: translateY(-2px); transition: .15s; }
  .lu-fab .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #eef4fb);
    display: flex; align-items: center; justify-content: center; font-size: 1.05rem; border: 2px solid #fff;
  }
  /* ===== 路上聊聊 彈窗 ===== */
  .lu-pop {
    position: fixed; right: 16px; bottom: 126px; z-index: 9600; width: min(360px, calc(100vw - 32px));
    height: min(70vh, 520px); background: var(--card); border-radius: 18px; overflow: hidden;
    box-shadow: 0 12px 34px rgba(0,31,77,.34); border: 2px solid rgba(255,255,255,.8);
    display: none; flex-direction: column;
  }
  .lu-pop.show { display: flex; }
  .lp-head { background: linear-gradient(135deg, var(--primary), #17b5ad); color: #eef4fb; padding: .7rem .85rem; display: flex; align-items: center; gap: .5rem; }
  .lp-head .avatar { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff, #eef4fb); display: flex; align-items: center; justify-content: center; font-size: 1rem; border: 2px solid #fff; }
  .lp-head .who { flex: 1; font-weight: 800; font-size: .92rem; }
  .lp-head .who small { display: block; font-weight: 600; font-size: .68rem; opacity: .85; }
  .lp-head .x { background: rgba(255,255,255,.28); border: none; color: #fff; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 1rem; font-weight: 700; }
  .lp-msgs { flex: 1; overflow-y: auto; padding: .8rem .7rem; display: flex; flex-direction: column; gap: .6rem; background: #f5f8fa; }
  .lp-row { display: flex; flex-direction: column; }
  .lp-row.me { align-items: flex-end; }
  .lp-row.ai { align-items: flex-start; }
  .lp-bubble { max-width: 82%; padding: .55rem .8rem; border-radius: 15px; font-size: .9rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .lp-bubble.me { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .lp-bubble.ai { background: #fff; border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
  .lp-typing { background: #fff; border: 1px solid var(--border); border-radius: 15px; border-bottom-left-radius: 4px; padding: .55rem .75rem; width: fit-content; display: flex; gap: 4px; }
  .lp-typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: lpb 1.2s infinite; }
  .lp-typing span:nth-child(2) { animation-delay: .2s; }
  .lp-typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes lpb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .lp-in { display: flex; gap: .4rem; padding: .55rem; border-top: 1px solid var(--border); background: #fff; }
  .lp-in input { flex: 1; border: 1.5px solid var(--border); border-radius: 20px; padding: .5rem .8rem; font-size: .9rem; font-family: inherit; outline: none; }
  .lp-in input:focus { border-color: var(--primary); }
  .lp-in button { background: linear-gradient(135deg, var(--primary), #17b5ad); color: #fff; border: none; border-radius: 20px; padding: .5rem .9rem; font-weight: 800; font-size: .85rem; cursor: pointer; font-family: inherit; }
  .lp-in button:disabled { opacity: .5; cursor: not-allowed; }
  .lp-in button.lp-mic { background: #eef4fb; border: 1.5px solid var(--primary); color: var(--primary); border-radius: 50%; width: 40px; padding: 0; flex: none; font-size: 1.05rem; }
  .lp-in button.lp-mic.rec { background: #ffe0e0; border-color: #e88; color: #c44; }
</style>
</head>
<body>
<div id="page-scroll">
  <div class="hero">
    <h1>學習路上</h1>
    <p>市場 · 傳承 · 英文　把想學的變成考題，考自己一遍</p>
    <div class="stat" id="heroStat">今天也在學習路上</div>
  </div>

  <div class="wrap">
    <section class="tab active" id="market"></section>
    <section class="tab" id="succession"></section>
    <section class="tab" id="english"></section>
    <section class="tab" id="family_trust"></section>
    <section class="tab" id="cfp"></section>
    <section class="tab" id="workforce"></section>
    <section class="tab" id="progress">
      <div class="subj-head"><span class="em"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="21" x2="21" y2="21"/><rect x="5" y="13" width="3.4" height="6" rx="1"/><rect x="10.3" y="8" width="3.4" height="11" rx="1"/><rect x="15.6" y="10.5" width="3.4" height="8.5" rx="1"/></svg></span><h2>我的進度</h2></div>
      <p class="lead">答對的選擇題會「學會」、之後不再出現；每週還會自動加新的驗證過的題目。</p>
      <div id="prog-list"></div>
      <div class="note">提示：所有選擇題答案都經過查證（傳承走財政部公告與法條、市場與英文查權威來源），每週自動新增的題目也會先上網查證答案才加入，不會給你錯的答案。</div>
    </section>
    <section class="tab" id="experts">
      <div class="subj-head"><span class="em"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span><h2>專家資源庫</h2></div>
      <p class="lead">探索認可專家的精選分析與觀點，深化你在市場、財務與投資領域的理解。</p>
      <div id="experts-list"></div>
    </section>
    <footer>學習路上 · 市場 × 傳承 × 英文 · 建置 2026/07/01</footer>
  </div>
</div>

<nav class="bottom-nav" id="nav">
  <button class="active" data-tab="market"><span class="ic"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 16 9 10 13 14 21 6"/><polyline points="15 6 21 6 21 12"/></svg></span>市場分析</button>
  <button data-tab="succession"><span class="ic"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M12 3l8 4H4z"/><path d="M6 10v7"/><path d="M10 10v7"/><path d="M14 10v7"/><path d="M18 10v7"/></svg></span>財富傳承</button>
  <button data-tab="english"><span class="ic"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h8"/><path d="M8 3v2"/><path d="M10.5 5c0 4-3 7-7.5 8.5"/><path d="M5 9.5c0 2 3.2 4 6.5 4"/><path d="M12.5 21l4-9 4 9"/><path d="M14 18h5"/></svg></span>商用英文</button>

  english: { name: '商用英文', em: svgIc('english'), intro: '職場與金融常用的英文字彙與表達。目標：能自在地用英文溝通與寫作。',
    choice: [
      { q: '會計上的 "accrual basis"（權責發生制）指的是？', options: ['收入費用於現金實際收付時認列', '收入費用於「發生」時即認列，不論現金是否收付', '只記錄現金交易', '年底才一次入帳'], ans: 1, exp: 'accrual basis：收入／費用在「發生（賺得或耗用）」時認列，與現金收付時點無關；cash basis（現金基礎）才是收到／付出現金才記。' },
      { q: '併購或投資前進行的 "due diligence" 是指？', options: ['盡職調查／審慎查核', '盡快付款', '正當防衛', '到期日'], ans: 0, exp: 'due diligence＝盡職調查，交易前對標的財務、法律、營運等進行的審慎查核，以評估風險與價值。' },
      { q: '財務上的 "liquidity"（流動性）主要指？', options: ['公司獲利能力', '資產能迅速變現且不損失價值的程度', '負債總額', '股價波動'], ans: 1, exp: 'liquidity＝流動性／變現能力，資產能否快速以合理價格換成現金；現金流動性最高，不動產較低。' },
      { q: '投資中的 "hedge" 是指？', options: ['提高槓桿', '避險（用工具抵銷部位風險）', '分紅', '停損'], ans: 1, exp: 'hedge＝避險，透過期貨、選擇權、遠期等工具建立反向部位，降低價格／匯率／利率變動的風險。' },
      { q: '"amortization" 一詞在財務上通常指？', options: ['資產增值', '（無形資產或貸款本金的）攤銷／分期償還', '股利發放', '存貨盤點'], ans: 1, exp: 'amortization＝攤銷：將無形資產成本按年限分攤，或貸款本息按期攤還；有形資產的分攤則稱 depreciation（折舊）。' },
      { q: '借款時提供的 "collateral" 是指？', options: ['利息', '擔保品／抵押品', '手續費', '保證人'], ans: 1, exp: 'collateral＝擔保品／抵押品，借款人提供給貸方以保障債權；違約時貸方可處分該擔保品。' },
      { q: '"The bond offers a yield of 4%." 這裡的 "yield" 指？', options: ['票面金額', '收益率／殖利率', '到期日', '信用評等'], ans: 1, exp: 'yield＝收益率／殖利率，投資（尤其債券）相對於價格的年化報酬；與價格呈反向關係。' },
      { q: '"volatility" 在投資語境中指？', options: ['成交量', '價格波動的幅度（風險）', '股利率', '本益比'], ans: 1, exp: 'volatility＝波動性／波動率，衡量價格變動的劇烈程度，常以標準差表示，是風險的重要指標（如 VIX）。' },
    ],
    essay: [
      { q: 'Write a short email (3–5 sentences) to a client to reschedule a meeting from Monday to Wednesday. 請用英文寫。', guide: '評分重點：email 結構（問候、說明、致歉、提出新時間、結尾）、禮貌用語、文法與拼字。' },
      { q: 'In English, briefly introduce yourself and your job responsibilities (about 4–6 sentences). 請用英文自我介紹並說明工作內容。', guide: '評分重點：句型多樣、時態正確、內容清楚（職稱、職責、專長），用詞得體。' },
    ] },
  family_trust: { name: '家族信託', em: svgIc('family_trust'), intro: '家族信託規劃顧問師歷屆考古題（金融研訓院官方公告答案）。涵蓋信託法、遺產贈與稅、境外信託、CFC、保險傳承、家族治理等。',
    choice: [{"q": "預立遺囑是重要的財富傳承方式之一，下列相關敘述何者錯誤？", "options": ["立遺囑人雖可透過遺囑自由分配遺產，但仍須注意民法特留分限制", "遺囑囑咐之遺產分配若侵害法定繼承人之特留分，則該遺囑即無效", "法定繼承人只要沒有拋棄繼承或發生喪失繼承權情事，即具有繼承權", "某繼承人之特留分被侵害，其經過特定的法定程序後將可取得並行使「扣減權」"], "ans": 1, "exp": "正解為選項2。遺囑若侵害法定繼承人之特留分，並非當然無效，而是受侵害之繼承人得就侵害部分行使「扣減權」，遺囑其餘部分仍然有效，故選項2敘述「該遺囑即無效」錯誤。選項1立遺囑人受特留分限制、選項3未拋棄繼承或喪失繼承權者具繼承權、選項4特留分受侵害者依法可行使扣減權，均屬正確。"}, {"q": "下列何者不是民法現行規定「結婚」之法定要件？", "options": ["要有公開的儀式", "應以書面為之", "要有二人以上證人簽名", "雙方當事人要至戶政事務所辦理結婚登記"], "ans": 0, "exp": "正解為選項1。我國民法結婚已改採登記婚，現行法定要件為：以書面為之、有二人以上證人簽名、並向戶政事務所辦理結婚登記；「公開儀式」已非現行結婚之法定要件，故選項1不是法定要件。選項2、3、4均為現行結婚之法定要件。"}, {"q": "有關繼承人陳報遺產清冊，下列敘述何者正確？", "options": ["繼承人須於知悉其得繼承之時起六個月內為之", "繼承人有數人時，須全體共同陳報", "繼承人不得聲請延展陳報期間", "債權人得向法院聲請命繼承人提出遺產清冊"], "ans": 3, "exp": "正解為選項4。依民法規定，債權人得向法院聲請命繼承人於一定期限內提出遺產清冊，故選項4正確。選項1陳報期間為知悉得繼承時起三個月內（非六個月），選項2繼承人有數人時其中一人陳報即生效力（無須全體共同），選項3繼承人得向法院聲請延展陳報期間，均屬錯誤。"}, {"q": "依民法規定，男女未滿幾歲者，不得結婚？", "options": ["16 歲", "17 歲", "18 歲", "20 歲"], "ans": 2, "exp": "正解為選項3。民法已將男女最低結婚年齡統一修正為滿18歲，男女未滿18歲者不得結婚，故選18歲。16歲、17歲、20歲均非現行法定之最低結婚年齡。"}, {"q": "依民法有關「特留分」規定，下列何者錯誤？", "options": ["父母之特留分，為其應繼分三分之一", "配偶之特留分，為其應繼分二分之一", "兄弟姊妹之特留分，為其應繼分三分之一", "祖父母之特留分，為其應繼分三分之一"], "ans": 0, "exp": "正解為選項1。依民法第1223條，直系血親卑親屬、父母、配偶之特留分均為其應繼分二分之一；兄弟姊妹及祖父母之特留分為其應繼分三分之一。故父母特留分應為應繼分二分之一，選項1誤植為三分之一，敘述錯誤。選項2配偶二分之一、選項3兄弟姊妹三分之一、選項4祖父母三分之一均正確。"}, {"q": "甲男、乙女結婚多年，就在乙女懷胎4 個月時，甲男車禍亡故。甲男之父丙因悲哀過度亦 隨即病歿。丙之配偶已死亡，其子女除甲男外，尚有甲男之姐丁。丙留有財產土地一筆，丁 主張應由其單獨繼承丙之土地，有無理由？", "options": ["有理由。因甲男已死亡，應由丁繼承", "有理由。因丙死亡時，乙女腹中胎兒尚不具有權利能力", "無理由。因乙女之胎兒未出生前，應由乙女繼承", "無理由。因乙女之胎兒有代位繼承權"], "ans": 3, "exp": "正解為選項4。甲男死亡時其妻乙懷胎4個月，依民法胎兒視為既已出生而有代位繼承權，丙死亡時其遺產應由甲男之代位繼承人（乙女腹中胎兒）與丁共同繼承，故丁主張單獨繼承無理由，選項4正確。選項1甲男之應繼分由丁獨得、選項2胎兒不具權利能力、選項3由乙女本人繼承（乙女為甲男配偶非丙之繼承人），均屬錯誤。"}, {"q": "有關王董事長擔心有一天大乙或小乙太早離世，會導致其資產會由丁君繼承，針對這樣的 擔心，下列敘述何者正確？", "options": ["如果乙君離世，則丁君對乙君的遺產有應繼分", "如果大乙先離世，有配偶及有子嗣，則丁君對大乙的遺產無應繼分", "如果大乙先離世，無配偶、無子嗣，但小乙還存活，則丁君對大乙的遺產無應繼分", "如果大乙無配偶及無子嗣，並在遺囑中約定遺產全由乙君繼承，則丁君無法主張特留分， 可以解決王董事長的擔心"], "ans": 1, "exp": "正解為選項2。依民法繼承順位，子女有直系血親卑親屬（子嗣）時，前配偶丁君（已與乙君離婚）對大乙之遺產並無應繼分；大乙之遺產由其配偶及子嗣繼承，故選項2正確。選項1丁君已與乙君離婚對乙君遺產無應繼分、選項3大乙無配偶無子嗣時其遺產由父母乙君等繼承（不及於丁君，敘述方向雖近但比較下選項2最正確）、選項4以遺囑全給乙君仍受丁君以外繼承人特留分限制且無法完全排除疑慮，均不如選項2精確。"}, {"q": "因名人新聞案件，近來許多律師等專業人士建議民眾規劃遺囑信託，就設立遺囑相關敘述， 下列何者錯誤？", "options": ["年滿16 歲者可設立遺囑，但須法定代理人同意", "代筆遺囑應由遺囑人指定三人以上之見證人", "自書遺囑應自書遺囑全文，記明年、月、日，並親自簽名", "公證遺囑應指定二人以上之見證人，在公證人前口述遺囑旨意"], "ans": 0, "exp": "正解為選項1。民法規定無行為能力人不得為遺囑，限制行為能力人（滿16歲）得自行立遺囑，且不須經法定代理人允許，故選項1「須法定代理人同意」錯誤。代筆遺囑須三人以上見證人（選項2對）、自書遺囑須自書全文、記明年月日並親自簽名（選項3對）、公證遺囑須二人以上見證人在公證人前口述意旨（選項4對），均符合民法各式遺囑要件。"}, {"q": "依民法第1148 條第2 項規定：繼承人對被繼承人之債務，應負何種清償責任？", "options": ["以自己財產為限，負清償責任", "所有繼承人應負連帶無限清償責任", "以因繼承所得遺產為限，負清償責任", "僅繼承遺產，毋須負擔被繼承人債務清償責任"], "ans": 2, "exp": "正解為選項3。依民法第1148條第2項規定，繼承人對於被繼承人之債務，以「因繼承所得遺產為限」負清償責任，即現行全面限定繼承原則。故並非以自己全部財產負無限責任（選項1、2錯），繼承人仍須在所得遺產範圍內負清償責任，並非完全免責（選項4錯）。"}, {"q": "依民法規定，收養應於何時開始生效？", "options": ["法院認可裁定確定時", "法院認可裁定確定後，溯及於收養契約成立時", "向戶政機關為收養之登記時", "收養當事人共同生活時"], "ans": 1, "exp": "正解為選項2。依民法收養規定，收養須經法院認可，認可裁定確定後其效力「溯及於收養契約成立時」發生，故選項2正確。並非單純於裁定確定時生效而不溯及（選項1錯）、收養生效不以戶政登記為要件（選項3錯）、亦不以共同生活時為準（選項4錯）。"}, {"q": "民法規定之密封遺囑，應於遺囑上簽名後，將其密封，於封縫處簽名，指定幾人以上之見證 人，向公證人提出，陳述其為自己之遺囑？", "options": ["1 人", "2 人", "3 人", "4 人"], "ans": 1, "exp": "正解為選項2。依民法密封遺囑之規定，遺囑人應於遺囑上簽名後密封，於封縫處簽名，並指定「二人以上」之見證人，向公證人提出陳述其為自己之遺囑，故見證人數為2人。"}, {"q": "依民法規定，負扶養義務者有下列數人時，其履行義務的先後順序為何？ A.直系血親卑 親屬 B.家長 C.家屬 D.夫妻之父母E.兄弟姊妹", "options": ["ABCDE", "AEBCD", "ABECD", "ADBCE"], "ans": 2, "exp": "正解為選項3，順序為A直系血親卑親屬、E兄弟姊妹、B家長、C家屬、D夫妻之父母。依民法第1131條扶養義務人之先後順序：直系血親卑親屬最先，其次兄弟姊妹，再次家長、家屬，最後為子婦女婿（夫妻之父母列於後位），故正確排列為ABECD。"}, {"q": "丙先生工作多年且投資有成，累積不少積蓄，想要透過遺囑信託方式預先規劃安排其身後 2 名小孩財產分配，下列敘述何者正確？", "options": ["簽訂遺囑信託時需同時移轉指定之金錢或財產", "可於遺囑記載禁止財產分割之年限最長為10 年", "遺囑信託屬於契約行為，須由委託人、受益人及受託人共同辦理簽約", "丙先生得於不違反應繼分規定之範圍內，以遺囑自由決定遺產分配方式"], "ans": 1, "exp": "正解為選項2。依民法規定，遺囑人得以遺囑禁止遺產分割，但其禁止之效力以「十年」為限，故選項2正確。遺囑信託於委託人死亡、遺囑生效時始發生信託效力，立遺囑時毋庸同時移轉財產（選項1錯）；遺囑信託係依遺囑單方行為成立，非須三方共同簽約之契約行為（選項3錯）；遺囑分配遺產不得違反「特留分」規定，並非僅以應繼分為限（選項4敘述不正確）。"}, {"q": "甲擁有高達新臺幣（以下同）10 億元之財富，為特別照顧其恩人乙之身心障礙子女丙，乃 與A 銀行預先簽訂遺囑信託約定書，約定俟甲死亡時將一棟價值1 億元之不動產成立遺囑 信託，交由A 銀行管理，丙為受益人。若甲所成立之公證遺囑中果然記明上開遺囑信託之 相關事項，並指定丁律師為遺囑執行人，但甲之繼承人戊及己消極不配合辦理該不動產之 信託登記，有關該遺囑信託之敘述，下列何者正確？", "options": ["因丙非甲之繼承人，故該遺囑信託無效", "因甲之遺囑為公證遺囑，故可由A 銀行持該公證遺囑自行辦理信託登記", "因遺囑另指定遺囑執行人時，應於辦畢遺囑執行人及繼承登記後，由丁律師會同A 銀行 申請之", "因信託登記應由繼承人辦理繼承登記後，會同受託人申請之，在繼承人戊及己消極不配 合情況下，無法辦理信託登記"], "ans": 2, "exp": "正解為選項3。遺囑另指定遺囑執行人時，遺產之管理及遺囑之執行由遺囑執行人為之，繼承人不得妨礙，故應於辦畢遺囑執行人及繼承登記後，由遺囑執行人丁律師會同受託人A銀行申請信託登記，選項3正確。受益人不以繼承人為限（選項1錯）；A銀行不得逕持公證遺囑自行登記（選項2錯）；既有遺囑執行人，縱繼承人消極不配合仍得由執行人推動，並非無法辦理（選項4錯）。"}, {"q": "被繼承人甲於生前立下遺囑。而下列敘述何者正確？", "options": ["甲所立遺囑於完成法定方式時發生效力", "甲得以遺囑禁止遺產之分割，但其禁止之效力以5 年為限", "甲遺囑中之受遺贈人於遺囑生效前死亡者，其遺贈不生效力", "甲遺囑中之受遺贈人拋棄遺贈者，自為拋棄之意思表示時發生效力"], "ans": 2, "exp": "正解為選項3。依民法規定，受遺贈人於遺囑發生效力前（即遺囑人死亡前）死亡者，其遺贈不生效力，故選項3正確。遺囑於「遺囑人死亡時」始生效力，而非完成法定方式時（選項1錯）；以遺囑禁止遺產分割之效力以「十年」為限而非五年（選項2錯）；受遺贈人拋棄遺贈之效力「溯及遺囑人死亡時」發生，而非自為意思表示時（選項4錯）。"}, {"q": "張董除持有家族上市公司股票外，尚有金融資產、商用不動產數筆，他也想隔代留給孫子， 就未列入家族信託的資產，以及仍為自益信託的資產等未盡事宜，以下列何種信託作為補 強措施？", "options": ["遺囑信託", "不動產信託", "子孫保障信託", "公益信託"], "ans": 0, "exp": "正解為選項1。就未列入家族信託之資產，以及仍為自益信託之資產等未盡事宜，欲於身故後妥適安排並隔代傳承，最適合以「遺囑信託」作為補強措施，使被繼承人得以遺囑就剩餘財產一併納入信託管理分配，達到全面傳承之效果。"}, {"q": "繼承人有數人時，在分割遺產前，各繼承人對於遺產全部為何種關係？", "options": ["分別共有", "共同持有", "公同共有", "區分所有"], "ans": 2, "exp": "繼承人有數人時，於遺產分割前，全體繼承人對遺產全部係依民法成立「公同共有」關係，各繼承人無應有部分、須全體同意始得處分，故選項3正確。分別共有有應有部分、區分所有為建物專有共有概念、共同持有非法律用語，均不符。"}, {"q": "下列何者非我國民法對於「非婚生子女」可轉為「婚生子女」的法律程序？", "options": ["認領", "準正", "收養", "提起強制認領訴訟"], "ans": 2, "exp": "本題為反向題，問何者「非」轉換途徑。非婚生子女轉為婚生子女的法定途徑為：生父認領、因生父母結婚而準正、以及經強制認領訴訟確認。收養係建立擬制親子關係（與生父母關係消滅），並非將非婚生子女轉為「生父之婚生子女」，故選項3為正解。"}, {"q": "妻以夫重婚為由，請求法院判決離婚，有關判決離婚之規定，下列敘述何者錯誤？", "options": ["妻若受有損害，得向夫請求賠償", "妻因判決離婚而陷於生活困難者，夫應給與贍養費", "離婚經法院調解成立者，婚姻關係消滅", "若妻知悉夫重婚之情事已逾六個月，但未逾二年者，仍得請求離婚"], "ans": 3, "exp": "本題為反向題。以重婚等事由請求裁判離婚有除斥期間限制：須自知悉後一定期間內為之（逾期不得請求）。選項4稱知悉已逾六個月、未逾二年「仍得請求」，與請求權應於知悉後六個月內行使之限制不符，故選項4錯誤。其餘正確：受害得請求損害賠償、生活困難得請求贍養費、經法院調解離婚成立婚姻關係消滅。"}, {"q": "辦理遺囑信託時，委託人須設立合法有效的遺囑，依我國民法規定，委託人為遺囑須年滿 幾歲？", "options": ["15", "16", "17", "18"], "ans": 1, "exp": "依民法規定，無行為能力人不得為遺囑，限制行為能力人（滿16歲）得不經法定代理人允許自為遺囑，故立遺囑能力之年齡門檻為滿16歲，選項2正確。15歲未達門檻；17、18歲則高於法定門檻。"}, {"q": "我國民法有關遺囑的成立要件，下列何者需指定三人以上的見證人？", "options": ["公證遺囑", "密封遺囑", "代筆遺囑", "口授遺囑"], "ans": 2, "exp": "依民法遺囑方式之見證人人數要求，代筆遺囑須指定「三人以上」之見證人（由其中一人筆記、宣讀、講解後全體簽名），故選項3正確。公證遺囑、密封遺囑、口授遺囑均為二人以上見證人，人數要求不同。"}, {"q": "民法有關成年人「意定監護」之規定，下列敘述何者錯誤？", "options": ["意定監護契約之受任人得為一人或數人", "意定監護契約應由公證人作成公證書", "公證人就意定監護契約作成公證書後七日內，應以書面通知本人住所地之法院", "意定監護契約於公證人作成公證書時發生效力"], "ans": 3, "exp": "本題為反向題。成年人意定監護契約須由公證人作成公證書，但其「於本人受監護宣告時始發生效力」，而非於公證書作成時即生效，故選項4錯誤。受任人得為一人或數人、應由公證人作成公證書、公證後七日內以書面通知本人住所地法院，均屬正確規定。"}, {"q": "陳老太太由於年事已高，希望把價值兩千萬的祖厝指定由長孫甲繼承，由於陳婦不識字，於 是到某律師事務所辦理預立遺囑，由值班李姓律師代筆，並由陳婦、代筆律師與另兩位見證 律師在遺囑上蓋章，陳婦不幸於次日發生交通事故意外身故，請問此份遺囑有無效力？", "options": ["有效", "無效", "效力未定", "得撤銷"], "ans": 1, "exp": "代筆遺囑依民法規定須由遺囑人指定三人以上之見證人，由其中一人筆記、宣讀、講解，經遺囑人認可後，由遺囑人及全體見證人簽名。本題僅由代筆律師與另兩位見證律師共三人，扣除擔任代筆（筆記）者，見證人不足三人，欠缺法定要件，遺囑無效，故選項2正確。代筆遺囑要件不備為自始無效，非效力未定或得撤銷。"}, {"q": "下列何種夫妻財產制，依我國法律規定，在婚姻關係解除或消滅時，有利於婚姻中經濟弱勢 的一方？", "options": ["法定財產制", "分別財產制", "共同財產制", "聯合財產制"], "ans": 0, "exp": "我國民法之法定財產制，於婚姻關係消滅時設有剩餘財產差額分配請求權，使婚姻中未累積財產（多為經濟弱勢）之一方得請求他方婚後財產差額之半數，對弱勢方最為有利，故選項1正確。分別財產制各保有各自財產、無差額分配；共同財產制與已廢止之聯合財產制均無同等保障弱勢方之設計，故錯誤。"}, {"q": "下列何者不是我國民法所稱之「姻親」？", "options": ["血親之配偶", "配偶之血親", "配偶之血親之配偶", "血親之配偶之血親"], "ans": 3, "exp": "民法姻親之種類有三：血親之配偶、配偶之血親、配偶之血親之配偶（選項1、2、3）。「血親之配偶之血親」並不在民法所定姻親範圍內，故選項4並非姻親，為正解。"}, {"q": "民法有關「收養」之規定，下列敘述何者錯誤？", "options": ["旁系血親在六親等以內且輩分不相當者，不得收養為養子女", "養父母死亡後，養子女不得聲請法院許可終止收養", "養子女與養父母間之關係，除法律另有規定外，與婚生子女同", "養子女從收養者之姓或維持原來之姓"], "ans": 1, "exp": "本題問何者錯誤。依民法規定，養父母死亡後，養子女仍「得」聲請法院許可終止收養，故選項2稱「不得」係錯誤。旁系血親六親等內輩分不相當者不得收養（選項1）、養子女與養父母關係除法律另有規定外與婚生子女同（選項3）、養子女得從收養者姓或維持原姓（選項4），均為正確規定。"}, {"q": "依民法第1113-3 條規定，意定監護契約之訂立或變更，應由公證人作成公證書始為成立。 公證人於作成公證書後之幾日內，應以書面通知本人住所地之法院？", "options": ["3 日", "5 日", "7 日", "10 日"], "ans": 2, "exp": "依民法第1113條之3規定，意定監護契約之訂立或變更應經公證人作成公證書始為成立，公證人於作成公證書後「七日內」應以書面通知本人住所地之法院，故選項3「7日」正確，其餘日數均非法定期間。"}, {"q": "A 先生家庭成員有配偶B 及3 名子女C、D、E，其中子女C 已有2 名兒子F、G，有關民 法繼承權歸屬問題，下列敘述何者錯誤？", "options": ["當A 死亡時，配偶B 拋棄繼承時，由直系血親卑親屬C、D、E 共同繼承，應繼分各為 1/3", "當A 死亡時，其中C 比A 更早離世，繼承人為B、D、E、F、G 共同繼承，應繼分各為 1/5", "當A 死亡時，其中配偶B 及C 拋棄繼承，繼承人為D、E 共同繼承，應繼分各為1/2", "當A 死亡時，其中配偶B 及3 位子女C、D、E 拋棄繼承，繼承人為F、G 共同繼承，應 繼分為各1/2"], "ans": 1, "exp": "本題問何者錯誤。C較A早離世時，由C之直系血親卑親屬F、G代位繼承C之應繼分。繼承人為配偶B及D、E（本位繼承）與代位之F、G，配偶B與子女D、E、（代位之C一房）共四份，B、D、E各四分之一，F、G就C之四分之一再均分各得八分之一，並非各五分之一，故選項2敘述錯誤。選項1、3、4之應繼分計算均正確。"}, {"q": "有關美國Foreign Grantor Trust(FGT)之敘述，下列何者錯誤？", "options": ["委託人在世之時，被視為其所擁有，且通常委託人之稅務身分沒有限制，但受益人必須 為美國人", "美國受益人需填寫Form 3520，向美國國稅局申報相關資訊，但無須繳納稅負", "設立時須完善規劃，若無完善規劃下，當委託人過世後，將對美國受益人或繼承人造成 極大稅務衝擊，該信託可能產生回溯稅(Throwback Tax)", "回溯稅(Throwback Tax)的可行因應方案，包括：Migration、Decanting、Localization"], "ans": 0, "exp": "本題問何者錯誤。美國外國授予人信託（FGT）於委託人在世時被視為其所有，惟其特色在於受益人「不以美國人為限」，並非要求受益人必須為美國人，故選項1稱「受益人必須為美國人」係錯誤。美國受益人受分配時須申報Form 3520但該部分通常無須繳稅、規劃不善於委託人身故後可能產生回溯稅、其因應方案包含遷移、傾倒（decanting）與在地化（選項2、3、4），均為正確敘述。"}, {"q": "依民法第1148 條第2 項規定：「繼承人對於被繼承人之債務，以因繼承所得遺產為限，負 清償責任。」繼承人之下列何種行為將導致其喪失上開規定之利益？", "options": ["未向法院聲明限定繼承", "未繳清遺產稅", "隱匿遺產情節重大", "向法院聲請破產"], "ans": 2, "exp": "依民法相關規定，繼承人原則上以所得遺產為限負清償責任（概括之限定責任），但繼承人若有「隱匿遺產情節重大」、在遺產清冊為虛偽記載情節重大或意圖詐害債權人而處分遺產等情形者，即喪失上開限定責任之利益，故選項3正確。未聲明限定繼承、未繳清遺產稅或聲請破產，均不當然導致喪失限定責任之利益。"}, {"q": "有關法務部推動「成年人意定監護制度」，下列敘述何者正確？", "options": ["該制度亦適用於輔助宣告時", "意定監護契約需由法院作成公證書", "成年人本人自己決定適合自己未來的監護人", "意定監護契約需通知本人所在地之社會局處"], "ans": 2, "exp": "本題問何者正確。成年人意定監護制度之核心，在於成年人本人於意思能力健全時，自行預先選定未來受監護宣告時之監護人，故選項3正確。該制度係針對監護宣告而非輔助宣告（選項1錯）；意定監護契約須由「公證人」作成公證書而非法院（選項2錯）；公證後係通知本人住所地之「法院」而非社會局處（選項4錯）。"}, {"q": "有關遺產相關規定，下列敘述何者錯誤？", "options": ["被繼承人死亡前二年內贈與，併計遺產總額課稅", "被繼承人雖得依遺囑自由處分其財產，但不得侵害繼承人的特留分", "民法規定遺囑之方式限自書遺囑、公證遺囑及密封遺囑三種", "遺囑信託於委託人死亡時，信託財產依規定課徵遺產稅"], "ans": 2, "exp": "答案。死亡前二年內贈與併計遺產、遺囑不得侵害特留分、遺囑信託於委託人死亡時課徵遺產稅等，均為正確敘述。解析 民法規定之遺囑方式有自書、公證、密封、代筆及口授共五種，並非僅自書、公證、密封三種，故選項3敘述錯誤為本題"}, {"q": "下列遺囑的訂定，哪一份是有效的？", "options": ["17 歲林小妹親自寫了一封遺囑，記明年月日後並親自簽名", "14 歲王小弟在父母同意下，寫了遺囑並在上記明年月日及簽名", "30 歲陳小姐在遺囑上簽名後，將其密封，於封縫處簽名，並找一位兄長當見證人，向公 證人提出其為自己自寫的遺囑", "65 歲王奶奶找了妹妹與姪女當見證人，由王奶奶口述遺囑意旨，姪女將其筆記、宣讀、 講解後，記明年月日及姪女的姓名，僅姪女在遺囑上簽名"], "ans": 0, "exp": "立遺囑須年滿16歲始有遺囑能力，且自書遺囑須親自書寫全文、記明年月日並親自簽名。選項1林小妹17歲、要件齊備，遺囑有效。選項2王小弟14歲未滿16歲，縱父母同意仍不能立遺囑；選項3密封遺囑見證人須二人以上且須由公證人為之，僅一位兄長見證且自稱自寫不符密封遺囑要件；選項4代筆遺囑須三位見證人且見證人均須簽名，本件僅二人且僅一人簽名，均無效。"}, {"q": "甲死亡，未立遺囑，遺有配偶乙及子女丙、丁二人，遺產總額900 萬元。有關繼承人及其可 分得金額，下列敘述何者正確？", "options": ["乙、丙、丁三人均為繼承人，各分得300 萬元", "乙為配偶，分得450 萬元；丙、丁各分得225 萬元", "乙為第一順序繼承人，分得600 萬元；剩下由丙、丁均分各得150 萬元", "丙、丁各分得450 萬元；乙不得繼承"], "ans": 0, "exp": "甲死亡未立遺囑，配偶乙與第一順序子女丙、丁同為繼承人，配偶與直系血親卑親屬同為繼承時應均分遺產。900萬元由乙、丙、丁三人平均，各得300萬元，故選項1正確。選項2「配偶分二分之一」是配偶與其他順序繼承人（如父母、兄弟姊妹）同列時的規定，與本題第一順序均分不同。"}, {"q": "民法目前採登記主義，結婚要件規定結婚書面上應有幾人以上證人的簽名？", "options": ["一人", "二人", "三人", "四人"], "ans": 1, "exp": "民法第982條規定結婚應以書面為之，由二人以上證人簽名，並向戶政機關辦理結婚登記（登記主義），故證人為二人以上，選項2正確。"}, {"q": "甲為避免其繼承人就祖先遺留下來之祖產有不同處置，故於生前留一遺囑記明禁止遺產分 割20 年，請問其禁止之效力最長以多少年為限？", "options": ["5 年", "10 年", "20 年", "超過法定期限故禁止限制無效"], "ans": 1, "exp": "遺囑禁止遺產分割之效力，民法規定最長以10年為限，超過10年部分縮短為10年，故選項2正確。甲雖記明禁止20年，仍以10年為上限，並非全部無效。"}, {"q": "下述哪種情形非屬民法明定得因被繼承人宥恕而不喪失繼承權之情形？", "options": ["持刀威脅被繼承人變更遺囑，且因此受刑之宣告", "將被繼承人所立遺囑隱匿", "以詐術使被繼承人訂立遺囑", "故意致同順位之繼承人於死，且受刑之宣告"], "ans": 3, "exp": "民法所定喪失繼承權事由中，「故意致被繼承人或應繼承人於死或雖未致死因而受刑之宣告」屬絕對失權事由，不因被繼承人宥恕而回復；而偽造變造隱匿遺囑、詐欺脅迫使被繼承人為或撤回遺囑等屬得因表示宥恕而不喪失之相對失權事由。選項4故意致同順位繼承人於死且受刑宣告屬絕對失權、不得因宥恕回復，故為非屬得因宥恕而不喪失之情形，為正確答案。"}, {"q": "甲之子乙先於甲死亡，乙之配偶丙與甲同居並長期照顧甲。甲曾欲收養丙，惟收養不成立。 甲立遺囑，將其全部遺產不動產A 屋價值2,700 萬元遺贈予丙。甲死亡時僅尚有弟弟丁、 戊二人在世。關於遺產，下列敘述何者正確？", "options": ["因乙先於甲死亡，丙得代位繼承2,700 萬元", "本件無任何人得請求特留分", "丁得請求其特留分額為450 萬元", "丙得請求其特留分額為1,350 萬元"], "ans": 2, "exp": "丙非甲之繼承人（收養不成立、且非血親），不能代位繼承亦無特留分（選項1、4錯）。甲死亡時僅有弟弟丁、戊為繼承人（第三順序兄弟姊妹），遺產2,700萬元由丁、戊均分各1,350萬元，兄弟姊妹之特留分為應繼分三分之一，故丁特留分為1,350萬×1/3＝450萬元，選項3正確。既有繼承人即有特留分（選項2錯）。"}, {"q": "甲君與受託人簽訂遺囑信託契約，針對遺囑與遺囑信託當事人之關係，下列敘述何者正確？", "options": ["可以指定複數遺囑執行人", "遺囑信託受託人必須同時為遺囑執行人", "遺囑信託受託人必須同時為遺囑保管人", "遺囑指定之受託人，不得拒絕接受信託"], "ans": 0, "exp": "遺囑得指定一人或數人為遺囑執行人（複數遺囑執行人），故選項1正確。遺囑信託受託人與遺囑執行人、遺囑保管人並無必須同一人之規定（選項2、3錯）；遺囑指定之受託人並非不得拒絕，受託人有承諾與否之自由，得拒絕接受信託（選項4錯）。"}, {"q": "周爸爸希望成立遺囑信託，於其預立遺囑時，下列敘述何者錯誤？", "options": ["宜指定遺囑執行人", "遺囑不得侵害應繼分", "公證遺囑須2 位以上見證人", "遺囑中須明定欲交付信託之遺產明細"], "ans": 1, "exp": "預立遺囑時，遺囑自由處分財產不得侵害繼承人之「特留分」，而非「應繼分」（遺囑本即可變動應繼分之分配，但不得侵害特留分），故選項2「遺囑不得侵害應繼分」錯誤。宜指定遺囑執行人、公證遺囑須二人以上見證人、遺囑須明定欲交付信託之遺產明細，均為正確敘述。"}, {"q": "在符合民法繼承之相關規定前提下，下列何者非屬周爸爸遺囑信託可行之規劃方式？", "options": ["股票本金於遺囑信託到期時由兒子受益", "股票孳息於遺囑信託期間由配偶受益", "年邁雙親亦可作為遺囑信託受益人之一，並定期配發其現金，以作為安養之用", "周爸爸死亡保險給付亦可存入遺囑信託專戶，由兒子受益，作為兒子教育基金"], "ans": 3, "exp": "周爸爸之死亡保險已指定受益人為兒子，該保險給付於被保險人死亡時直接給付予指定受益人（兒子），屬其個人財產，並非遺產，無法逕由「遺囑信託」加以處分存入遺囑信託專戶，故選項4非屬可行之遺囑信託規劃方式，為正確答案。股票本金到期由兒子受益、孳息期間由配偶受益、年邁雙親作為受益人定期配發安養金，均屬可行規劃。"}, {"q": "下列何者非為生前預立遺囑的優點？", "options": ["明確財產分配之安排", "可將遺產分配給慈善機構", "可完全拘束股權移轉之限制", "將子女監護權指定給信任之人"], "ans": 2, "exp": "正解為選項3（非屬優點者）。遺囑僅能於不違反公司章程及法律的範圍內處分股權，無法「完全拘束」股權移轉之限制，章程或股東協議的轉讓限制仍須遵守，故選項3並非遺囑優點。選項1明確安排財產分配、選項2得遺贈予慈善機構、選項4得以遺囑指定未成年子女之監護人，均屬預立遺囑的實益。"}, {"q": "依據我國民法，有關遺囑的訂定與功能，下列何者正確？", "options": ["自書遺囑得以打字印出後親簽", "遺囑人在生前可隨時修改其遺囑內容", "遺囑內容有關遺產分配須符合應繼分規定", "不可透過遺囑將遺產分配給非繼承人"], "ans": 1, "exp": "正解為選項2。遺囑為要式且不要因之單獨行為，遺囑人生前得隨時依法定方式撤回或變更遺囑內容，故選項2正確。選項1自書遺囑須親筆自書全文，不得打字後僅簽名；選項3遺囑得自由分配僅受特留分限制，不必符合應繼分；選項4得以遺贈方式將財產給予非繼承人，三者皆錯誤。"}, {"q": "有關姻親關係，下列敘述何者正確？", "options": ["甲乙結婚後，甲之父母即成為甲之直系姻親", "甲乙離婚後，甲與乙之父母之姻親關係仍然存在", "甲乙婚姻經撤銷後，乙與甲之父母之姻親關係仍然存在", "甲乙結婚後，乙之父母即成為甲之直系姻親"], "ans": 3, "exp": "正解為選項4。姻親包含血親之配偶、配偶之血親及配偶之血親之配偶；甲乙結婚後，乙之父母為甲配偶之直系血親，屬甲之直系姻親，選項4正確。選項1甲之父母為甲之血親非姻親；選項2離婚後姻親關係消滅；選項3婚姻撤銷後姻親關係亦消滅，三者皆錯。"}, {"q": "下列何者非屬於結婚之形式生效要件？", "options": ["有兩人以上之證人", "去戶政機關辦理登記", "去法院辦理", "以書面為之"], "ans": 2, "exp": "正解為選項3（非形式要件者）。我國採登記婚，結婚之形式要件為：以書面為之、有二人以上證人簽名、並向戶政機關辦理結婚登記。「去法院辦理」並非結婚之法定形式要件，故選項3正確。選項1、2、4均為現行結婚之形式生效要件。"}, {"q": "民法規定五種遺囑，除了自書遺囑及代筆遺囑之外，下列何者不在其內？", "options": ["公證遺囑", "電子遺囑", "口授遺囑", "密封遺囑"], "ans": 1, "exp": "正解為選項2（不在其內者）。民法所定五種遺囑為自書遺囑、公證遺囑、密封遺囑、代筆遺囑及口授遺囑，並無「電子遺囑」此一類型，故選項2不在其內。選項1公證、選項3口授、選項4密封均為民法明定之遺囑方式。"}, {"q": "有關民法婚姻之敘述，下列何者正確？", "options": ["縱使未滿18 歲，只要法定代理人同意，婚姻亦屬有效", "監護人與受監護人，只要監護關係存續中，不得結婚，沒有例外", "婚姻經合法撤銷後，效力是向後失效，故仍有民法關於未成年子女權利義務負擔、贍養 費與剩餘財產分配請求權之適用", "若與表哥結婚，婚姻得撤銷"], "ans": 2, "exp": "正解為選項3。婚姻經撤銷者，其效力向後失效（不溯及既往），故仍適用民法關於未成年子女權義負擔、贍養費及剩餘財產分配請求權等規定，選項3正確。選項1已修法為一律滿18歲始得結婚，無法定代理人同意之例外；選項2監護關係存續中結婚之禁止有經父母同意等例外；選項4與表兄弟姊妹（旁系血親六親等內）之婚姻屬無效非得撤銷，三者皆錯。"}, {"q": "甲之子女為乙、丙、丁三人。丙先於甲死亡，其子女戊、己依法代位繼承；甲悲於丙之早 逝，遺囑表示遺產全由戊、己均分。五年前，甲曾因乙結婚贈與其500 萬元；甲死亡時遺 有存款2,500 萬元。下列敘述何者正確？", "options": ["丁得行使之特留分扣減額為1,000 萬元", "乙得行使之特留分扣減額為500 萬元", "特留分扣減後，戊實際可取得1,000 萬元", "特留分扣減後，己實際可取得500 萬元"], "ans": 2, "exp": "正解為選項3。甲遺產2,500萬，繼承人為乙、丁及代位繼承之戊、己（戊己代位丙之應繼分）。應繼分各房三分之一：乙、丁各得約833萬，戊己合計約833萬（各約417萬）。乙之生前贈與500萬應依規定歸扣計入。甲遺囑將遺產全給戊己，侵害乙、丁之特留分（各為應繼分二分之一），乙、丁得行使扣減；扣減後戊己取得額減少，依官方計算戊實際可取得1,000萬元，故選項3正確；選項1、2扣減額數及選項4己取得額均與計算不符。 --- ## Related Concepts - [[01-遺囑與繼承]] - [[02-剩餘財產與夫妻財產制]] - [[03-遺產及贈與稅]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "A 與其配偶於1950 年結婚，A 過世後，其於結婚前取得之財產為500 萬元，其於結婚後取 得之財產為900 萬元，其配偶於婚後取得之財產有300 萬元，所以配偶可以主張多少的剩 餘財產分配請求權？", "options": ["900 萬元", "550 萬元", "500 萬元", "300 萬元"], "ans": 3, "exp": "正解為選項4，剩餘財產分配請求權為300萬元。剩餘財產分配僅就婚後財產計算：A婚後財產900萬、配偶婚後財產300萬，差額為900−300＝600萬，平均分配各得600÷2＝300萬，故配偶可向A方主張300萬元。婚前取得之500萬不列入計算，因此900萬、550萬、500萬皆為誤導項。"}, {"q": "下列何者與民法法定夫妻財產制之規定不符？", "options": ["夫或妻各自管理、使用、收益及處分其財產", "夫或妻之財產分為婚前財產與婚後財產，由夫妻各自所有", "夫妻財產不能證明為婚前或婚後財產者，推定為婚後財產", "夫或妻婚前財產，於婚姻關係存續中所生之孳息，視為婚前財產"], "ans": 3, "exp": "正解為選項4。依民法法定財產制，夫或妻婚前財產於婚姻關係存續中所生之孳息，視為「婚後財產」（以利日後剩餘財產分配），故選項4「視為婚前財產」與規定不符。選項1各自管理使用收益處分其財產、選項2財產分婚前婚後由各自所有、選項3不能證明者推定為婚後財產，均符合法定財產制。"}, {"q": "近年來離婚率持續走高，夫妻剩餘財產差額分配請求權詢問度漸增，下列相關敘述何者錯 誤？", "options": ["夫妻採法定財產制者才適用", "發生離婚、一方死亡或改用約定財產制時得主張", "婚前財產於婚姻關係存續中所生之孳息，視為婚前財產", "對於婚姻生活無貢獻，致平均分配有失公平者，法院得調整或免除其分配額"], "ans": 2, "exp": "正解為選項3。依民法夫妻財產制規定，婚前財產於婚姻關係存續中所生之孳息，視為「婚後財產」（而非婚前財產），故選項3敘述錯誤。剩餘財產差額分配請求權僅法定財產制適用（選項1對），於離婚、一方死亡或改用約定財產制時得主張（選項2對），且法院對顯失公平者得調整或免除分配額（選項4對）。"}, {"q": "夫妻若約定分別財產制，有關分別財產制之敘述，下列何者錯誤？", "options": ["夫妻財產制契約非經登記，不得以之對抗第三人", "夫妻各自對其債務負清償之責", "婚姻關係存續中，不得改用他種夫妻財產制", "夫妻離婚時，無剩餘財產分配請求權"], "ans": 2, "exp": "本題為反向題。夫妻財產制契約於婚姻關係存續中，本得依法定方式（訂立、變更或廢止）改用他種夫妻財產制，並非不得改用，故選項3錯誤。其餘正確：財產制契約非經登記不得對抗第三人、分別財產制下各自負債務清償責任、且分別財產制無剩餘財產分配請求權（該請求權限於法定財產制）。"}, {"q": "王先生與其配偶於民國72 年1 月3 日結婚，王先生過世後，其婚後財產為1,000 萬，其配 偶婚後取得財產500 萬，所以王先生遺孀可以主張剩餘財產差額分配請求權多少於遺產總 額中扣除？", "options": ["250 萬", "500 萬", "750 萬", "1,000 萬"], "ans": 0, "exp": "夫妻剩餘財產差額分配請求權，是以雙方婚後財產的差額除以二計算。本題王先生婚後財產1,000萬、配偶婚後財產500萬，差額為500萬，由生存配偶請求其半數即250萬，故選項1正確。500萬是差額而非可請求數、750萬與1,000萬則明顯高估，均非半數計算結果，故錯誤。"}, {"q": "甲、乙約定以共同財產制為其夫妻財產制，二人婚後育有兩名子女丙、丁。甲死亡時，經查 甲、乙之共同財產共價值新臺幣（下同）300 萬元，則乙分得金額為多少？", "options": ["100 萬元", "150 萬元", "180 萬元", "200 萬元"], "ans": 3, "exp": "共同財產制於配偶一方死亡而關係消滅時，原則上共同財產之半數歸屬生存配偶，另半數為死亡者之遺產。本題共同財產300萬，乙先取得半數150萬；死亡者甲之遺產150萬由配偶乙與子女丙、丁三人均分，乙再得50萬，合計乙共得200萬，故選項4正確（150萬＋50萬＝200萬）。"}, {"q": "甲與乙本為夫妻，以法定財產制，為其夫妻財產制。若甲為減少乙對於剩餘財產之分配，並 非為履行道德上義務所為之相當贈與，而於夫妻離婚前多少年內處分其婚後財產者，應將 該財產追加計算，視為現存之婚後財產？", "options": ["2 年", "3 年", "5 年", "10 年"], "ans": 2, "exp": "夫妻法定財產制下，配偶一方為減少他方剩餘財產分配，於法定財產制關係消滅前（離婚前）五年內所為之處分婚後財產，應追加計算視為現存婚後財產（非為履行道德義務之相當贈與者除外），故選項3「5年」正確。"}, {"q": "有關夫妻剩餘財產差額分配請求權，下列敘述何者錯誤？", "options": ["婚前財產及無償取得財產，不可請求二分之一", "無法證明為婚前或婚後財產者，推定為婚前財產", "婚前財產、繼承或受贈等財產，在婚後所產生的孳息，屬婚後財產", "離婚、一方死亡與改用約定財產制時，得主張剩餘財產分配請求權"], "ans": 1, "exp": "夫妻剩餘財產差額分配請求權中，不能證明為婚前或婚後財產者，「推定為婚後財產」（以利剩餘財產分配），故選項2「推定為婚前財產」錯誤。婚前及無償取得財產不列入分配、婚前財產婚後所生孳息屬婚後財產、離婚或一方死亡或改用約定財產制時得主張分配，均為正確敘述。"}, {"q": "現行民法規定三種夫妻財產制，下列中何者不在其內？", "options": ["法定財產制", "分別財產制", "共同財產制", "聯合財產制"], "ans": 3, "exp": "正解為選項4（不在其內者）。我國民法現行夫妻財產制為三種：法定財產制、約定之共同財產制與分別財產制。「聯合財產制」為民國91年修法前之舊制名稱，已遭廢除，故選項4不在現行三種之內。選項1、2、3均為現行夫妻財產制。"}, {"q": "假設孫媽媽的配偶孫爸爸希望主張配偶剩餘財產差額分配請求權，下列適用時點何者錯誤？", "options": ["孫媽媽過世時", "孫爸爸與孫媽媽離婚時", "孫媽媽成立由女兒作為受益人的他益信託時", "孫爸爸與孫媽媽雙方同意並向法院聲請登記將法定財產制改為分別財產制時 第二部分：第41~60 題（每題2 分）"], "ans": 2, "exp": "正解為選項3（適用時點錯誤者）。配偶剩餘財產差額分配請求權之適用時點為法定財產制關係消滅時，即離婚、一方死亡、改用分別財產制等情形（選項1、2、4），而「成立由女兒為受益人之他益信託」並不消滅夫妻法定財產制，不生剩餘財產分配請求權之適用，故選項3錯誤。 --- ## Related Concepts - [[02-剩餘財產與夫妻財產制]] - [[01-遺囑與繼承]] - [[03-遺產及贈與稅]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "甲君今年度贈與項目如下，A.贈與配偶乙君200 萬元；B.甲君扶養丙君，為丙君支付5 萬 元之教育費；C.甲君的女兒丁君於5 月結婚，甲君同年6 月贈與財物20 萬元。假定當年度 甲君無其他贈與，甲君當年度之贈與總額為多少元？", "options": ["0 元", "20 萬元", "200 萬元", "225 萬元"], "ans": 0, "exp": "正解為選項1（0元）。逐項判斷：A.贈與配偶200萬元，依遺贈稅法配偶間相互贈與不計入贈與總額；B.對受扶養人丙支付教育費5萬元，屬扶養義務範圍之費用不計入贈與總額；C.女兒丁結婚，父母於子女婚嫁時各贈與不超過100萬元（本題20萬元）部分不計入贈與總額。三者均不計入，故甲當年度贈與總額為0元。"}, {"q": "有關夫妻離婚配偶「一方應給付他方之財產」，依我國稅制如何處理？", "options": ["所給付之財產，若係依離婚協議者，應課徵贈與稅", "所給付之財產，若係依判決者，應課徵綜合所得稅", "所給付之財產，若係依離婚協議者，應課徵綜合所得稅", "所給付之財產，無論係依離婚協議或判決者，免予課徵綜合所得稅"], "ans": 3, "exp": "正解為選項4。夫妻離婚時一方應給付他方之財產，無論係依離婚協議或法院判決，均屬夫妻財產關係之清理（如剩餘財產分配、贍養給付），依我國稅制免予課徵綜合所得稅，亦非屬贈與，故選項4正確，選項1、2、3均誤認應課贈與稅或綜所稅。"}, {"q": "有關FY2025 遺產稅之規定，下列何者錯誤？", "options": ["遺產稅之現行稅率最高為20%", "一般免稅額為1,333 萬元", "喪葬費扣除額為138 萬元", "被繼承人死亡繼承之財產已納遺產稅者，不論年限均可遞減扣除"], "ans": 3, "exp": "本題為反向題。遺產稅對「已納遺產稅之繼承財產」設有不重複課稅之扣除，但須在被繼承人死亡前一定年限內（依繼承發生之先後採遞減比例扣除），並非「不論年限均可遞減扣除」，故選項4錯誤為正解。其餘均為現行規定：最高稅率20%、免稅額1,333萬元、喪葬費扣除額138萬元。"}, {"q": "有關資產的時價，下列敘述何者錯誤？", "options": ["上市與上櫃公司為當日收盤價", "興櫃股票為當日加權平均成交價", "未上市櫃公司股票為當日加權平均成交價", "房屋為評定標準價格"], "ans": 2, "exp": "本題為反向題。資產時價認定：上市櫃股票為當日收盤價、興櫃股票為當日加權平均成交價、房屋為評定標準價格；而未上市、未上櫃且非興櫃之公司股票並無公開成交價，係以「資產淨值」（每股淨值）估價，並非當日加權平均成交價，故選項3錯誤。"}, {"q": "某公司創辦人擔心未來遺產稅過高，因此希望藉由生前贈與減少遺產總額，下列敘述何者 錯誤？（假定下列選項之信託皆為受益人特定，且委託人無保留變更受益人及分配、處分 信託利益之權利）", "options": ["善用贈與稅之年度免稅額", "成立「本金孳息全自益」之股權信託", "成立「本金自益、孳息他益」之股權信託", "成立「本金他益、孳息自益」之股權信託"], "ans": 1, "exp": "本題為反向題，問減少遺產總額之規劃何者錯誤。「本金孳息全自益」之股權信託，本金與孳息均歸委託人自己，財產仍屬委託人所有，未發生移轉他人之效果，無法達到減少遺產總額（生前贈與）之目的，故選項2錯誤。善用年度免稅額、本金自益孳息他益、本金他益孳息自益均可發生對外贈與而減少遺產。"}, {"q": "甲君為信託契約之唯一受益人，在與信託業之信託契約約定信託事務處理包括甲君身故後 之喪葬事宜，其以信託專戶中屬身故受益人享有信託利益之權利未領受部分之金錢實支實 付之喪葬費用。假定想以信託財產支付甲君過世後之喪葬費用為100 萬元（假定過世當年 之喪葬費扣除額為138 萬元），請問針對上面款項需計入身故受益人遺產總額之金額為何？", "options": ["0 元", "38 萬元", "100 萬元", "喪葬費用非屬信託受益人需負擔，因此信託財產無法支付其喪葬費用"], "ans": 2, "exp": "甲君身故後以信託專戶內屬其享有信託利益未領受部分之金錢支付喪葬費100萬元，該款項仍屬甲君（受益人）遺有之信託財產，須計入其遺產總額；喪葬費138萬元係遺產稅之「扣除額」項目，於計算課稅遺產淨額時減除，而非使該100萬元不計入遺產總額。故計入遺產總額之金額為100萬元，選項3正確。"}, {"q": "林董事長欲運用每年新臺幣244 萬元的贈與稅免稅額，逐年贈與不動產給孫子。下列敘述 何者錯誤？", "options": ["贈與稅免稅額係以贈與人為主計算，每年合計244 萬元", "若贈與不動產，土地價值認定須以當年度土地公告現值為準", "贈與不動產給孫子時，因未超過贈與稅免稅額，無須申報贈與稅", "若贈與總額超過免稅額，超過部分須依累進稅率課徵贈與稅"], "ans": 2, "exp": "本題問何者錯誤。贈與不動產縱使土地公告現值與房屋評定現值合計未超過244萬免稅額，仍應依法辦理贈與稅申報（免稅與免申報係不同概念），故選項3稱「未超過免稅額即無須申報」係錯誤。贈與稅免稅額以贈與人計算每年244萬、土地價值以當年度公告現值認定、超過免稅額部分按累進稅率課徵（選項1、2、4），均屬正確。"}, {"q": "下列何者需計入遺產總額？", "options": ["捐贈政府之財產", "軍公教勞工農民保險給付", "無償供公眾通行之道路土地", "未指定受益人之人壽保險給付"], "ans": 3, "exp": "人壽保險金須有指定受益人，於指定受益人時保險給付不計入遺產總額；未指定受益人者，保險金回歸被保險人遺產，依規定須計入遺產總額，故選項4正確。捐贈政府之財產、軍公教勞農保險給付、無償供公眾通行之道路土地依法均不計入遺產總額。"}, {"q": "孫媽媽於信託成立之後四年不幸過世，下列何種選項仍須納入孫媽媽遺產稅課徵總額？", "options": ["孫媽媽死亡前三年贈與給父親50 萬元", "孫媽媽透過信託所贈與給女兒的財產", "孫媽媽死亡前一年贈與給好友王小花30 萬元", "孫媽媽作為不動產信託房租受益人於過世時尚未領取的房租收入"], "ans": 3, "exp": "正解為選項4。孫媽媽為房租受益人，過世時尚未領取之房租收入屬其遺有之財產上權利，應納入遺產總額課稅，故選項4正確。選項1贈與父親屬配偶以外被繼承人，惟50萬未逾免稅額且死亡前三年規定須視情形，題意取捨；選項2透過信託贈與女兒之本金已於贈與時課贈與稅、不再計入遺產；選項3贈與好友30萬亦未逾免稅額且非死亡前贈與加計範圍，相較之下選項4最為明確須計入。"}, {"q": "王大哥年初因女兒結婚，轉帳新臺幣100 萬元給女兒當嫁妝，年中又轉帳新臺幣200 萬元 補貼女兒新房裝修費，年底時為犒賞辛苦多年的太太，轉帳新臺幣200 萬元給她買新車， 請問王大哥今年共需繳多少贈與稅？", "options": ["0 元", "新臺幣5.6 萬元", "新臺幣25.6 萬元", "新臺幣30 萬元"], "ans": 0, "exp": "正解為選項1（0元）。配偶間相互贈與免徵贈與稅，故贈與太太200萬元買車免稅；對女兒之贈與合計100萬＋200萬＝300萬元，扣除年度贈與免稅額244萬元後，課稅贈與淨額為56萬元，乘以10%稅率得5.6萬。惟若考量結婚贈與另有100萬元婚嫁免稅扣除（婚前後六個月內），則300萬中100萬可再扣除，餘200萬未逾244萬免稅額，全年贈與稅為0元，故選項1正確。"}, {"q": "幾年後，甲董事長過世當日，B 公司股票收盤價為每股100 元，每股淨值為110 元，假定 符合實物抵繳之規則與程序，乙君想以B 公司股票進行遺產稅抵繳，申請抵繳日收盤價為 120 元，每股淨值為90 元，針對可否以B 公司股票進行抵繳應納稅額與抵繳之理由，下列 敘述何者正確？", "options": ["不能辦理全額抵繳，因為甲董事長過世當日，B 公司股票收盤價低於每股淨值", "可以辦理全額抵繳，因為申請抵繳當日，B 公司股票收盤價高於甲董事長過世當日之收 盤價", "可以辦理全額抵繳，因為申請抵繳當日，B 公司股票收盤價高於申請抵繳當日之每股淨 值", "不能辦理全額抵繳，因為申請抵繳日之B 公司股票每股淨值低於甲董事長過世當日之每 股淨值"], "ans": 1, "exp": "正解為選項2。實物抵繳遺產稅之上市股票，得否全額抵繳係比較「申請抵繳日之收盤價」與「被繼承人死亡日之收盤價」：若申請抵繳當日收盤價（120元）高於死亡日收盤價（100元），其價值未跌反漲，得辦理全額抵繳，故選項2正確。每股淨值非抵繳價值認定基準，故選項1、3、4以淨值為由之判斷均不正確。本題庫僅供自我學習與備考整理之用 --- ## Related Concepts - [[03-遺產及贈與稅]] - [[01-遺囑與繼承]] - [[05-信託稅制]] - [[07-保險與傳承]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "辛老太太參加XY 周刊舉辦高齡友善金融論壇後，想要將其名下出租房屋之租金交付信託， 信託目的為專款專用照護自身退休後生活，而下列敘述何者正確？", "options": ["委託人可以設立特定目的信託", "繳納房屋稅之納稅義務人為受託人", "可以找其信賴之剛年滿16 歲之親姪兒擔任受託人", "信託存續期間如受益人死亡，未領受信託利益仍受民法應繼分及特留分之拘束"], "ans": 3, "exp": "正解為選項4。信託存續期間受益人死亡，其尚未領受之信託利益屬其遺產，仍受民法應繼分及特留分之拘束，故選項4正確。選項1此為自益之安養信託，並非公益性「特定目的信託」之概念誤導；選項2房屋稅納稅義務人原則仍為房屋所有人（委託人/受益人）而非受託人；選項3受託人須有完全行為能力，剛滿16歲之未成年人不得擔任受託人，均屬錯誤。"}, {"q": "依信託法立法理由，信託乃委託人、受託人與受益人間存在一種以何者為中心之法律關係？", "options": ["人", "財產權", "契約", "信賴"], "ans": 1, "exp": "正解為選項2。依信託法立法理由，信託係以財產權為中心，由委託人移轉財產權予受託人，受託人為受益人之利益或特定目的管理處分該財產所形成之法律關係，故以「財產權」為中心。人、契約、信賴雖與信託有關，但立法理由所指中心為財產權。"}, {"q": "有關連續受益人之信託模式，下列敘述何者錯誤？", "options": ["國外常見的王朝信託，即是連續受益人的架構", "約定當現任受益人死亡時，該受益人之受益權由委託人之第一順位繼承人承受", "日本僅承認30 年內順位受益人所取得之受益權有效", "我國信託法實無明文限制必須以實際已存在之人為受益人始能成立信託"], "ans": 1, "exp": "正解為選項2。連續受益人架構係由委託人於信託契約中自由約定現任受益人死亡後由次順位「受益人」承受受益權，並非當然轉由「委託人之第一順位繼承人」承受，故選項2錯誤。選項1王朝信託即連續受益人架構、選項3日本承認三十年內順位受益人取得之受益權有效、選項4我國信託法未明文限制須以實際存在之人為受益人，均屬正確。"}, {"q": "有關信託財產之獨立性，下列敘述何者正確？", "options": ["受託人若為自然人，其死亡時，信託財產應先納入其遺產", "受託人破產時，信託財產屬於其破產財團", "屬於信託財產之債權與不屬於信託財產之債務不得相互抵銷", "信託財產為所有權以外之權利時，受託人若取得權利標的之財產權，其權利因混同而消 滅"], "ans": 2, "exp": "正解為選項3。為維護信託財產之獨立性，屬於信託財產之債權與不屬於信託財產之債務不得相互抵銷，故選項3正確。選項1受託人死亡時信託財產不屬其遺產、選項2受託人破產時信託財產不屬破產財團、選項4信託財產為所有權以外之權利時受託人取得標的財產權其權利不因混同而消滅，均係信託財產獨立性之表現，故敘述相反者皆錯誤。"}, {"q": "甲與A 銀行成立特定金錢信託，信託財產為新臺幣200 萬元、受益人為甲，由A 銀行依甲 之指示投資海外基金。若該特定金錢信託對於信託之終止未設有特別約定，則下列敘述何 者正確？", "options": ["甲死亡時，信託當然消滅", "甲死亡時，其繼承人不得終止信託", "甲死亡時，其繼承人得終止信託", "甲死亡時，其繼承人必須經A 銀行同意始得終止信託"], "ans": 2, "exp": "正解為選項3。本件特定金錢信託委託人兼受益人為甲（自益信託），對信託終止未設特別約定，甲死亡時信託不當然消滅，其繼承人承繼委託人兼受益人地位，得依法終止信託，故選項3正確。選項1當然消滅、選項2繼承人不得終止、選項4須經銀行同意始得終止，均屬錯誤。"}, {"q": "有關安養信託之信託監察人規劃安排，下列何者錯誤？", "options": ["可設一人或多人", "為確保專任，不可採順位方式擔任", "信託報酬由委託人與信託監察人自行議定", "可約定契約變更或終止，須經信託監察人同意"], "ans": 1, "exp": "正解為選項2。安養信託之信託監察人為確保持續監督，得約定以順位方式擔任（前順位不能擔任時由次順位遞補），並非不可採順位方式，故選項2錯誤。選項1可設一人或多人、選項3信託報酬由委託人與信託監察人自行議定、選項4可約定契約變更或終止須經信託監察人同意，均屬正確安排。"}, {"q": "劉總個人持有上櫃公司股票想逐步透過信託以三位子女作為受益人，他擔心該等股權無法 繼續支持大股東的經營權，該建議劉總採行下列何種信託為宜？", "options": ["公益信託", "員工持股信託", "有價證券股權控管信託", "本金自益孳息他益信託"], "ans": 2, "exp": "正解為選項3。劉總擔心股權移轉後無法繼續支持大股東經營權，宜採「有價證券股權控管信託」，使股票交付信託集中管理、表決權仍可依約定運用以維持經營權，並逐步以子女為受益人，最符合需求。公益信託、員工持股信託、本金自益孳息他益信託均無法達到掌控經營權之目的。"}, {"q": "劉總夫妻希望可共同樂活養老不造成子女負擔，該建議他搭配下列何種信託？", "options": ["遺囑信託", "安養信託", "子女保障信託", "有價證券股權控管信託"], "ans": 1, "exp": "正解為選項2。劉總夫妻欲共同樂活養老、不造成子女負擔，宜搭配「安養信託」，以信託財產專款專用支應退休生活與照護需求，最切合自益養老目的。遺囑信託、子女保障信託係以他人受益或身後安排為目的，股權控管信託則為經營權傳承之工具，均非養老首選。"}, {"q": "A 家族控股公司（下稱A 公司）將新臺幣2 億元及其所持有B 家族企業之股份3,000 萬股 與C 金融控股公司旗下之D 銀行成立家族信託，並約定D 銀行對信託財產無運用決定權， 有關該家族信託之法律關係，下列敘述何者正確？", "options": ["A 公司得指示D 銀行以信託之現金購買C 金融控股公司發行之股票", "A 公司得指示D 銀行以信託之股票為擔保向其他銀行借入款項", "A 公司不得指示D 銀行以信託之現金購買其銀行業務部門經紀之有價證券", "A 公司不得指示D 銀行將信託之現金存放於銀行業務部門處作為存款"], "ans": 0, "exp": "正解為選項1。本件D銀行對信託財產無運用決定權，由委託人A公司指示運用；A公司得指示D銀行以信託現金購買C金控（D銀行之母公司金控）所發行之股票，此非當然禁止之利益衝突項目，故選項1正確。選項2以信託股票擔保借款、選項3不得購買其經紀之有價證券、選項4不得存放於其銀行業務部門作存款等敘述，與本題設定之容許範圍不符。"}, {"q": "有關對我國銀行業以家族信託協助企業傳承之建議，下列敘述何者錯誤？", "options": ["深化人才訓練並結合外部專家服務", "以個人與家族需求創新整合式信託服務", "信託財產具獨立性，故不可提供其他金融商品或服務", "數位科技可運用在高資產服務之後勤管理與資源整合"], "ans": 2, "exp": "正解為選項3。對銀行業以家族信託協助企業傳承之建議，應整合提供多元金融商品與服務以滿足客戶需求；信託財產雖具獨立性，但此獨立性並不導致「不可提供其他金融商品或服務」，故選項3錯誤。選項1深化人才訓練結合外部專家、選項2以個人與家族需求創新整合式信託服務、選項4運用數位科技於後勤管理與資源整合，均屬正確建議。"}, {"q": "如果成立以4 名孫子女為信託受益人之信託，下列規劃何者正確？", "options": ["無法針對4 名孫子女成立1 個信託，須分別針對大甲、小甲、大乙及小乙各成立1 個信 託", "無法針對4 名孫子女成立1 個信託，但可針對大甲及小甲成立1 個信託；大乙及小乙成 立1 個信託", "如果為4 名孫子女成立1 個信託，則大甲、小甲、大乙及小乙之受益權比例，仍可由信 託委託人於信託契約約定", "如果為4 名孫子女成立1 個信託，則大甲、小甲、大乙及小乙之受益權比例皆必須為四 分之一，不能另行於信託契約約定"], "ans": 2, "exp": "正解為選項3。同一信託得以多名受益人共同設立，故可為4名孫子女成立1個信託，且各受益人之受益權比例得由委託人於信託契約自由約定，不以均等為限，故選項3正確。選項1、2認為無法為4人成立1個信託、選項4認為受益權比例必須各為四分之一，均屬錯誤。"}, {"q": "王董事長擔心資產全部移轉給後代，會沒有人照顧，因此想成立自益信託，有關此信託之 規劃，下列敘述何者正確？", "options": ["信託成立時，須繳付贈與稅", "可由信託財產支付王董事長生前契約之費用", "王董事長過世後，部分信託剩餘財產不得指定捐贈給公益團體", "王董事長過世後，信託剩餘財產非屬其遺產，故無特留分之疑慮"], "ans": 1, "exp": "正解為選項2。王董事長成立自益信託，得於信託契約約定由信託財產支付其生前契約（如生前殯葬契約）之費用，故選項2正確。選項1自益信託成立時委託人即受益人無贈與不課贈與稅、選項3自益信託剩餘財產得指定捐贈公益團體（非不得）、選項4王董過世後信託剩餘財產仍屬其遺產而有特留分之疑慮，均屬錯誤。"}, {"q": "信託法有關信託目的之相關規定，下列敘述何者正確？", "options": ["信託行為有害於委託人之債權人權利者，受託人得聲請撤銷之", "信託成立後一年內，委託人受破產之宣告者，視為其行為有害及債權", "信託關係之存續須以信託目的可得完成為前提", "以依法不得受讓特定財產權之人為該財產之受益人者，信託行為得撤銷"], "ans": 2, "exp": "正解為選項3。信託關係之存續以信託目的可得完成為前提，信託目的不能完成時信託關係消滅，故選項3正確。信託行為害及委託人債權人權利者，得聲請撤銷之人為「債權人」而非受託人（選項1錯）；視為害及債權之期間為信託成立後「六個月內」受破產宣告（而非一年，選項2錯）；以依法不得受讓特定財產權之人為受益人者，該信託行為係「無效」而非得撤銷（選項4錯）。"}, {"q": "有關遺囑信託實務運作，下列敘述何者錯誤？", "options": ["由受託人做成遺囑", "遺囑做成後可再更新", "由遺囑執行人將財產移轉予受託人", "由受託人執行信託事務並出具報告書"], "ans": 0, "exp": "正解為選項1，此為反向題。遺囑信託係由「委託人（遺囑人）」做成遺囑，而非由受託人做成遺囑，故選項1敘述錯誤。遺囑做成後遺囑人得隨時更新或撤回（選項2對）、由遺囑執行人於委託人身故後將財產移轉予受託人（選項3對）、受託人執行信託事務並出具報告書（選項4對）。"}, {"q": "有關特定目的信託之概念，下列敘述何者錯誤？", "options": ["特定目的信託並無受益人之存在", "特定目的通常係指公益之目的", "確保寵物獲得充足照顧，為特定目的", "國外常有家族透過設立特定目的信託，確保家族財富及家族企業之永續傳承及管理"], "ans": 1, "exp": "正解為選項2，此為反向題。特定目的信託之「特定目的」不以公益目的為限，亦可為私益性質之特定目的（如照顧寵物、家族財富永續傳承），故選項2說「特定目的通常係指公益之目的」錯誤。特定目的信託並無確定受益人之存在（選項1對）、確保寵物獲充足照顧屬特定目的（選項3對）、國外常用以確保家族財富及企業永續傳承（選項4對）。"}, {"q": "A 閉鎖性股份有限公司（下稱A 公司）為某家族企業之家族控股公司，若A 公司擬依中華 民國信託業商業同業公會所公布之「家族信託契約參考範本」，與B 銀行成立家族信託，有 關信託財產之管理或處分方法，下列敘述何者正確？", "options": ["係採集合管理運用，受託人有運用決定權", "係採共同管理運用，受託人有運用決定權", "係採單獨管理運用，受託人無運用決定權", "併採集合管理運用與單獨管理運用，受託人有運用決定權"], "ans": 2, "exp": "正解為選項3。依信託業商業同業公會公布之「家族信託契約參考範本」，家族信託之信託財產管理或處分方法係採「單獨管理運用，受託人無運用決定權」（即依委託人指示辦理之指定單獨管理運用信託性質），以保留委託人對家族財產之掌控，故選項3正確，並非集合管理或受託人有運用決定權之模式。"}, {"q": "依據家族信託契約參考範本，下列何者為委託人得指示辦理之事項？ A.行使信託股票之 股東權及相關權利 B.以信託股票辦理質押 C.將信託股票出售 D.分配信託收益", "options": ["僅ABD", "僅ACD", "僅AD", "僅D"], "ans": 1, "exp": "正解為選項2，僅ACD。依家族信託契約參考範本，委託人得指示辦理之事項包括：A.行使信託股票之股東權及相關權利、C.將信託股票出售、D.分配信託收益。B.以信託股票辦理質押則非屬委託人得指示辦理之事項（涉及信託財產設質之限制），故正確組合為ACD，選項2正確。"}, {"q": "有關信託監察人敘述，下列何者錯誤？", "options": ["其功能在維護受益人之利益", "可代受益人行使權利而享受信託利益", "信託監察人有正當事由，得經選任之人同意後辭任", "為避免不當解任信託監察人，委託人可於契約預先拋棄其解任權"], "ans": 1, "exp": "正解為選項2，此為反向題。信託監察人之功能在於以「自己名義」為受益人之利益行使有關權利、監督受託人，以維護受益人利益，但其本身「並不享受信託利益」，故選項2說「可代受益人行使權利而享受信託利益」錯誤。其功能在維護受益人利益（選項1對）、有正當事由得經選任人同意後辭任（選項3對）、委託人得於契約預先拋棄解任權以防不當解任（選項4對）。"}, {"q": "下列何者非屬信託傳承資產的優點？", "options": ["財產的安全性", "財產的隱密性", "自己管理財產的自主性", "信託利益的分配具有彈性"], "ans": 2, "exp": "本題為反向題，問何者「非」優點。信託傳承的優點在於財產安全性、隱密性與分配彈性；但成立信託後財產移轉予受託人管理，委託人本人即喪失「自己管理財產的自主性」，此為信託的特性而非優點，故選項3為正解。"}, {"q": "依我國信託法規定，信託乃信託關係人間存在以何者為中心之法律關係？", "options": ["人", "契約", "費用", "財產權"], "ans": 3, "exp": "我國信託法所定信託，係委託人移轉「財產權」予受託人，由受託人為受益人利益或特定目的管理處分，故信託係以「財產權」為中心之法律關係，選項4正確。人、契約、費用均非信託關係之中心標的。"}, {"q": "有關家族信託之概念，下列敘述何者正確？", "options": ["家族信託皆以遺囑方式成立", "家族信託可結合保險金信託業務", "增進員工福利為主要目的之專業管理模式", "透過信託架構管理家族財產非用以防止突發事件"], "ans": 1, "exp": "本題問何者正確。家族信託可結合保險金信託業務（將保險理賠金交付信託管理、分配），故選項2正確。家族信託不限以遺囑方式成立（可契約成立）、以增進員工福利為主係員工福利信託而非家族信託、家族信託正可用以防範突發事件，選項1、3、4均錯誤。"}, {"q": "有關日本遺囑代用信託之敘述，下列何者錯誤？", "options": ["為契約信託", "為設有順位受益人之信託", "為類似安養信託結合遺囑信託之方式", "為遺囑信託"], "ans": 3, "exp": "本題為反向題。日本「遺囑代用信託」係以信託契約方式成立（生前契約），設有順位受益人，功能上類似安養信託結合遺囑信託，於委託人生前即生效並於其身故後由指定人受益；其本質為「契約信託」而非「遺囑信託」，故選項4錯誤。"}, {"q": "顧問建議王董事長可透過「家族信託」方式進行股權規劃，下列敘述何者正確？", "options": ["信託成立後，王董事長仍可保留受益人與受託人雙重身分", "信託財產必須完全由公司董事會同意後方可移轉", "受益人可依約定分配信託利益，避免未來繼承爭議", "信託成立時，不視為贈與，僅於受益人實際取得利益時課稅"], "ans": 2, "exp": "本題問何者正確。家族信託得依約定將信託利益分配予受益人，達到提前規劃、避免日後繼承爭議之目的，故選項3正確。委託人不得同時保留受益人與受託人雙重身分而架空信託（選項1錯）、信託財產移轉不以董事會同意為要件（選項2錯）、他益信託成立時即發生贈與並課贈與稅而非待實際取得時（選項4錯）。"}, {"q": "有關信託業者因擔任受託人而為公司股東之法制注意事項，下列敘述何者正確？", "options": ["信託業擔任受託人取得自己公司股票時不可行使表決權", "信託業擔任受託人取得自己公司股票時可以擔任自己公司之董事", "信託業擔任受託人取得其他公司過半股權時，則信託業者與該公司具有控制從屬關係", "信託業擔任受託人取得公開發行公司股票時，若無運用決定權，則無辦理股權申報之義 務"], "ans": 3, "exp": "本題問何者正確。信託業擔任受託人取得公開發行公司股票時，若對該股票「無運用決定權」，則非實質持有人，無辦理股權（內部人持股）申報之義務，故選項4正確。取得自己公司股票時並非一律不得行使表決權（選項1過於絕對）、不得擔任自己公司董事、且持股過半未必即構成控制從屬關係（須視運用決定權歸屬），選項1、2、3敘述均有誤。"}, {"q": "有關法務部函釋信託契約約定連續受益人安排，下列敘述何者錯誤？", "options": ["在現行信託法法律體系下可行", "該安排具有彈性，故信託約款可概括約定，致信託存續期間形同不定期", "受益人不以信託行為成立時存在為必要，但須可得確定", "該安排於信託利益分配時，受益人需確係存在"], "ans": 1, "exp": "本題為反向題。法務部函釋雖肯認連續受益人安排於現行信託法下可行，但信託期間仍須受合理限制，信託約款不得概括約定致信託形同「不定期」存續，故選項2敘述錯誤。受益人不以信託成立時存在為必要但須可得確定、且於信託利益分配時受益人需確係存在，均為正確之要件。"}, {"q": "有關信託財產之管理及處理相關規範，下列何者錯誤？", "options": ["信託業不得以信託財產借入款項", "有價證券轉讓出售應依受益人書面指示為之", "信託財產為金錢時，受託人應開設信託專戶辦理存款", "以開發為目的之土地信託，契約約定經全體受益人同意或經受益人會議決議者，得以信 託財產借入款項"], "ans": 1, "exp": "本題問何者錯誤。信託業運用信託財產買賣有價證券應依信託契約約定及運用方法為之，並非一律以「受益人書面指示」為要件，故選項2敘述錯誤。信託業原則不得以信託財產借入款項（選項1）、金錢信託應開設信託專戶（選項3）、以開發為目的之土地信託經全體受益人同意或受益人會議決議得借入款項（選項4），均為正確之管理處分規範。"}, {"q": "有關信託財產的敘述，下列何者錯誤？", "options": ["信託財產須可依金錢計算其價值之權利", "信託成立後，信託財產即移轉登記於受託人名下", "只限於信託成立時委託人交付給受託人的財產權", "以依法不得受讓特定財產權之人為該財產權之受益人者，該信託行為無效"], "ans": 2, "exp": "本題問何者錯誤。信託財產不以信託成立時委託人交付者為限，信託存續中因信託財產之管理、處分、滅失、毀損或其他事由所取得之財產權，亦屬信託財產，故選項3稱「只限於信託成立時交付」係錯誤。信託財產須為得以金錢計算價值之權利（選項1）、信託成立後移轉登記於受託人名下（選項2）、以依法不得受讓該財產權之人為受益人者信託行為無效（選項4），均屬正確。"}, {"q": "在高資產客戶的家族企業傳承中，很容易出現接班的問題，特別是企業主沒有做出任何決 定就去世了，很可能會發生內部爭奪繼承權，為使企業主可以順利安排接班人，可以使用 下列何種信託做規劃？", "options": ["安養信託", "員工持股信託", "股權控管信託", "證券投資信託"], "ans": 2, "exp": "企業主為避免未及安排接班即身故而生繼承權爭奪，可運用「股權控管信託」將家族企業股權交付信託，由信託架構統一管理股權並依信託約定行使表決權，達成接班安排與股權穩定，故選項3正確。安養信託、員工持股信託、證券投資信託之目的各為養老照顧、員工福利、證券投資管理，均非為企業接班股權控管而設。"}, {"q": "規劃個人財產信託時，常建議委託人選任信託監察人，下列敘述何者錯誤？", "options": ["信託監察人有正當事由時，得經選任之人同意後辭任", "委託人不能事先拋棄解任信託監察人之權利", "信託監察人可依信託法為受益人為訴訟之行為", "信託監察人可依信託法為受益人為訴訟外之行為"], "ans": 1, "exp": "本題問何者錯誤。依信託法，委託人或受益人對信託監察人之解任權，並無「不得事先拋棄」之強制規定，選項2敘述與法理不符，故為錯誤。信託監察人有正當事由經選任人同意得辭任（選項1）、信託監察人得以自己名義為受益人為訴訟上及訴訟外之行為（選項3、4），均屬信託法所定之正確內容。"}, {"q": "家族信託中，委託人於信託契約中訂定家族受益人不得轉讓其受益權予非家族成員之約定， 具有契約效力，依現行司法實務見解，可否排除受益人之債權人強制執行？", "options": ["可以排除受益人之債權人強制執行", "僅能對抗惡意或具有重大過失之第三人", "以信託財產已為登記或註冊為限，可以對抗受益人之債權人強制執行", "無法排除受益人之債權人強制執行"], "ans": 3, "exp": "依現行司法實務見解，信託契約中受益人不得轉讓受益權予非家族成員之約定，僅具當事人間之契約（債權）效力，不能對抗第三人，無法排除受益人之債權人對該受益權之強制執行，故選項4正確。此種約定既不能一律排除執行，也非僅對抗惡意第三人或以登記為要件即可對抗，故選項1、2、3錯誤。"}, {"q": "張董事長思考2 個方案，其中甲方案為先將C 公司股權以股作價成立閉鎖性公司，再由閉 鎖性公司擔任委託人與受益人之自益信託，信託財產為C 公司；乙方案由張董事長擔任委 託人，閉鎖性公司擔任受益人之他益信託（委託人無保留變更受益人權利，且已針對成立 繳付贈與稅），信託財產為C 公司。假定張董事長生前皆將所持有之閉鎖性公司股份全數移 轉給小孩，請問針對2 方案之可行性，下列敘述何者正確？", "options": ["如採取甲方案，張董事長過世後，信託財產仍須列為張董事長之遺產", "如採取乙方案，張董事長過世後，信託財產仍須列為張董事長之遺產", "如採取乙方案，可以在信託契約中約定由張董事長針對C 公司行使股東會權利", "如採取甲方案，即使在信託契約中約定信託存續期間由張董事長針對C 公司行使股東會 權利，當閉鎖性公司股份全數移轉給小孩後，雖張董事長仍在世，但該權利也會自然消 失 第二部分：第41~60 題（每題2 分）"], "ans": 2, "exp": "本題問何者正確。乙方案由張董事長為委託人、閉鎖性公司為受益人之他益信託，得於信託契約中約定信託存續期間由委託人張董事長就C公司行使股東會權利，以保留控制權，故選項3正確。甲方案為閉鎖性公司自益信託，張董身故後信託財產屬閉鎖性公司資產而非其個人遺產（選項1錯）；乙方案已完成他益贈與，信託財產不再列為其遺產（選項2錯）；甲方案中股東權利之行使約定不因股份移轉子女而自然消滅（選項4錯）。"}, {"q": "在家族傳承中，後代子孫通常是信託利益的受益人，在此一他益信託成立後，若信託契約 未載明保留變更受益人之受益權，如欲變更受益人須經下列何者同意？", "options": ["委託人之債權人", "受益人", "受託人", "信託監察人"], "ans": 1, "exp": "他益信託成立後，若信託契約未保留變更受益人之權利，受益權已確定歸屬於受益人，欲變更受益人即屬處分受益人既得之權利，須經「受益人」同意，故選項2正確。委託人之債權人、受託人或信託監察人之同意均非變更受益人之法定要件。"}, {"q": "於家族財富傳承搭配信託之架構中，下列何者屬於身後傳承之信託商品？", "options": ["以子女為受益人之生存險保險金信託", "本金自益孳息他益之股票信託", "自益信託+剩餘信託財產之死因贈與", "以股權成立之企業傳承信託"], "ans": 2, "exp": "本題問何者屬「身後傳承」之信託商品。「自益信託＋剩餘信託財產之死因贈與」係以委託人死亡為生效要件，於委託人身故後始將剩餘信託財產移轉受益人，屬身後傳承架構，故選項3正確。以子女為受益人之生存保險金信託、本金自益孳息他益之股票信託、以股權成立之企業傳承信託，多於委託人生前即發生信託利益移轉或運作，非以身後為生效核心，故非本題所指。"}, {"q": "高資產客戶家族企業傳承時，為充分反應企業主的掌控意願及防止企業股權行使有空窗期 風險，故企業主可規劃辦理「股權控管信託」，下列敘述何者錯誤？", "options": ["以企業主為委託人，以接班子女為受益人辦理他益信託", "企業主將家族企業股票交付信託", "信託期間仍然由企業主以股東名義出席股東會行使股東權利", "可約定信託契約之終止變更須經信託監察人同意"], "ans": 2, "exp": "本題問何者錯誤。股權控管信託係將家族企業股票交付信託，股票所有權及股東名義已移轉受託人，股東會權利原則上由受託人依信託約定行使（或約定由委託人指示），而非仍「由企業主以股東名義」出席行使，故選項3敘述錯誤。以企業主為委託人、接班子女為受益人之他益信託、交付企業股票、約定終止變更須經信託監察人同意（選項1、2、4），均屬正確規劃。"}, {"q": "有關信託法上受託人之敘述，下列何者錯誤？", "options": ["未成年人不得為受託人", "破產人不得為受託人", "受託人為以經營信託為業之機構，須受信託業法規範", "受託人接受委託人財產之移轉成為財產權的實質所有人"], "ans": 3, "exp": "信託係委託人將財產權移轉予受託人，受託人取得財產之形式（名義）所有權，但須為受益人利益管理處分，並非取得「實質」所有權，信託財產仍具獨立性，故選項4錯誤。未成年人、破產人不得為受託人、信託業機構受信託業法規範，均為正確敘述。"}, {"q": "信託成立後最長多久時間內，委託人或其遺產受破產之宣告者，推定其行為有害債權？", "options": ["三個月", "六個月", "九個月", "一年"], "ans": 1, "exp": "信託法規定信託成立後六個月內，委託人或其遺產受破產宣告者，推定其行為有害於債權，故選項2正確。此為保護債權人、防止藉信託脫產之規定。"}, {"q": "依信託法相關規定，對於信託財產訂有特別之保護措施，使信託財產具有獨立性。下列何 者非屬信託財產獨立性之規定？", "options": ["受託人死亡時，信託財產不屬於其遺產", "受託人破產時，信託財產不屬於其破產財團", "受託人因信託財產之處分而取得之財產權，仍屬信託財產", "屬於信託財產之債權與不屬於該信託財產之債務不得互相抵銷"], "ans": 2, "exp": "信託財產獨立性之規定包括：受託人死亡時不屬其遺產、破產時不屬其破產財團、信託財產債權債務不得與固有財產抵銷等。選項3「受託人因信託財產處分取得之財產權仍屬信託財產」係物上代位（信託財產同一性）之規定，並非獨立性之規定，故為正確答案。"}, {"q": "依據中華民國信託業商業同業公會所研訂「銀行高資產客戶財富管理業務實務參考文件」 所建議家族信託之運用模式，若為閉鎖性股份有限公司結合信託，且不涉及家族治理及家 族辦公室，其運用模式之名稱為下列何者？", "options": ["簡易模式", "複雜模式", "普通模式", "傳統模式"], "ans": 2, "exp": "依信託公會所訂「銀行高資產客戶財富管理業務實務參考文件」，家族信託運用模式分為簡易模式、普通模式與複雜模式；閉鎖性股份有限公司結合信託但不涉及家族治理及家族辦公室者，屬「普通模式」，故選項3正確。"}, {"q": "甲君想成立他益信託，架構為甲君將所持有之乙公司股票交付信託，丙君及丁君為受益人。 請問針對甲君之規劃，下列敘述何者錯誤？", "options": ["可以設定信託於甲君死亡即終止", "不得設定信託於甲君喪失行為能力而終止", "甲君可在信託契約約定在甲君存活時，由甲君指示受託人參與乙公司股東會，行使股東 會權利", "甲君可在信託契約約定在甲君死亡時，由屬意之人（非丙君、非丁君）指示受託人參與 乙公司股東會，行使股東會權利"], "ans": 1, "exp": "他益信託得約定於委託人喪失行為能力時終止，並無不得約定之限制，故選項2「不得設定信託於甲君喪失行為能力而終止」錯誤。得約定甲死亡即終止、甲存活時由甲指示行使股東會權利、約定甲死亡後由屬意之人指示行使，均屬契約自由得約定之事項。"}, {"q": "關於信託成立時受益人是否須已存在，法務部對於信託法之最新解釋為何？", "options": ["信託成立時，受益人為自然人者，至少應是胎兒", "信託成立時，受益人必須已經出生而具有權利能力", "信託成立時，至少要有一位受益人已經確定存在", "受益人不以信託成立時存在或特定為必要，但須可得確定"], "ans": 3, "exp": "依法務部對信託法之最新解釋，信託成立時受益人不以已存在或特定為必要，但須屬「可得確定」即可（例如將來出生之人、特定範圍內之人），故選項4正確。因此受益人不必於成立時已出生、已具權利能力或已確定存在。"}, {"q": "委託人死亡後，有關委託人地位之繼承，下列何者屬於得由委託人之繼承人行使信託法賦 予委託人之權利？", "options": ["信託利益全部由委託人享有者，委託人得隨時終止信託", "信託財產之管理方法，得經委託人、受託人及受益人之同意變更", "委託人得請求閱覽、抄錄或影印信託財產目錄及收支計算表等文書", "受託人違背其職務或有其他重大事由時，委託人得聲請法院將其解任"], "ans": 0, "exp": "委託人死亡後，其繼承人得行使之委託人權利，以「信託利益全部由委託人享有者，委託人得隨時終止信託」之終止權為代表（屬自益信託終止權，可由繼承人承繼行使），故選項1正確。變更管理方法須委託人、受託人、受益人三方同意、閱覽抄錄信託文書、聲請法院解任受託人等，多屬受益人之權利或須各方參與，並非當然由委託人繼承人單獨行使。"}, {"q": "甲為執業會計師，負責多家中小企業之記帳及簽證業務，並提供稅務規劃諮詢服務。若A 銀行為發展家族信託業務，擬與甲會計師進行委外推廣暨異業結盟，有關雙方合作模式之 敘述，下列何者正確？", "options": ["A 銀行得與甲簽訂合作契約，由甲為A 銀行轉介家族信託商品", "A 銀行得與甲簽訂合作契約，由甲為A 銀行推介家族信託商品", "A 銀行得與甲簽訂家族信託之作業委外契約，由甲行銷家族信託商品", "不論甲為A 銀行推介或轉介家族信託商品，甲均應具備信託業務人員資格"], "ans": 0, "exp": "依信託業務委外及異業結盟之規範，銀行（信託業）得與會計師等第三人簽訂合作契約，由其為銀行「轉介」客戶（單純介紹、不涉及商品推介及招攬），故選項1正確。「推介」屬招攬性質，須具信託業務人員資格且不得任意委由外部人員為之；信託招攬業務不得作業委外由外部行銷（選項3錯）；「轉介」通常不要求具信託業務人員資格，選項4將推介、轉介一概要求具資格之說法錯誤。"}, {"q": "有關周爸爸成立遺囑信託之流程，下列何者錯誤？", "options": ["遺囑執行人依遺囑信託內容於信託期間管理運用信託財產", "信託監察人並非必要設置", "受託人依遺囑信託內容給付信託財產予受益人", "由遺囑執行人協助完納遺產稅後交付信託財產"], "ans": 0, "exp": "遺囑信託成立後，係由「受託人」依遺囑信託內容於信託期間管理運用信託財產，遺囑執行人之任務在於執行遺囑、協助辦理遺產稅及將信託財產交付受託人，並非由遺囑執行人於信託期間管理運用信託財產，故選項1錯誤為本題答案。信託監察人非必要設置、受託人依信託內容給付受益人、遺囑執行人協助完納遺產稅後交付信託財產，均為正確敘述。"}, {"q": "受益人不特定、尚未存在或其他為保護受益人之利益認有必要時，法院得因利害關係人或 下列何者之聲請，選任信託監察人？", "options": ["律師", "檢察官", "公證人", "社會福利團體"], "ans": 1, "exp": "正解為選項2。信託法規定受益人不特定、尚未存在或為保護受益人利益有必要時，法院得因利害關係人或「檢察官」之聲請，選任信託監察人，故選項2正確。律師、公證人、社會福利團體並非法定得聲請選任之主體。"}, {"q": "於信託契約中為連續受益人之安排，在現行法律體系下，尚無窒礙，倘依信託約款所定方 式，可得確定其受益人，而於下列哪個時點確係存在者，尚非法所不許？", "options": ["信託行為成立時", "信託契約簽訂時", "信託利益分配時", "信託關係消滅時"], "ans": 2, "exp": "正解為選項3。連續受益人之安排，依信託約款所定方式可得確定，且於「信託利益分配時」受益人確係存在者，尚非法所不許（即此時點受益人存在即為合法），故選項3正確。信託行為成立時、契約簽訂時或關係消滅時，受益人未必皆需存在，非本題判準時點。"}, {"q": "根據法務部解釋，信託契約之委託人過世後，委託人於信託契約之各項權利是否當然均由 其繼承人繼承？", "options": ["是，依民法繼承編規定當然繼承", "否，因信託契約非屬得繼承之標的", "否，若《信託法》所規定委託人權利其目的是為保護受益人，該權利不得繼承", "視遺囑內容而定"], "ans": 2, "exp": "正解為選項3。依法務部解釋，委託人於信託契約之權利非當然全由繼承人繼承；若該權利依信託法之規定其目的係為保護受益人者，性質上具專屬性，不得由繼承人繼承，故選項3正確。選項1當然繼承、選項2一律不得繼承、選項4視遺囑而定，均不符該解釋意旨。"}, {"q": "有關宣言信託之敘述，下列何者錯誤？", "options": ["委託人即為受託人", "自然人可設立", "屬單獨行為", "僅法人為公益目的得經決議對外成立"], "ans": 1, "exp": "正解為選項2（敘述錯誤者）。宣言信託係委託人以單獨行為宣示自己為受託人（委託人即受託人），我國法下僅限「法人為公益目的並經決議」始得對外成立，自然人不得設立宣言信託，故選項2「自然人可設立」錯誤。選項1委託人即受託人、選項3屬單獨行為、選項4僅法人為公益目的經決議成立，均屬正確。"}, {"q": "A 銀行為B 金融控股公司之全資子銀行，若C 閉鎖性股份有限公司（下稱C 公司）將所持 有之D 股份有限公司（下稱D公司）之股份共300 萬股及新臺幣2,000 萬元，與A 銀行依 照中華民國信託業商業同業公會所公布之「家族信託契約參考範本」簽訂家族信託契約，並 約定A 銀行對信託財產不具運用決定權，關於信託財產之管理或處分，下列敘述何者正確？", "options": ["A 銀行得自行決定對D 公司行使股東權", "C 公司得指示A 銀行以D 公司之股票質押或供擔保，借入款項", "C 公司得指示A 銀行以信託財產購買B 金融控股公司所發行之有價證券", "D 公司股票為信託過戶登記後，A 銀行得將其自有之D 公司股票與屬信託財產之D 公 司股票集合管理"], "ans": 2, "exp": "正解為選項3。本題依家族信託契約範本，A銀行對信託財產不具運用決定權，故行使股東權、質押借款等須由委託人C公司指示，而非A銀行自行決定；且C公司得指示A銀行以信託財產購買B金控（A銀行母公司）發行之有價證券（在指示權架構下不受自行運用之利害衝突限制），故選項3正確。選項1A銀行不得自行行使股東權、選項2不得以信託股票質押借款、選項4不得將自有股票與信託財產集合管理，均錯誤。"}, {"q": "甲君與小孩乙君想透過信託來管理家族重要資產A 上市公司股票，針對相關安排，下列敘 述何者錯誤？", "options": ["甲君可成立他益信託，委託人為甲君、信託受益人為乙君", "甲君贈與股票給乙君，再由乙君成立自益信託，委託人為乙君、信託受益人為乙君", "甲君可選定順位制信託監察人及遞補機制，並可由委託人與剩餘信託監察人共同選任後 續之信託監察人", "甲君以股作價成立閉鎖性股份有限公司（丙公司），由丙公司持有A 上市公司股票，丙公 司可將A 上市公司股票交付信託，但此信託之信託監察人依法規必須由甲君擔任"], "ans": 3, "exp": "正解為選項4（敘述錯誤者）。閉鎖性公司（丙公司）將A股票交付信託，其信託監察人並無「依法規必須由甲君擔任」之強制規定，得依信託契約另行選定，故選項4錯誤。選項1得成立委託人甲、受益人乙之他益信託、選項2得先贈與再由乙成立自益信託、選項3得設順位制信託監察人及遞補機制，均屬正確安排。"}, {"q": "有關中央銀行放寬銀行擔任受託人時，可憑相關文件，代受益人辦理新臺幣結匯申報之規 定，下列敘述何者錯誤？", "options": ["可適用於老人安養為目的之外幣信託", "因委託人具行為能力，此規定僅限他益信託", "可適用於身心障礙者照護為目的之外幣信託", "如於信託契約約定由委託人授權受託人辦理結匯，得以受託人出具已獲授權辦理結匯之 聲明書代替委託人出具之結匯授權書"], "ans": 1, "exp": "正解為選項2（敘述錯誤者）。中央銀行放寬銀行受託人代受益人辦理新臺幣結匯申報之規定，適用於老人安養、身心障礙照護等目的之外幣信託，並未限定「僅限他益信託」，故選項2錯誤。選項1老人安養外幣信託、選項3身障照護外幣信託均得適用、選項4得以受託人聲明書代替委託人結匯授權書，均屬正確。 --- ## Related Concepts - [[04-信託法與信託架構]] - [[05-信託稅制]] - [[06-境外信託]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "甲公司為長期照顧因公受傷的乙員工，特提撥100 萬元交付丙信託業者成立他益信託，並 指定乙員工為受益人。乙員工應將此100 萬元之信託利益權利價值，併入哪一年度之所得 額課徵所得稅？", "options": ["信託成立年度", "信託利益給付年度", "信託財產投資年度", "信託財產孳息所得發生年度"], "ans": 0, "exp": "正解為選項1。甲公司提撥資金成立他益信託並指定乙為受益人，屬委託人與受益人不同之他益信託，受益人乙取得信託利益之權利價值，應於「信託成立年度」併入其所得額課稅，故選項1正確。其餘給付年度、投資年度、孳息發生年度均非他益信託受益人課稅之認定時點。"}, {"q": "遺產捐贈或加入被繼承人死亡時已成立之公益信託，可不計入遺產總額，該信託應符合的 條件，不包括下列何者？", "options": ["受託人須為信託業", "信託監察人須為公正專業人士", "除為其設立目的舉辦事業而必須支付之費用外，不以任何方式對特定或可得特定之人給 予特殊利益", "明定信託關係解除、終止或消滅時，信託財產移轉於各級政府、有類似目的之公益法人 或公益信託"], "ans": 1, "exp": "正解為選項2。遺產捐贈或加入公益信託得不計入遺產總額，所要求之條件為受託人須為信託業、不對特定人給予特殊利益、信託消滅時財產移轉於各級政府或類似目的之公益法人或公益信託；至於「信託監察人須為公正專業人士」並非該不計入遺產之法定要件，故選項2不包括在內。選項1、3、4均為所應符合之條件。"}, {"q": "以公益信託方式辦理家族慈善時，根據信託公會會員辦理公益信託最佳實務準則的規定， 公益信託之信託資產總額達新臺幣三千萬元（含）以上者，依信託本旨所為之年度公益支 出，除信託成立當年度外，原則上應不低於前一年底信託資產總額多少？", "options": ["百分之一", "百分之二", "百分之三", "百分之五"], "ans": 0, "exp": "正解為選項1。依信託公會會員辦理公益信託最佳實務準則，信託資產總額達新臺幣三千萬元（含）以上者，除成立當年度外，每年依信託本旨所為之年度公益支出原則上不低於前一年底信託資產總額之百分之一，故選百分之一。"}, {"q": "劉總為所持股票的公司董事，他今年想做本金自益孳息他益信託以節省贈與稅，該信託契 約應該最晚在何時簽訂，方可達成目的？", "options": ["股東會前", "任何時間", "董事會前", "前一年度的第一季底前 第二部分：第41~60 題（每題2 分）"], "ans": 2, "exp": "正解為選項3。本金自益孳息他益信託係以委託人保留本金、將孳息（盈餘）贈與受益人，為使所贈與之盈餘係屬「未分配前」之孳息以達節稅目的，信託契約應在公司「董事會」（決議盈餘分配）前簽訂，方能成立；若於董事會後簽訂則盈餘已具體確定，課稅基礎不同。故選董事會前。"}, {"q": "甲、乙兩兄弟合夥創立Brother 企業，甲年事已高，想要將其部分財產贈與獨子A 及已成年 孫子B，但又擔心贈與財產會被詐騙，因此想要辦理信託，由甲擔任委託人，乙擔任受託 人，A、B 為受益人且受益權各半。信託契約未載明保留變更受益權之比例，有關此類型信 託下列敘述何者錯誤？", "options": ["屬於民事信託", "須受信託法的約束，但不受信託業法的規範", "信託成立後，甲如需變更A、B 兩人之受益權比例，需取得受益人同意", "甲於訂定契約當日即需備妥相關證明文件向其戶籍所在地國稅局辦理贈與稅申報"], "ans": 3, "exp": "正解為選項4。他益信託之贈與稅申報義務，原則於信託「成立日」起辦理，惟本題以「訂定契約當日即需備妥文件辦理」為過於絕對之敘述，與實務申報期間（成立後一定期間內申報）不符，故選項4錯誤。選項1屬民事信託、選項2受信託法約束但不受信託業法規範、選項3未保留變更權者變更受益權比例須受益人同意，均屬正確。"}, {"q": "有關個人簽訂孳息他益的股票信託，委託人對被投資公司的盈餘分配具有控制權而被實質 課稅，當受託人交付孳息給受益人時，該對誰課什麼稅？", "options": ["受益人的所得稅", "委託人的贈與稅", "委託人的所得稅", "受託人的所得稅"], "ans": 1, "exp": "正解為選項2。孳息他益之股票信託，若委託人對被投資公司盈餘分配具控制權而被實質課稅，受託人交付孳息予受益人時，係視為委託人對受益人之贈與，應對「委託人」課徵贈與稅，故選項2正確。並非對受益人或受託人課所得稅、亦非對委託人課所得稅。"}, {"q": "父以所有作農業使用之農業用地成立他益信託，將孳息以外信託利益權利歸屬其子。則成 立時應課稅負，下列敘述何者正確？", "options": ["應計委託人父贈與總額課贈與稅", "作農業使用之農業用地免納稅", "受益人就孳息以外信託利益課所得稅", "由受益人就孳息以外信託利益繳交贈與稅"], "ans": 0, "exp": "正解為選項1。父以農業用地成立他益信託、將孳息以外之信託利益歸屬其子，屬委託人對受益人之贈與，成立時應就該信託利益權利價值計入委託人（父）之贈與總額課徵贈與稅，故選項1正確。贈與稅之納稅義務人為贈與人父而非受益人子，且此情形非屬免納，課所得稅或由受益人繳贈與稅之敘述均錯誤。"}, {"q": "企業負責人王先生成立了一份家族企業之股權信託，以自己為第一順位受益人並指定家族 成員王美美為第二順位受益人，約定王先生於信託期間過世時王美美始得以受益人身分享 有全部信託利益，而下列敘述何者正確？", "options": ["王先生成立的家族企業之股權信託屬於「遺囑信託」", "王先生於信託契約約定於過世時受益權由王美美享有，屬於遺贈", "王美美若比王先生早過世，其過世時原應享有之受益權應課徵贈與稅", "王美美於王先生過世時始得實際享有受益權，構成死因贈與"], "ans": 3, "exp": "正解為選項4。王先生以自己為第一順位受益人、約定其過世時王美美始享有全部信託利益，王美美之受益權以王先生死亡為生效要件，性質上構成「死因贈與」，故選項4正確。選項1此為生前成立之信託契約非遺囑信託、選項2非遺贈、選項3王美美若先於王先生死亡其受益權尚未實際取得不發生課贈與稅，均屬錯誤。"}, {"q": "為避免資產太早分配給小乙，會導致其不努力工作，因此成立由小乙擔任信託受益人之信 託，且委託人無保留變更受益人及分配、處分信託利益之權利時，下列信託安排何者錯誤？", "options": ["可約定小乙創業時，給付創業基金500 萬元", "可約定小乙購屋自住時，由信託支付購屋款項", "可約定小乙念大學時，每月3 萬元之生活費；小乙念研究所時，每月4 萬元之生活費", "雖然委託人已交付信託財產，但要等到款項實際分配給小乙時，才須對委託人課徵贈與 稅"], "ans": 3, "exp": "正解為選項4。委託人成立他益信託且未保留變更受益人及分配處分之權利者，係屬確定之贈與，應於信託「成立時」對委託人課徵贈與稅，而非等到款項實際分配給小乙時才課，故選項4錯誤。選項1約定創業基金、選項2約定購屋款項、選項3約定就學期間生活費等分階段給付安排，均屬可行之信託條款。"}, {"q": "有關資產之所得敘述，下列何者錯誤？", "options": ["個人來自未上市股票之資本利得應列入個人綜所稅課稅", "投資公司收到國內上市公司之股利免稅", "個人收到短期票券利息應按10%分離課稅", "個人交易國內上市之ETF 之資本利得免所得稅"], "ans": 0, "exp": "正解為選項1。我國現制下個人證券交易所得停徵所得稅，未上市櫃股票之資本利得屬證券交易所得性質，不列入綜合所得稅課徵（雖可能涉及最低稅負），故選項1敘述錯誤。投資公司（營利事業）取得國內上市公司股利免計入所得課稅（選項2對）、個人短期票券利息按10%分離課稅（選項3對）、個人交易國內上市ETF資本利得屬證券交易所得免所得稅（選項4對）。"}, {"q": "依據所得稅法規定，自107 年度起，營利事業當年度盈餘未分配，應加徵百分之幾的營利 事業所得稅？", "options": ["3%", "5%", "10%", "20%"], "ans": 1, "exp": "正解為選項2。依所得稅法規定，自107年度起營利事業當年度盈餘未分配者，加徵營利事業所得稅之稅率由原10%調降為「5%」，故正解為5%。"}, {"q": "某甲已70 餘歲，曾於3 年前以某上市櫃公司股票10 萬股成立全部他益信託，信託期間20 年，受益人為兒子，並依規定申報繳納贈與稅。今年考量退休安養需要，經兒子同意，變更 信託契約改為本金他益孳息自益，信託期間至某甲身故時止。依財政部函令規定，某甲已 繳納之贈與稅能否申請退還？", "options": ["不能", "可退還一半稅款", "可退還全部稅款", "可退還稅款之差額部分"], "ans": 0, "exp": "正解為選項1。某甲原成立他益信託並已申報繳納贈與稅，事後變更為「本金他益、孳息自益」，本金部分仍歸受益人（兒子）享有，他益之贈與本旨並未消滅，依財政部函令並無溢繳或重複課稅情形可資退還，故已繳之贈與稅不能申請退還。"}, {"q": "某甲交付某上市櫃公司股票10 萬股成立信託，惟目前受益人不特定且委託人無保留指定受 益人及分配、處分信託利益之權利。此案信託存續期間信託財產於所得發生年度依稅法規 定計算之所得，應以何人為納稅義務人依規定納稅？", "options": ["委託人", "受託人", "信託監察人", "待受益人特定時再一併申報繳稅"], "ans": 1, "exp": "正解為選項2。本案受益人不特定且委託人未保留指定受益人及分配、處分信託利益之權利，依稅法規定信託財產發生之所得，於所得發生年度應以「受託人」為納稅義務人，按規定稅率申報納稅，而非委託人、信託監察人或待受益人特定時再課（選項1、3、4錯）。"}, {"q": "受託人管理或處分信託財產而有銷售貨物或勞務者，除依法免徵營業稅外，應由何人報繳 營業稅？", "options": ["委託人", "受益人", "受託人", "受託人為自然人時由受益人報繳"], "ans": 2, "exp": "正解為選項3。依加值型及非加值型營業稅法相關規定，受託人因管理或處分信託財產而有銷售貨物或勞務者，除依法免徵營業稅外，應由「受託人」為營業稅之報繳義務人，與委託人、受益人或受託人是否為自然人無涉。"}, {"q": "下列何者不是引發公益信託「汙名化」被修法的爭議事由？", "options": ["公益信託成立規模，不等於直接投入金額，投入公益與規模完全不成比例", "靠投資或孳息收入做公益可永續經營，但收入並不完全透明，說好的「用公司獲利持續 做公益」，最後可能只流於內部人的黑箱作業", "「公益勸募條例」規定可勸募團體並未包含公益信託，造成公益信託無法參與公益團體 之聯合勸募活動，阻絕了公益信託善款的來源", "信託後本應由第3 方監督執行，結果諮詢委員及監察人全部都是委託人之關係人，引來 外界的質疑"], "ans": 2, "exp": "正解為選項3，此為反向題。公益信託被詬病修法之爭議主要包括：成立規模與實際公益投入不成比例（選項1）、收入不透明恐流於內部人黑箱（選項2）、諮詢委員及監察人均為委託人關係人欠缺第三方監督（選項4）。選項3將「公益勸募條例未納入公益信託」列為汙名化主因，並非當時引發修法的核心爭議事由，故為「不是」引發爭議的選項。"}, {"q": "以公益信託方式辦理家族慈善時，根據信託公會會員辦理公益信託最佳實務準則的規定， 公益信託之信託資產總額未達新臺幣三千萬元者，其依信託本旨所為之年度公益支出金額， 除信託成立當年度外，應不低於該年度之何種標準？", "options": ["公益信託的孳息收益", "公益信託的捐助收入", "信託資產總額之百分之一", "公益信託行政管理費"], "ans": 3, "exp": "正解為選項4。依信託公會會員辦理公益信託最佳實務準則，信託資產總額未達新臺幣三千萬元之公益信託，除成立當年度外，其年度公益支出金額應不低於「該年度行政管理費用」之標準，藉以避免公益支出過低淪為空殼，故正解為公益信託行政管理費。"}, {"q": "以公益信託方式辦理家族慈善時，根據信託公會會員辦理公益信託最佳實務準則的規定， 公益信託監察人應出具聲明書聲明其與該公益信託之委託人間，不具配偶或幾親等內親屬 關係？", "options": ["一親等", "二親等", "三親等", "四親等"], "ans": 2, "exp": "正解為選項3。依信託公會會員辦理公益信託最佳實務準則，公益信託監察人應出具聲明書，聲明其與委託人間不具配偶或「三親等內」親屬關係，以確保監察人之獨立性與第三方監督功能。"}, {"q": "吳董事長無法知悉未來配息狀況，由吳董事長擔任委託人，針對2 間上市公司辦理信託期 間5 年、本金自益孳息他益之股權信託（無論是否有必要），則下列敘述何者正確？", "options": ["本金自益孳息他益股權信託不得指定信託監察人", "如果吳董事長是公司A 之董事，須注意股權移轉過半解任之規定", "無論吳董事長是否保留運用決定權，交付信託即計入受託人之持股，不計入吳董事長（內 部人）持股數", "成立信託時，如交付公司A 作為信託財產須依郵政儲金匯業局一年期定期儲金固定利率 設算，須考慮贈與稅；如交付公司B 作為信託財產，不須依郵政儲金匯業局一年期定期 儲金固定利率設算，因此不須考慮贈與稅"], "ans": 1, "exp": "正解為選項2。吳董若為公司A之董事，辦理股權信託涉及股權移轉，須注意公司法關於董事在任期中轉讓持股超過二分之一即當然解任之規定，故選項2正確。本金自益孳息他益信託得指定信託監察人（選項1錯）；若委託人保留運用決定權，依規定仍應計入內部人持股（選項3敘述過於絕對而錯）；孳息他益之贈與價值須依郵局一年期定儲利率設算並考量贈與稅，不因公司虧損即一概免設算免稅（選項4錯）。"}, {"q": "假定吳董事長今年度辦理公司A 之本金自益孳息他益之股權信託，信託期間合計5 年，國 稅局核定之總贈與價值為300萬元，且後續本信託沒有被國稅局認定有其他贈與行為。該 信託收到A 股票配發之100 萬並配發給受益人女兒甲，有關信託稅務，下列敘述何者正確？", "options": ["100 萬元應列入吳董事長之所得", "300 萬元應列入吳董事長之所得", "100 萬元應列入吳董事長女兒甲之所得", "300 萬元應列入吳董事長女兒甲之所得"], "ans": 2, "exp": "正解為選項3。本案孳息他益信託國稅局已核定贈與價值300萬元（屬贈與，非吳董所得），實際配發予受益人女兒甲之孳息100萬元，於發生年度應列入「受益人女兒甲」之所得課稅，故選項3正確。100萬或300萬均非吳董之所得（選項1、2錯）；列入甲之所得者為實際取得之孳息100萬元而非贈與價值300萬元（選項4錯）。"}, {"q": "假定吳董事長已知本次公司A 每股配息金額，但仍辦理公司A 之本金自益孳息他益股權信 託，委託人及本金受益人為吳董事長，孳息受益人為女兒甲，依股票孳息他益信託實質課 稅函令規定，下列敘述何者正確？", "options": ["公司A 本次股息應列入吳董事長之所得", "公司A 本次股息應列入吳董事長女兒甲之所得", "受託人支付本次股息給受益人女兒甲時，該股息不列入吳董事長之贈與總額", "受託人支付本次股息給受益人女兒甲時，該股息應列入吳董事長女兒甲之所得"], "ans": 0, "exp": "正解為選項1。依股票孳息他益信託實質課稅函令，委託人「已知」配息資訊後仍辦理孳息他益信託者，視為以信託形式藉機分配，該股息應回歸列入「委託人吳董事長」之所得課稅（實質課稅原則），故選項1正確。因屬實質課稅歸委託人，故不應列為甲之所得（選項2、4錯），亦非單純不計入贈與總額之問題（選項3錯）。"}, {"q": "公司C 與公司D 皆為非上市櫃公司，但公司A 與公司C 為同一集團，且公司C 與公司A 具有控制與從屬關係，但公司D與公司A 無任何關係，亦與公司C 無任何關係，針對可將 信託財產投資於公司A 之員工持股信託，下列敘述何者正確？", "options": ["僅公司A 可辦理將信託財產投資於公司A 之員工持股信託", "僅公司A 與公司C 可辦理將信託財產投資於公司A 之員工持股信託", "僅公司A 與公司D 可辦理將信託財產投資於公司A 之員工持股信託", "公司A、公司C 與公司D 可辦理將信託財產投資於公司A 之員工持股信託 第二部分：第41~60 題（每題2 分）"], "ans": 1, "exp": "正解為選項2。員工持股信託得投資之標的，限於該辦理員工持股信託之公司本身及與其具控制與從屬關係之關係企業股票。公司C與公司A具控制從屬關係屬同一集團，公司D與A、C均無關係，故僅公司A與公司C可辦理將信託財產投資於公司A之員工持股信託，選項2正確。"}, {"q": "有關財政部賦稅署於2005 年公布的信託契約形式態樣及其稅捐核課原則，下列敘述何者錯 誤？", "options": ["信託契約有明定特定之受益人，委託人無保留指定受益人及分配、處分信託利益之權利， 則此種信託態樣屬於他益信託", "信託契約雖未明定特定之受益人但有範圍及條件，同時委託人無保留指定受益人或分配、 處分信託利益之權利，則此種信託態樣屬於他益信託", "信託契約未明定特定之受益人，也沒有明定受益人的範圍及條件，則此種信託態樣屬於 自益信託", "信託契約有明定特定之受益人，但委託人有保留變更信託財產營運範圍、方法之權利， 則此種信託態樣屬於自益信託"], "ans": 3, "exp": "正解為選項4，此為反向題。依財政部2005年信託契約形式態樣核課原則，委託人保留「變更信託財產營運範圍、方法」之權利，並不影響受益人之確定，受益人既經明定，仍屬「他益信託」而非自益信託，故選項4敘述錯誤。明定特定受益人且委託人未保留指定、處分權者為他益（選項1對）；未明定特定受益人但有範圍條件且未保留權利者亦屬他益（選項2對）；未明定受益人亦無範圍條件者屬自益（選項3對）。"}, {"q": "有關賦稅署2005 年信託契約形式態樣及其稅捐核課原則，下列敘述何者錯誤？", "options": ["若受益人不特定，且受益人受益與否及受益權利之範圍，由受託人自行裁量決定，則此 信託類型為裁量信託(Discretionary Trust)", "若受益人特定，且受益金額及範圍均已確定，受託人僅依契約辦理，無裁量權，則此信 託在課稅上，其所得稅納稅義務人為受託人", "若受益人特定，且委託人僅保留變更信託財產營運範圍、方法之權利，則此種信託態樣 於信託成立時，會核課贈與稅", "若受益人特定，但保留委託人可變更受益人或分配處分信託利益之權利，則此種信託態 樣於信託成立時，不核課贈與稅"], "ans": 1, "exp": "本題為反向題。賦稅署2005年信託契約形式態樣中，受益人特定且受益金額範圍均確定、受託人無裁量權者，其所得課稅係以「受益人」為納稅義務人（受託人僅為形式名義人、辦理扣繳），而非以受託人為納稅義務人，故選項2錯誤。裁量信託定義、保留營運範圍方法權利不影響成立時課贈與稅、保留變更受益人權利則成立時不課贈與稅，均屬正確。"}, {"q": "張董想將部分遺產捐贈公益信託，有關公益信託免稅條件，下列敘述何者錯誤？", "options": ["受託人須為信託業法所稱之信託業", "捐贈或加入被繼承人死亡時未成立之公益信託，該財產仍可不計入遺產總額", "該公益信託除為其設立目的舉辦事業而必須支付之費用外，不以任何方式對特定或可得 特定之人給予特殊利益", "信託行為明定信託關係解除、終止或消滅時，信託財產須移轉於各級政府、有類似目的 之公益法人或公益信託"], "ans": 1, "exp": "本題為反向題。公益信託免稅須符合多項要件，其中關於「捐贈或加入被繼承人死亡時『已成立』之公益信託」始得不計入遺產總額；選項2稱加入死亡時「未成立」之公益信託仍可不計入，與規定不符，故選項2錯誤。受託人須為信託業、不得對特定人給予特殊利益、解散時財產移轉予政府或公益法人等均為正確的免稅要件。"}, {"q": "有關信託財產移轉或處分不視為銷售，下列敘述何者錯誤？", "options": ["信託行為成立時，委託人與受託人間", "信託關係存續中受託人變更時，原受託人與新受託人間", "信託行為不成立或信託關係消滅時，委託人與受託人間", "受託人依信託本旨，銷售貨物時，受託人與買受人間"], "ans": 3, "exp": "本題為反向題。信託財產移轉或處分不視為銷售之情形包括：成立時委託人與受託人間、變更受託人時新舊受託人間、信託不成立或消滅時受託人與委託人間。但受託人依信託本旨對外「銷售貨物」予買受人，係實質交易，屬應視為銷售並課徵營業稅之情形，故選項4錯誤。"}, {"q": "陳君92 年以其土地無償設定無限期地上權予王君，93 年再將該土地交付信託並指定林君 為受益人，則下列敘述何者錯誤？", "options": ["無償設定屬借貸行為", "交付信託屬贈與行為", "信託部分之贈與金額應減除地上權之價值", "信託財產之時價係以土地公告現值扣除地上權價值後餘額為準"], "ans": 0, "exp": "本題為反向題。陳君以土地無償設定無限期地上權予王君，係無償使土地受有利益，性質上屬「贈與」行為（無償給與財產利益），並非「借貸」，故選項1錯誤。其餘正確：交付信託指定他人受益屬贈與、信託贈與金額應減除已設定地上權之價值、信託財產時價以公告現值扣除地上權價值後餘額計算。"}, {"q": "以公益信託方式辦理家族慈善時，根據信託公會會員辦理公益信託實務準則的規定，公益 信託諮詢委員與該公益信託之委託人間及該公益信託監察人間，具有配偶或三親等內親屬 關係者，不得超過委員總人數之比例為何？", "options": ["二分之一", "三分之一", "四分之一", "五分之一"], "ans": 1, "exp": "依信託公會會員辦理公益信託實務準則，公益信託諮詢委員與委託人及監察人間具配偶或三親等內親屬關係者，不得超過委員總人數之「三分之一」，以維持公益信託的獨立性，故選項2正確。"}, {"q": "若王董事長無法知悉未來配息狀況，將交付部份股票成立本金自益孳息他益之有價證券信 託，信託期間3 年，下列敘述何者錯誤？", "options": ["成立信託時，信託股票須依郵政儲金匯業局一年期定期儲金固定利率設算贈與價值課徵 贈與稅", "王董事長須注意股權移轉過半解任之規定", "信託財產移轉至受託人名下，王董事長立即喪失對股票之所有權與表決權", "信託期間受益人取得股利所得，仍須依個人綜合所得稅規定課稅"], "ans": 2, "exp": "本題為反向題。成立有價證券信託後，股票雖移轉至受託人名下，但本題為「本金自益、孳息他益」，本金（股票所有權）仍屬委託人自益，委託人並未「立即喪失對股票之所有權與表決權」，故選項3錯誤。未知配息故依郵儲一年期定存利率設算孳息贈與價值課稅、須注意股權移轉過半解任規定、受益人取得股利仍課個人綜所稅，均屬正確。"}, {"q": "王董事長選擇以自己為委託人，子女為受益人之方式設立他益信託，如王董事長無保留變 更受益人及分配、處分信託利益之權利時，贈與行為的發生日為何？", "options": ["信託契約訂立日", "受託人實際領受信託利益之日", "受託人分配信託利益之日", "國稅局核定贈與稅日 第二部分：第41~60 題（每題2 分）"], "ans": 0, "exp": "本題問贈與行為發生日。他益信託且委託人未保留變更受益人及分配處分權利者，於「信託契約訂立日」即確定發生贈與，應以該日為贈與行為發生日課徵贈與稅，故選項1正確。受託人領受日、分配日、國稅局核定日均非贈與發生日。"}, {"q": "甲公司成立他益信託，受益人為該公司符合一定績效之員工，在受益人尚不特定情形下， 就信託成立年度受益人享有信託利益之權利價值，下列敘述何者錯誤？", "options": ["以受託人為納稅義務人", "以委託人為納稅義務人", "須按規定之扣繳率申報納稅", "扣繳率由財政部擬訂，報請行政院核定發布之"], "ans": 1, "exp": "本題為反向題。他益信託於受益人「尚不特定」時，就信託成立年度受益人享有信託利益之權利價值，係以「受託人」為扣繳（納稅）義務人按規定扣繳率申報納稅，並非以委託人為納稅義務人，故選項2錯誤。以受託人為納稅義務人、按規定扣繳率申報、扣繳率由財政部擬訂報行政院核定發布，均為正確。"}, {"q": "有關信託財產標的之贈與，有關其價值認定，下列敘述何者錯誤？", "options": ["金錢信託以信託金額計", "上市公司股票以當日收盤價計", "興櫃公司股票以淨值價計", "未上市櫃公司股票以淨值價計"], "ans": 2, "exp": "本題問何者錯誤。信託財產標的贈與價值之認定：金錢以信託金額計、上市公司股票以贈與日收盤價計、未上市櫃公司股票以資產淨值計，而興櫃股票應以「當日加權平均成交價」（有交易價格）認定，並非以淨值計，故選項3錯誤。選項1、2、4之認定方式均正確。"}, {"q": "甲君及乙君為夫妻，其婚生小孩為10 歲之小孩A，甲君成立一個子女資產累積信託（委託 人無保留變更受益人及分配、處分信託利益權利之他益信託），由甲君擔任委託人，小孩A 為受益人。甲君、乙君與小孩A 當年度皆無收到其他贈與或贈與給他人，假定當年度贈與 稅免稅額為244 萬元，甲君先將200 萬放入信託作為信託財產，乙君再贈與100 萬給小孩 A，下列敘述何者正確？", "options": ["甲君需繳納贈與稅", "乙君需繳納贈與稅", "小孩A 需繳納贈與稅", "針對200 萬信託財產如果放在存款，所生之利息，須併入小孩A 之當年度所得"], "ans": 3, "exp": "本題問何者正確。他益信託且委託人無保留變更受益人權利，信託成立即屬贈與，納稅義務人為贈與人甲君（非乙、非受益人小孩A），甲君贈與200萬未逾244萬免稅額故不需繳贈與稅；乙君另贈與小孩A100萬亦各自在免稅額內。信託財產為金錢存款所生之利息屬受益人享有之信託利益，須併入受益人小孩A當年度所得課稅，故選項4正確。"}, {"q": "張董事長起初將B 公司股票作為信託財產，成立自益信託，受益人僅為張董事長，但過一 陣子又希望將該信託變更受益人，改成他益信託，受益人僅為其子甲君，且同時不再保留 變更受益人之權利，假定信託財產超過當年度贈與稅免稅額，有關稅負說明下列敘述何者 正確？", "options": ["張董事長成立自益信託時及後續改為他益信託時，皆不需繳付贈與稅", "張董事長成立自益信託時，需繳付贈與稅，後續改為他益信託時需再繳付贈與稅", "張董事長成立自益信託時，不需繳付贈與稅，後續改為他益信託時則需繳付贈與稅", "張董事長成立自益信託時，需繳付贈與稅，後續改為他益信託時則不需繳付贈與稅"], "ans": 2, "exp": "成立自益信託（受益人為委託人本人）時，信託利益未移轉他人，不發生贈與，無須繳贈與稅；嗣後變更為他益信託且不保留變更受益人權利，等同將信託利益贈與受益人甲君，於變更時始發生贈與，須繳贈與稅，故選項3正確。其餘選項對兩階段課稅時點之描述均有誤。"}, {"q": "下列敘述何者錯誤？", "options": ["個人股利所得可選擇採股利分離課稅單一稅率28%", "個人股利所得可選擇併入綜合所得申報，額外有8.5%抵減稅額", "公司營利事業投資國內其他營利事業，所獲配股利應計入所得額課稅", "營利事業當年度盈餘未做分配，該未分配盈餘加徵5%營利事業所得稅"], "ans": 2, "exp": "本題問何者錯誤。公司（營利事業）投資國內其他營利事業，其獲配之股利或盈餘「不計入」所得額課稅（避免重複課稅），故選項3稱「應計入所得額課稅」係錯誤。個人股利得選擇28%分離課稅、或併入綜所稅享8.5%抵減（有上限）、未分配盈餘加徵5%營所稅（選項1、2、4），均為正確規定。"}, {"q": "某甲以名下所持有「作農業使用之農業用地」成立信託，將孳息以外信託利益權利歸屬予 兒子乙，下列敘述何者錯誤？", "options": ["因信託財產為農地，故免課徵贈與稅", "因他益信託贈與標的為信託權利而非農地，故仍須課徵贈與稅", "此筆農地若屬於耕地，信託業者將因無法合規登記持有耕地，而婉拒擔任受託人", "某甲萬一於信託存續期間身故，其未領受之信託利益亦非為農地本身，故無法自遺產中 扣除而不課徵遺產稅"], "ans": 0, "exp": "本題問何者錯誤。作農業使用之農業用地若由繼承人或受遺贈人承受得免徵遺產稅、贈與時免徵贈與稅，係以「農地本身」之移轉為要件；本題係將「孳息以外之信託利益權利」贈與兒子，贈與標的為信託權利而非農地本身，自無農地免徵贈與稅之適用，故選項1稱「因信託財產為農地故免課贈與稅」係錯誤。選項2、3、4正確說明信託權利仍課贈與稅、信託業不便持有耕地、未領信託利益非農地本身故不得自遺產扣除。"}, {"q": "有關委託人為營利事業的他益信託，下列敘述何者正確？", "options": ["於信託成立時，對委託人營利事業課徵贈與稅", "於信託成立年度，對受益人課徵所得稅", "於信託成立時，因受益人尚未取得信託利益，不須課徵贈與稅", "於信託成立時，因受益人尚未取得信託利益，不須課徵所得稅"], "ans": 1, "exp": "委託人為營利事業之他益信託，因受益人並非委託人，於成立時即視為營利事業對受益人之給付，依所得稅法應於信託成立年度對受益人課徵所得稅，故選項2正確。營利事業他益信託課徵所得稅而非贈與稅（贈與稅之主體為個人），且不適用「受益人尚未取得利益免稅」之說法。"}, {"q": "因信託行為成立，委託人與受託人間，基於信託關係財產之移轉，下列敘述何者錯誤？", "options": ["不課徵契稅", "不課徵所得稅", "不課徵贈與稅", "需課徵土地增值稅"], "ans": 3, "exp": "信託行為成立時，委託人與受託人間基於信託關係之財產移轉，依法不課徵贈與稅、所得稅、契稅，土地部分亦不課徵土地增值稅（屬形式移轉，待實際處分或信託歸屬時始課徵），故選項4「需課徵土地增值稅」錯誤。"}, {"q": "公益信託的信託財產產生孳息時，其信託利益於實際分配時，由誰併入分配年度之所得額？", "options": ["委託人", "受益人", "信託監察人", "受託人"], "ans": 1, "exp": "公益信託之信託財產所生孳息，於信託利益實際分配時，由受益人併入分配年度之所得額課稅，故選項2正確。受益人為所得歸屬主體，而非委託人、受託人或信託監察人。"}, {"q": "依據中華民國信託業商業同業公會會員辦理公益信託實務準則，為確保公益信託監察人之 獨立性，公益信託契約通常會排除下列何種身分之人擔任公益信託監察人？", "options": ["社會公正人士", "律師或會計師", "具有與公益目的相關知識經驗之退休政府官員", "委託人的三親等內親屬"], "ans": 3, "exp": "依信託公會公益信託實務準則，為確保公益信託監察人之獨立性，通常排除「委託人之三親等內親屬」擔任監察人，以避免利害關係影響獨立性，故選項4正確。社會公正人士、律師會計師、具相關經驗之退休官員反而是適合人選。"}, {"q": "信託契約之期限約定為至「受益人死亡時止」，財政部如何解釋他益信託權利價值課徵贈與 稅的計算基礎？", "options": ["以30 年為最長期間，超過者不予計算", "以受益人簽訂信託契約時的年齡，計算至八十歲為止", "以受益人家族平均壽命為準", "以訂約時內政部公布最近一年全體國人平均餘命為準"], "ans": 3, "exp": "信託期限約定至「受益人死亡時止」者，財政部解釋他益信託權利價值課徵贈與稅之計算，以訂約時內政部公布最近一年「全體國人平均餘命」推估存續年數據以計算，故選項4正確。並非一律以30年、計算至80歲或家族平均壽命為準。"}, {"q": "如想成立一個由乙君為受益人，信託財產為金錢之他益信託，A 方案：公司（營利事業）為 委託人，B 方案：甲君為委託人，請問下列敘述何者正確？", "options": ["公司成立他益信託，須繳納贈與稅", "甲君過世後，乙君仍存活，則B 方案之信託仍會存續", "A 方案與B 方案，針對信託財產交付，皆須列入乙君當年度所得", "A 方案不可行，是因為如公司擔任委託人，則受益人必須為營利事業"], "ans": 1, "exp": "B方案以甲君（個人）為委託人成立他益信託，甲君死亡後若乙君仍存活，信託並不當然因委託人死亡而終止，信託仍會存續，故選項2正確。公司（營利事業）成立他益信託不課贈與稅而係對受益人課所得稅（選項1、4錯）；A、B方案就金錢本金交付之課稅處理不同，並非皆列入乙君當年度所得（選項3錯）。"}, {"q": "甲君想將持有之A 公司股票作為信託財產（現值為1 億元），成立信託（受益人可為甲君或 丙君，但無甲君之配偶），有關甲君規劃信託流程，下列敘述何者正確？", "options": ["如甲君原本為自益信託委託人，信託期間內，變更為非委託人之他益信託，本次變更， 無任何須計入甲君贈與總額之項目", "甲君交付A 公司股票成立「本金自益、孳息他益」之信託，甲君得保留對股票之運用決 定之權利", "甲君如果規劃「本金自益、孳息他益」之信託，因無涉及本金之贈與，成立此信託，無任 何須計入甲君贈與總額之項目", "甲君如果規劃「本金他益、孳息自益」之信託，因涉及本金之贈與，甲君成立此信託之 贈與總額為1 億元"], "ans": 1, "exp": "甲交付A公司股票成立「本金自益、孳息他益」之信託，因屬本金自益，甲得於契約保留對股票運用決定之權利，故選項2正確。自益變更為他益時，變更時點即為贈與，須計入甲君贈與總額（選項1錯）；孳息他益仍須就孳息部分計算贈與（選項3錯）；本金他益孳息自益之贈與總額應以本金贈與之權利價值計算（折現），非逕以1億元全額認列（選項4錯）。"}, {"q": "甲君分別以A 公司股票與B 公司股票成立「本金自益、孳息他益」之信託，本金受益人為 甲君、孳息受益人為丙君。針對甲君不知悉A 公司配息狀況與知悉B 公司配息狀況之情形， 請問依實質課稅原則，下列敘述何者正確？", "options": ["A 公司與B 公司孳息皆須列入甲君當年度所得", "A 公司與B 公司孳息皆須列入丙君當年度所得", "A 公司孳息須列入甲君當年度所得，B 公司孳息須列入丙君當年度所得", "A 公司孳息須列入丙君當年度所得，B 公司孳息須列入甲君當年度所得"], "ans": 3, "exp": "依實質課稅原則，本金自益孳息他益信託，若委託人「不知悉」標的公司配息（如A公司，甲無控制權亦無從得知配息），孳息按一般信託折現計贈與，歸屬孳息受益人丙；若委託人「已知悉」配息且具控制權（如B公司），則該已知盈餘視為委託人之所得，列入委託人甲當年度所得。故A公司孳息列丙、B公司孳息列甲，選項4正確。"}, {"q": "有關甲君擔任委託人，以B 公司股票成立「本金自益、孳息他益」之信託，孳息受益人為 丙君，因甲君已知B 公司之配息率，甲君對B 公司有控制權，且依信託持有B 公司比例計 算，可獲配300 萬元。針對本次300 萬元股利，請問依實質課稅原則，課徵贈與稅時點與 觀念，下列敘述何者正確？", "options": ["於甲君與受託人簽約時，對甲君課贈與稅", "受託人交付該孳息給受益人丙君時，對甲君課贈與稅", "本次股利已列入甲君所得，因此受託人交付該孳息給受益人丙君時，不須對甲君課贈與稅", "本次股利已列入受益人丙君所得，因此受託人交付該孳息給受益人丙君時，不須對甲君 課贈與稅 第二部分：第41~60題（每題2 分）"], "ans": 1, "exp": "甲對B公司有控制權且簽約時已知配息率，依實質課稅原則該300萬元股利仍屬甲之所得；其贈與稅之課徵時點為受託人實際將該孳息「交付」受益人丙君時，方對甲課徵贈與稅，故選項2正確。並非簽約時即課（選項1錯）；該孳息屬甲之所得課所得稅，與交付時對甲課贈與稅二者並存（選項3、4將兩稅互斥之說法錯誤）。"}, {"q": "呂大美女士於民國115 年成立信託契約，將其位於台北市之土地委託吳大明會計師（受託 人）管理15 年，除每年土地之孳息的受益人為呂小美（呂大美之女）外，並約訂於民國130 年（信託契約15 年期滿時）將土地移轉給呂小美。依現行稅法之規定，應於何年報繳土地 增值稅及贈與稅？", "options": ["於民國130 年報繳土地增值稅及贈與稅", "於民國130 年報繳土地增值稅；於民國115 年報繳贈與稅", "於民國115 年報繳土地增值稅；於民國130 年報繳贈與稅", "於民國115 年報繳土地增值稅及贈與稅"], "ans": 1, "exp": "他益信託土地，土地增值稅於信託成立、委託人移轉土地予受託人時（民國115年）並不課徵，待受託人實際將土地移轉予受益人（民國130年）時始課徵土地增值稅；而本金他益之贈與稅，則於信託成立時（民國115年）即就受益權之權利價值課徵贈與稅。故選項2「130年報繳土地增值稅、115年報繳贈與稅」正確。"}, {"q": "依財政部核釋，他益信託房地准按自住用稅率課徵地價稅及房屋稅須符合一定之條件，下 列敘述何者錯誤？", "options": ["受益人須為委託人之配偶或已成年子女，且領有身心障礙證明", "信託契約須明定該信託房地供受益人本人、配偶或直系親屬居住使用，不得處分、出售 或移轉於第三人", "委託人後續仍可保留變更受益人之權利", "受益人本人須實際居住使用該信託房地並辦竣戶籍登記"], "ans": 2, "exp": "依財政部核釋，他益信託房地按自住用稅率課徵地價稅及房屋稅之要件，須委託人「不得保留變更受益人及處分信託利益之權利」，亦即受益人須確定，故選項3「委託人後續仍可保留變更受益人之權利」錯誤。其餘受益人為委託人配偶或成年身障子女、信託契約明定供受益人本人配偶直系親屬居住不得處分移轉、受益人本人實際居住並辦竣戶籍登記，均為應符合之條件。"}, {"q": "有關企業主於董事會等會議資料知悉公司將分配盈餘後，始簽訂「本金自益、孳息他益」之 股票信託契約，其稅捐核課原則，下列敘述何者錯誤？", "options": ["有關孳息部分，須以本金複利折算現值，課徵贈與稅", "該部分孳息仍屬委託人之所得，應於所得發生年度依法課徵委託人之綜合所得稅", "受託人交付該部分孳息與受益人時，依法課徵委託人贈與稅", "委託人對公司之盈餘分配具有控制權，將公司累積未分配之盈餘以信託方式贈與他人， 該部分孳息，應於所得發生年度課徵委託人之綜合所得稅"], "ans": 0, "exp": "企業主於董事會等會議知悉公司「將」分配盈餘後，始簽訂本金自益孳息他益之股票信託，依實質課稅原則，該已知之盈餘（孳息）屬委託人之所得，應於所得發生年度課徵委託人綜合所得稅，並於受託人交付孳息予受益人時對委託人課贈與稅；而非以本金複利折算現值課贈與稅（折現計算係適用於委託人簽約時尚未知悉配息之一般情形）。故選項1錯誤為本題答案。"}, {"q": "有關全部他益信託之稅負，下列敘述何者錯誤？", "options": ["受益人於所得發生年度併入其個人當年度綜合所得中課稅", "以信託契約規定，信託財產交付日為贈與行為發生日，課徵贈與稅", "若委託人死亡，信託財產毋須計入委託人之遺產課稅", "若受益人死亡，信託財產需計入受益人之遺產課稅"], "ans": 1, "exp": "正解為選項2（敘述錯誤者）。全部他益信託之贈與行為發生日，係以「信託成立日（訂約日）」為準課徵贈與稅，而非「信託財產交付日」，故選項2錯誤。選項1受益人於所得發生年度併入個人綜所稅、選項3財產所有權已移轉信託故委託人死亡不計入其遺產、選項4受益權屬受益人財產故受益人死亡須計入其遺產，均為正確敘述。"}, {"q": "甲以A 地為信託財產，訂立本金他益、孳息自益的信託契約，訂約日A 地公告現值1,000 萬元，市價2,000 萬元；信託期間5 年，信託期間屆滿時，A 地公告現值為1,300 萬元，市 價2,500 萬元，請問贈與總額要以多少錢按複利折算現值？", "options": ["1,000 萬元", "1,300 萬元", "2,000 萬元", "2,500 萬元"], "ans": 0, "exp": "正解為選項1。本金他益、孳息自益之信託，本金（土地）贈與權利價值之計算，以「信託成立時」之公告現值1,000萬元為計算基礎，再按贈與時起至受益時止之期間依郵政定期儲金固定利率複利折算現值，故折算基礎為1,000萬元，選項1正確。1,300萬為期滿時公告現值、2,000萬與2,500萬為市價，均非計算基礎。"}, {"q": "依據現行所得稅法規定，公益信託之信託利益於實際分配時，由受益人併入分配年度所得 額，下列何者並非公益信託免於所得發生時課徵之要件？", "options": ["受託人為信託業法所稱之信託業", "不以任何方式對特定或可得特定之人給予特殊利益", "用於與其創設目的有關活動之支出，不低於基金之每年孳息及其他各項收入60%", "信託關係解除、終止或消滅時，信託財產移轉於各級政府、有類似目的之公益法人或公 益信託"], "ans": 2, "exp": "正解為選項3（非屬要件者）。公益信託免於所得發生時課稅之要件中，並無「支出不低於孳息及收入60%」此一門檻，該60%係屬其他規定之概念，非本免稅要件，故選項3並非要件。選項1受託人須為信託業、選項2不對特定人給予特殊利益、選項4消滅時財產移轉於政府或類似目的公益法人，均為法定免稅要件。"}, {"q": "甲將所持有A 公司價值約新臺幣8,000 萬元之股票200 萬股，與B 銀行成立本金他益、孳 息自益之有價證券信託，信託存續期間20 年，有關該有價證券信託之成立說明，下列何者 正確？", "options": ["甲將該股票移轉給B 銀行時，應課徵證券交易稅", "該有價證券信託契約中，不得約定甲得指示B 銀行以信託財產借入款項", "甲將該股票移轉給B 銀行時，暫不課徵贈與稅，俟信託期間屆滿時始課徵贈與稅", "甲不得與B 銀行成立本金他益、孳息自益之有價證券信託，僅可成立本金自益、孳息他 益之有價證券信託"], "ans": 1, "exp": "正解為選項2。本金他益、孳息自益之有價證券信託，依信託業相關規範及契約限制，委託人不得指示受託人以信託財產借入款項（屬不得約定事項），故選項2正確。選項1股票信託移轉非屬買賣，免證交稅；選項3贈與稅應於信託成立時課徵（非期滿）；選項4本金他益、孳息自益之信託本得成立，三者皆錯。"}, {"q": "孫媽媽計畫將五千萬存款中拿出三千萬成立公益信託，剩餘二千萬成立完全他益金錢信託， 約定本金及孳息全部由女兒受益，下列敘述何者正確？", "options": ["孫媽媽申報贈與稅之權利價值為五千萬", "孫媽媽成立金錢信託之信託孳息於申報贈與稅時不計入贈與總額", "孫媽媽成立公益信託之信託目的完成時，剩餘信託財產將移轉於有類似目的之公益法人", "孫媽媽以個人名義成立公益信託，得列舉所得稅之捐贈扣除，以綜合所得總額10%為限"], "ans": 2, "exp": "正解為選項3。公益信託之信託目的完成或消滅時，剩餘信託財產應移轉於有類似目的之公益法人（或政府、公益信託），故選項3正確。選項1贈與權利價值僅就他益之2,000萬計算（公益信託3,000萬部分免贈與稅）；選項2金錢信託孳息仍應計入贈與總額；選項4個人公益捐贈列舉扣除以綜合所得總額20%為限（非10%），三者皆錯。"}, {"q": "有關信託成立時明定信託利益之全部或一部之受益人為非委託人之課稅規定，下列敘述何 者錯誤？", "options": ["視為委託人將享有信託利益之權利贈與該受益人，課徵贈與稅", "委託人為營利事業之信託契約，該受益人應將享有信託利益之權利價值，併入成立年度 之所得額，課徵所得稅", "以股票為信託財產，委託人移轉信託股票予受託人時，因非屬買賣，無須繳納證券交易稅", "以土地為信託財產，委託人移轉信託土地予受託人時，應先完納土地增值稅，地政機關 才會受理移轉"], "ans": 3, "exp": "正解為選項4（敘述錯誤者）。以土地為信託財產，委託人移轉信託土地予受託人係因信託關係而移轉，依法不課徵土地增值稅、亦不以完納土增稅為地政機關受理移轉之要件，故選項4錯誤。選項1他益視為贈與課贈與稅、選項2委託人為營利事業時受益人應併入成立年度所得課所得稅、選項3信託移轉股票非屬買賣免證交稅，均屬正確。 --- ## Related Concepts - [[05-信託稅制]] - [[04-信託法與信託架構]] - [[03-遺產及贈與稅]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "林董正評估利用境外信託規劃海外財產傳承事宜，有關境外信託之敘述，下列何者錯誤？", "options": ["信託資產有風險阻隔之效力", "委託人生前可修改信託合約及意願書", "採私人信託公司(PTC)模式可保有較強之控制權", "保權信託(RPT)之受益人可指派信託保護人，並將保護人之權利義務規範於信託合約中"], "ans": 3, "exp": "正解為選項4。保權信託（RPT，保留權力信託）係由委託人保留指派、變更等控制權，並由委託人（而非受益人）約定信託保護人之權利義務；選項4將指派信託保護人之權利歸於受益人，主客倒置而錯誤。選項1風險阻隔、選項2委託人生前可修改信託合約及意願書、選項3私人信託公司（PTC）模式可保有較強控制權，均為境外信託常見正確特徵。"}, {"q": "下列何者不是開曼群島STAR 信託架構之操作特色？", "options": ["受益對象可以是「信託目的」或「信託受益人」，或兩者同時為受益人", "一律適用禁止永續原則", "法律明確規定必須設置信託執行人(Enforcer)，此職務被視為需承擔信託義務(Fiduciary Duty)", "當信託目的全部或部分無法被執行，受託人（信託公司）可向開曼法院申請適用「近似 原則」，由法院改良(Reform)該信託"], "ans": 1, "exp": "正解為選項2。開曼STAR信託之一大特色即在於可排除（不適用）禁止永續原則，使信託得長期存續，故「一律適用禁止永續原則」錯誤，不是STAR信託之操作特色。選項1受益對象可為信託目的或受益人或兩者並存、選項3須設置信託執行人（Enforcer）並負信託義務、選項4信託目的無法執行時受託人可向法院申請適用近似原則由法院改良信託，均為STAR信託特色。"}, {"q": "依香港於2013 年修訂生效之受託人條例規範，賦予了受託人有委任下列何者職位之權力？ A.代理人 B.代名人 C.保管人", "options": ["僅AB", "僅BC", "僅AC", "ABC"
