], "ans": 3, "exp": "正解為選項4（ABC）。香港2013年修訂生效之受託人條例，賦予受託人委任代理人（Agent）、代名人（Nominee）及保管人（Custodian）之權力，三者皆屬之，故選ABC全部。其餘只含部分項目之選項均不完整。"}, {"q": "信託成立後，信託財產所有權移轉與受託人管理、處分，及分配受益權，但委託人可透過信 託契約對信託財產保有控制權。而下列哪一種信託類型，委託人對信託財產無控制權？", "options": ["新加坡保留權力信託(Reserved Power Trust)", "新加坡全權生前信託(Discretionary Living Trust)", "美國指揮信託(Directed Trust)", "美國境外授予人信託(Foreign Grantor Trust)"], "ans": 1, "exp": "正解為選項2。新加坡全權生前信託（Discretionary Living Trust）係由受託人就分配對象、時點及金額享有完全裁量權，委託人交付財產後對信託財產不再保有控制權，故選項2正確。選項1保留權力信託（Reserved Power Trust）委託人保留權力、選項3美國指揮信託委託人或其指定之指揮人可指揮、選項4境外授予人信託（Foreign Grantor Trust）授予人保有控制權，委託人均仍具控制權。"}, {"q": "有關美國南達科他州常見的指揮信託(Directed Trust)之相關敘述，下列何者錯誤？", "options": ["行政受託人(Administrative Trustee)為信託受託人，與傳統信託架構下之受託人相比，多 對信託標的之投資及分配等無決定權責", "分配信託委員會(Distribution Trust Committee)作為受託人就相關事項之指揮建議者，多由 家族成員及受家族信賴的顧問擔任", "信託保護人(Trust Protector)多由受託人複委託指派，賦予調整信託契約內容、否准特定分 配等權限或扮演信託內部發生意見分歧時之裁決者角色", "家庭顧問(Family Advisor)類似信託保護人，但權力相較有限，且無需承擔信託義務，可 約定免責"], "ans": 2, "exp": "正解為選項3。美國南達科他州指揮信託之信託保護人（Trust Protector）通常由委託人於信託契約中指定，並非由受託人複委託指派，故選項3「多由受託人複委託指派」錯誤。選項1行政受託人對投資及分配無決定權、選項2分配信託委員會多由家族成員及受信賴顧問擔任、選項4家庭顧問權力有限且無須承擔信託義務，均屬正確。"}, {"q": "有關新加坡稅制之敘述，下列何者錯誤？", "options": ["該國原則上施行準屬地主義，就所有產生或源自新加坡之所得，及在該國取得之境外所 得課徵所得稅", "該國不課徵遺產稅及贈與稅，但課徵資本利得稅", "非該國居住者在該國取得境外之所得，可依該國所得稅法第13(7A)條免除稅負", "信託受益人為該國居民且有信託產生之所得時，視同受益人可直接取得信託所得，由受 益人為納稅義務人"], "ans": 1, "exp": "正解為選項2。新加坡不課徵遺產稅及贈與稅，同時也「不課徵資本利得稅」，故選項2說「但課徵資本利得稅」錯誤。新加坡採準屬地主義就源自當地及匯入當地之境外所得課稅（選項1對）、非居住者境外所得可依其所得稅法第13(7A)條免稅（選項3對）、信託受益人為當地居民且有信託所得時視同受益人取得並為納稅義務人（選項4對）。"}, {"q": "根據美國「國內稅收法典(Internal Revenue Code)」之規範，若委託人(Grantor)對信託資產擁 有實質支配和控制權，該信託為Grantor Trust，應就該信託之收入對下列何者課徵所得稅？", "options": ["委託人", "受託人", "受益人", "信託保護人"], "ans": 0, "exp": "正解為選項1。依美國國內稅收法典之Grantor Trust（委託人信託）規則，當委託人對信託資產保有實質支配與控制權時，信託收入「穿透」歸由委託人課徵所得稅，即委託人視為信託所得在稅務上之所有人。故應對委託人課稅，而非受託人、受益人或信託保護人。"}, {"q": "有關英屬維京群島VISTA 控股信託相關特色，下列敘述何者錯誤？", "options": ["受託人明確禁止行使投票權", "受託人得出任VISTA 控股公司的董事", "委託人得自行擔任VISTA 控股公司的董事", "VISTA 控股公司的董事可自行管理公司事務，不會被受託人干涉"], "ans": 1, "exp": "正解為選項2。VISTA信託（英屬維京群島）的設計特色在於受託人不得干涉控股公司董事的經營管理，公司董事得自行管理公司事務（選項4對），且受託人原則上明確被禁止行使（或限制行使）投票權以介入公司治理（選項1對），委託人並得自任控股公司董事（選項3對）。選項2「受託人得出任VISTA控股公司的董事」與VISTA設計使受託人不介入公司經營之本旨相違，故為錯誤敘述。"}, {"q": "若委託人利用連續受益人之架構設計將資產設定信託，而由受託人依序為各順位受益人之 利益管理或處分信託財產，以確保後代子孫或世代家族成員能夠享有信託利益，達成多代 傳承之目的，一般可稱為下列何種信託？", "options": ["王朝信託", "維京群島之VISTA 信託", "開曼群島之STAR 信託", "保護信託"], "ans": 0, "exp": "正解為選項1。題述委託人設定連續受益人架構，由受託人依序為各順位受益人之利益管理信託財產，使後代世代家族成員持續享有信託利益以達多代傳承目的者，一般稱為「王朝信託（Dynasty Trust）」。VISTA信託、STAR信託及保護信託各有其特定功能，均非以連續受益人多代傳承為核心定義。"}, {"q": "有關美國家族信託常見模式的敘述，下列何者正確？", "options": ["裁量信託(Discretionary Trust)因與大部分家族之信託需求相符，而逐漸被廣泛採用在家族 信託中", "複委信託(Delegated Trust)，相較於指揮信託，家族成員仍更高度參與及掌控家族財產， 而逐漸成為美國最常被使用之現代家族信託模式", "指揮信託(Directed Trust)的優點，在於可安排受託人在涉及投資或分配事項須依指示進行 經營管理，而由家族成員或家族信賴之專業顧問擔任指揮者，讓委託人或其家族成員保 留更多對家族財產的掌控權", "私人家族信託公司(Private Family Trust Company)，如同一般公司，由董事會執行整體營 運，但其董事不得由該設立家族之成員出任或指派"], "ans": 2, "exp": "正解為選項3。指揮信託（Directed Trust）之優點在於可安排受託人就投資或分配事項依指示進行，由家族成員或其信賴之專業顧問擔任指揮者，使委託人及家族保留更多對財產之掌控權，故選項3正確。裁量信託敘述（選項1）、複委信託較指揮信託更受採用之敘述（選項2）均與實務發展趨勢不符；私人家族信託公司之董事得由該設立家族成員出任（選項4錯）。"}, {"q": "有關國外私募人壽保險架構，下列敘述何者錯誤？", "options": ["被保險人僅為自然人", "身故保險金僅能以現金支付", "保單持有人可為法人或自然人", "可將不動產及有價證券轉化成壽險保單"], "ans": 1, "exp": "本題為反向題，問何者錯誤。國外私募人壽保險（PPLI）的身故保險金可依架構彈性安排，並非僅能以現金支付，故選項2錯誤為正解。其餘正確：被保險人須為自然人、保單持有人可為法人或自然人、且可將不動產及有價證券等資產轉化（配置）入壽險保單內以達資產規劃目的。"}, {"q": "有關新加坡常見的信託型態，下列敘述何者錯誤？", "options": ["全權信託比較常用在長期財富與資產管理，使受託人擁有具彈性的權限符合委託人需求", "委託人可於全權信託設立時準備一份意願書，為受託人信託管理提供一般性指引，並期 待受託人遵守以符合受託人責任之要求", "委託人可於全權信託設立時準備一份意願書，意願書一旦出具，委託人不可修改", "委託人可指定保護人，並保留部分受託人之權力給保護人行使"], "ans": 2, "exp": "本題為反向題。新加坡全權（全權裁量）信託中委託人出具的「意願書」（Letter of Wishes）僅為對受託人的一般性、非拘束性指引，委託人本可於信託存續期間修改或更新，並非一旦出具即不可修改，故選項3錯誤。其餘關於全權信託彈性、意願書性質與得指定保護人保留部分權力的敘述均正確。"}, {"q": "有關英屬維京群島VISTA 信託的特色，下列何者錯誤？", "options": ["受託人可行使投票權", "受託人不得出任VISTA 控股公司董事", "委託人得自行擔任VISTA 控股公司董事", "VISTA 控股公司董事可自行管理公司事務，不被受託人干擾"], "ans": 0, "exp": "本題為反向題。VISTA信託的核心在於受託人「不干預」原則，受託人持有控股公司股份但不行使投票權、不介入公司經營，故選項1「受託人可行使投票權」錯誤。其餘正確：受託人不得出任控股公司董事、委託人得自任董事、公司董事可自行管理不受受託人干擾。"}, {"q": "國外常見的「王朝信託」(Dynasty Trust)，係透過何種信託架構的設計，達到家族永續傳承 之目的？", "options": ["連續受益人", "受益人不確定", "委託人和受益人相同", "受託人和受益人相同"], "ans": 0, "exp": "王朝信託（Dynasty Trust）的設計核心是設置「連續受益人」（跨世代逐代承接受益權），使信託得長期存續、財富代代相傳，達家族永續傳承，故選項1正確。受益人不確定、委託人與受益人相同、受託人與受益人相同均非王朝信託的特徵。"}, {"q": "下列何者不屬於開曼群島STAR 信託架構之操作特色？", "options": ["允許成立「非公益慈善目的信託」之前提，受託人必須是接受開曼群島金融監督管理局 監督的當地持牌信託公司，或註冊登記在開曼群島的私人信託公司來擔任", "一律適用「禁止永續原則」", "STAR 信託必須設置信託執行人(Enforcer)，開曼群島信託法律並明確規定擔任此職位視 為承擔信託義務(FiduciaryDuty)", "當信託目的全部或部分無法被執行，受託人（信託公司）可向開曼法院申請適用「近似 原則」，由法院介入改良該信託"], "ans": 1, "exp": "本題為反向題。開曼群島STAR信託之重要特色，正是「排除（不適用）禁止永續原則」，使信託得無限期存續以遂行非公益目的，故選項2稱「一律適用禁止永續原則」錯誤。受託人須為持牌或註冊之私人信託公司、須設信託執行人並負信賴義務、得向法院申請近似原則改良信託，均為STAR信託之正確操作特色。"}, {"q": "下列何者不是英屬維京群島VISTA 控股信託的特色？", "options": ["此類型信託用於持有營運公司股份，以達無限期持有公司股份，以及受託人在確定情形 下，不得干預營運公司的決策過程與行政管理之兩大目的", "此類型信託的受託人職責，是把VISTA 控股公司股份保存在信託內，根據信託契約管理 股份的法定所有權，不得出任VISTA 控股公司的董事，亦不得行使投票權或其他股份相 關權力，去干涉公司管理或業務執行", "此類型信託之信託文件條款，禁止約定賦予受託人有權處分VISTA 控股公司股份，即使 約定處分前要經指定之人同意，亦禁止之", "VISTA 控股公司限於註冊在英屬維京群島的公司"], "ans": 2, "exp": "本題為反向題。VISTA控股信託之信託文件得就受託人處分控股公司股份設定條件（例如約定須經指定之人同意始得處分），並非一律禁止賦予受託人處分權，故選項3稱「即使約定處分前要經指定之人同意亦禁止」錯誤。其餘關於無限期持有、不干預營運、受託人不任董事不行使投票權、控股公司限註冊於BVI等敘述均正確。"}, {"q": "有關新加坡與香港稅制，下列敘述何者錯誤？", "options": ["新加坡為準屬地主義，非居住者於新加坡取得之境外所得免稅", "新加坡信託產生的所得由受託人納稅，但若受益人為新加坡居民且有信託產生的所得時， 受益人為納稅義務人", "香港採屬地主義，僅針對產生或源自於香港境內之所得課徵所得稅", "香港課徵利得稅、物業稅、薪俸稅與贈與稅"], "ans": 3, "exp": "本題為反向題，問何者錯誤。香港稅制以利得稅、薪俸稅、物業稅為主，並無贈與稅（亦無遺產稅），故選項4將「贈與稅」列為香港稅目係錯誤。新加坡為準屬地主義、非居住者境外所得免稅，及新加坡信託受益人為居民時由受益人課稅（選項1、2），香港採屬地主義僅就源自香港所得課稅（選項3），均為正確敘述。"}, {"q": "有關美國南達科他州指揮信託(Directed Trust)特色之敘述，下列何者錯誤？", "options": ["在指揮信託架構下，行政受託人即(Administrative Trustee)為信託受託人", "分配信託委員會(Distribution Trust Committee)多由家族成員及受家族信賴之顧問所組成", "分配信託委員會(Distribution Trust Committee)在人數及開會方式上有限制", "投資委員會(Investment Trust Committee)之職責在於指揮受託人就信託標的進行投資"], "ans": 2, "exp": "本題問何者錯誤。南達科他州指揮信託的特色之一，正是分配信託委員會在成員人數及開會方式上具高度彈性、不受法定限制，故選項3稱「有限制」係錯誤。行政受託人即為信託受託人（選項1）、分配委員會多由家族成員及受信賴顧問組成（選項2）、投資委員會負責指揮受託人進行投資（選項4），均為指揮信託的正確特色。"}, {"q": "新加坡當地管理信託(LAT)產生之相關所得及同年度分配給受益人的相關所得，均享有免課 所得稅之優惠。此類信託的條件不包括下列何者？", "options": ["委託人限於個人", "該信託必須是由該國的持牌信託公司管理", "信託受益人限於委託人", "受益人均為個人、慈善機構、信託或為慈善目的所設定之團體"], "ans": 2, "exp": "新加坡當地管理信託（LAT）的免稅條件並不要求「受益人限於委託人」，反而允許受益人為個人、慈善機構、信託或慈善目的團體等多元對象，故「信託受益人限於委託人」並非其條件，選項3為正解。委託人須為個人、須由持牌信託公司管理、受益人須為個人或慈善相關主體（選項1、2、4），均屬LAT的法定要件。"}, {"q": "一美國稅務居民成立可撤銷信託，控制信託重大決定，信託準據法為南達科他州法，受託 人為新加坡信託公司，受益人為美國稅務居民及非美國稅務居民，請判斷是否為美國境外 信託？", "options": ["是美國境外信託，因受託人為新加坡信託公司", "是美國境外信託，因部分收益人為非美國稅務居民", "否，為美國境內信託，因委託人屬美國稅務居民控制信託重大決定且美國法院有管轄權", "否，為美國境內信託，因部分受益人是美國稅務居民"], "ans": 2, "exp": "判斷美國境內或境外信託採「法院測試」與「控制測試」：須美國法院能對信託行政行使主要監督（法院測試），且由美國人控制信託所有重大決定（控制測試），二者均符合方為美國境內信託。本題委託人為美國稅務居民並控制信託重大決定、準據法為南達科他州法（美國法院有管轄權），符合兩項測試，故為美國境內信託，選項3正確。受託人國籍或部分受益人身分非判斷標準，故選項1、2、4錯誤。"}, {"q": "有關非美籍資產所有人為美籍家族成員使用的美國Foreign Grantor Trust，下列敘述何者錯誤？", "options": ["如經法院測試(Court Test)與控制測試(Control Test)，兩者條件皆符合時，將會被視為美國 國內信託(U.S.DomesticTrust)", "如符合美國境外信託(Foreign Trust)的定義，美國受益人仍需填寫Form 3520 向美國稅局 申報相關資訊，但無須繳納稅負", "美國Foreign Grantor Trust 通常為不可撤銷信託，非美籍委託人在世時，信託資產所生孳 息，可規劃由委託人或美籍受益人所擁有，但均無須繳納稅負", "美國Foreign Grantor Trust 如無完善的規劃，當委託人過世時，該信託將成為是Foreign Non-Grantor Trust，且勢必對美國受益人／繼承人造成稅務上的衝擊"], "ans": 2, "exp": "外國授予人信託（Foreign Grantor Trust）於委託人在世時，信託所生孳息因被視為歸屬委託人（授予人），由非美籍委託人承擔，美籍受益人取得分配通常不課稅；但稱孳息可規劃由委託人或美籍受益人擁有「均無須繳納稅負」過於絕對，故選項3錯誤。法院測試與控制測試皆符合會被視為美國國內信託、美籍受益人須填報Form 3520、委託人過世後可能轉為ForeignNon-Grantor Trust造成稅務衝擊，均為正確敘述。"}, {"q": "在香港設立信託必須符合之三個明確原則，不包括下列何者？", "options": ["明確的信託標的", "明確的受益對象", "明確的信託設立目的", "明確的信託存續期間"], "ans": 3, "exp": "信託成立的三大確定性原則為意思（設立目的）確定、標的（信託財產）確定、受益對象確定，此即英美法系（含香港）所稱three certainties。信託存續期間並非信託成立的必要明確要件，故選項4不包括在內，為正確答案。"}, {"q": "在境外信託架構中，委託人若希望保留對信託資產極大的控制權（如更換受託人、否決分配）， 通常會設置下列何種角色來制衡受託人？", "options": ["信託監察人", "信託保護人", "投資顧問", "合規主管"], "ans": 1, "exp": "信託保護人（Protector）是境外信託中為制衡受託人而設置的角色，可被賦予更換受託人、否決分配等權力，使委託人間接保留高度控制權，故選項2正確。信託監察人多為保護受益人利益、投資顧問僅就投資提供建議、合規主管屬內部法遵職能，均無制衡受託人之核心功能。"}, {"q": "下列何者不是美國信託設立的選項？", "options": ["設立Discretionary Trust（裁量信託）", "設立Delegated Trust（複委信託）", "設立Directred Trust（指揮信託）", "設立VISTA 信託 請根據下列案例，回答第37~40 題： 某營利事業董事長甲君，近期常有人跟他介紹信託之好處，周遭也有朋友持續規劃不 同信託方案，甲君有2 個小孩分別為乙君及丙君，甲君最擔心小孩乙君，但想把主要資產 傳承給丙君。甲君常聽到自益信託與他益信託，也聽過同時兼具自益與他益之信託類型。此 外，甲君將持有A 公司股票與B 公司股票，分別簽訂信託契約作為信託財產，簽約時A 公 司尚未公布每股盈餘、配息狀況，且甲君對A 公司也無控制權，更無任何管道知道A 公司 之配息情況。但簽約時B 公司已經公布配息率與配息狀況，且甲君對B 公司有控制權（假 設各題之信託皆屬受益人特定，且委託人無保留變更受益人及分配、處分信託利益之權利 者）。請回答下列問題："], "ans": 3, "exp": "美國信託設立選項包括裁量信託（Discretionary Trust）、複委信託（Delegated Trust）、指揮信託（Directed Trust）等；VISTA信託（Virgin Islands Special Trusts Act）係英屬維京群島（BVI）特有之信託制度，並非美國信託選項，故選項4正確。"}, {"q": "有關新加坡保留權力信託的敘述，下列何者錯誤？", "options": ["在新加坡，信託不會因為保留投資或資產管理的權限範圍，而被認定為無效；即使保留 權力到致使委託人實際控制整個信託，也不會被視為虛假之信託", "新增受益人，該事由雖為受託人之裁量權事項，但委託人可以透過信託契約約定，指定 自己為保護人，當受託人新增受益人之時，須事前取得保護人的同意", "信託資產的投資決策可約定由委託人決定，委託人亦可指定第三人擔任投資顧問或投資 經理人，協助受託人投資信託基金或其他資產", "委託人可透過信託契約的約定，將該信託持有之實質營運公司指定為特定財產，並可要 求受託人，遵循委託人對該實質營運公司所做出的相關決定"], "ans": 0, "exp": "新加坡保留權力信託（Reserved Powers Trust）下，委託人保留投資或資產管理權限不致使信託無效，惟若保留權力大到使委託人實際完全控制整個信託，仍可能被認定為虛假信託（sham trust），選項1稱「即使保留權力到實際控制整個信託也不會被視為虛假信託」過於絕對，故為錯誤敘述。其餘指定保護人、約定投資決策、指定特定營運公司並要求受託人遵循等，均屬保留權力信託容許之安排。"}, {"q": "下列何者「並非」美國南達科他州朝代信託的特色？", "options": ["南達科他州信託得以無期限存續", "南達科他州不課徵州層級的所得稅", "設立南達科他州朝代信託後，信託財產可當然免除贈與稅", "南達科他州朝代信託可提供高度資產保護，使信託資產在符合法定要件下免於債權人侵 害"], "ans": 2, "exp": "美國南達科他州朝代信託（Dynasty Trust）之特色包括可無期限存續、該州不課州所得稅、提供高度資產保護。惟設立朝代信託本身並不當然免除聯邦贈與稅，移入信託之財產仍可能涉及贈與稅（須運用免稅額等規劃），故選項3「信託財產可當然免除贈與稅」並非其特色，為正確答案。"}, {"q": "開曼群島STAR 信託與傳統信託最大的不同點之一，在於其對「禁止永續原則(Rule Against Perpetuities)」之適用規定為何？", "options": ["限制信託期間最長80 年", "限制信託期間最長150 年", "不適用禁止永續原則，信託可永久存續", "須每50 年重新登記一次"], "ans": 2, "exp": "正解為選項3。開曼STAR信託最大特色即排除「禁止永續原則」之適用，使信託得永久存續、不受傳統信託存續年限限制，故選項3正確。選項1、2所稱固定80年或150年上限，以及選項4每50年重新登記，均非STAR信託之規定。"}, {"q": "依據英屬維京群島《維京群島特別信託法》(VISTA)，有關受託人對底層營運公司之職責，下 列敘述何者正確？", "options": ["受託人需介入公司日常營運", "受託人必須擔任公司之執行董事", "受託人負有分散投資風險之義務", "受託人僅負持有股份之責，不干預管理"], "ans": 3, "exp": "正解為選項4。VISTA信託之設計核心在於受託人僅單純持有底層公司股份，將公司經營交由公司董事，受託人不介入管理（即排除一般受託人的審慎管理與分散投資義務），故選項4正確。選項1介入日常營運、選項2必須任執行董事、選項3負分散投資義務，均與VISTA「股份留存制度」相反。"}, {"q": "有關英屬維京群島VISTA 控股信託特色敘述，下列何者錯誤？", "options": ["信託任命人／委員會可以管控VISTA 控股公司董事的指派", "受託人未被賦予處分VISTA 控股公司股份的權力", "VISTA 信託可以無限期持有公司股份（若為目的信託）", "VISTA 控股公司只限於註冊於英屬維京群島的公司"], "ans": 1, "exp": "正解為選項2（敘述錯誤者）。VISTA控股信託之特色在於受託人僅持有股份、不主動處分，惟此屬「不干預管理」而非「未被賦予處分權」；受託人並非完全無處分股份之權力，故選項2敘述錯誤。選項1任命人／委員會得管控控股公司董事指派、選項3目的信託得無限期持有、選項4控股公司限於註冊於BVI，均為VISTA特色。"}, {"q": "有關新加坡合規外國信託(Qualified Foreign Trusts)，享有所得稅免稅優惠須符合的條件中， 下列敘述何者錯誤？", "options": ["該信託必須以書面設立", "受益人與委託人為個人時，限於非新加坡公民且未居住於新加坡", "受益人與委託人為公司時，並不限於外國公司，但受託人必須是新加坡公民或依新加坡 成文法組織的信託公司", "此類信託得以免稅的指定投資(Designated investments)之特定收入(Specified income)，包 括來自新加坡境外的房地產租金收益匯入新加坡的收入"], "ans": 2, "exp": "正解為選項3（敘述錯誤者）。新加坡合規外國信託之免稅，要求委託人及受益人均非新加坡居民；當受益人或委託人為公司時，仍須為外國公司（不得為新加坡公司），故選項3稱「並不限於外國公司」錯誤。選項1須以書面設立、選項2個人須為非公民且非居民、選項4指定投資之特定收入涵蓋境外不動產租金匯入收入，均屬正確。 --- ## Related Concepts - [[06-境外信託]] - [[04-信託法與信託架構]] - [[10-CFC與跨境身分]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "母親甲以自己名義，以自己為要保人兼被保險人向保險公司投保死亡保險，並以兒子乙為 保險受益人，如母親甲想將該保險向銀行辦理保險金信託，按現行銀行實務作業，有關保 險金信託之敘述，下列何者正確？", "options": ["信託之委託人為甲；信託之受益人為乙", "信託之委託人為乙；信託之受益人為甲", "信託之委託人為甲；信託之受益人為甲", "信託之委託人為乙；信託之受益人為乙"], "ans": 3, "exp": "正解為選項4。依現行銀行保險金信託實務，係由保險受益人乙以其將來可受領之保險金為信託財產、自己為委託人並兼受益人辦理信託，故委託人與受益人均為乙，選項4正確。母親甲為要保人兼被保險人，並非保險金信託之委託人，故以甲為委託人之選項1、3及以甲為受益人之選項2均錯誤。"}, {"q": "企業主規劃年金保險，以自己在生存期間領取保險年金，死亡後由其指定受益人領取，而 下列敘述何者錯誤？", "options": ["要保人生存時年金已進入給付期，則該保險給付屬免稅所得", "要保人死亡時年金仍在累積期，則該保單價值準備金應列入遺產", "要保人生存時年金已進入給付期，則該保險給付不計入生存受益人之基本稅額課稅", "要保人死亡時年金已進入給付期，未支領之年金給付予死亡受益人時，不計入要保人之 遺產，而無課遺產稅之風險"], "ans": 3, "exp": "正解為選項4。年金保險於要保人死亡時若已進入給付期，未支領之年金給付予死亡受益人者，仍屬被繼承人遺有之財產權，應計入要保人之遺產課徵遺產稅，故選項4「不計入遺產、無遺產稅風險」錯誤。選項1給付期之年金給付屬免稅所得、選項2累積期之保單價值準備金應列入遺產、選項3給付期之保險給付不計入受益人基本稅額，敘述正確。"}, {"q": "王董經營事業持有不少海外財產，近期他耳聞可利用境外私募人壽保險架構(PPLI)安排傳 承，有關境外私募人壽保險架構之敘述，下列何者錯誤？", "options": ["被保險人須為自然人", "保費可以以資產支付", "身故保險金限以金錢支付", "保單持有人可為自然人、法人或信託等"], "ans": 2, "exp": "正解為選項3。境外私募人壽保險（PPLI）之身故保險金並不限以金錢支付，亦可以實物資產（如投資組合資產）給付，故選項3「限以金錢支付」錯誤。選項1被保險人須為自然人、選項2保費可以資產支付、選項4保單持有人可為自然人法人或信託，均屬PPLI之正確特徵。"}, {"q": "周先生為企業主，多年前喪偶，目前子女皆未成年，他希望成立保險金信託讓自己萬一過 世後，子女能受到照顧，而下列敘述何者正確？", "options": ["保險金信託非屬自益信託", "周先生可同時擔任保險之要保人及被保險人", "未成年子女為保險受益人，但不得為信託委託人", "周先生投保之保險種類以生存保險較為合適"], "ans": 1, "exp": "正解為選項2。要保人與被保險人得為同一人，周先生自為要保人並以自己為被保險人於法無礙，故選項2正確。保險金信託得以自益方式辦理（並非一定非自益，選項1敘述過於絕對而不正確）；未成年子女得為信託委託人（由法定代理人代理，選項3錯）；為使身故時子女獲照顧，應投保「死亡保險（壽險）」而非生存保險（選項4錯）。"}, {"q": "有關企業主以自己為要保人及被保險人投保之人壽保險，並以指定之子孫為受益人。下列 敘述何者錯誤？", "options": ["受益人之保險給付免納所得稅", "企業主死亡時，給付予受益人之保險金不計入其遺產總額", "若企業主在113 年12 月投保，則受益人領取之保險金應計入其基本所得額", "若屬傷害保險之死亡給付，因保障額度高而有被實質課稅之風險"], "ans": 3, "exp": "正解為選項4，此為反向題。具有死亡給付之保險（不限傷害保險）若投保動機與時點異常、躉繳高額、帶病投保等情形，均可能遭實質課稅，並非「傷害保險因保障額度高」才有風險，故選項4敘述錯誤。人壽保險受益人之保險給付免納所得稅（選項1對）、指定受益人之身故保險金不計入遺產總額（選項2對）、113年投保之保險給付可能計入受益人基本所得額（選項3對）。"}, {"q": "家族信託規劃可結合保險金信託，有關保險金信託敘述，下列何者錯誤？", "options": ["保險金匯入信託專戶後信託生效", "通常建議委託人選任信託監察人", "信託契約得以自益或他益信託方式辦理", "保單需辦理批註將保險金限匯入至受益人信託專戶"], "ans": 2, "exp": "正解為選項3，此為反向題。保險金信託多以「自益信託」方式辦理（委託人即受益人本人，或由其法定代理人代理），實務上甚少以他益方式為之，選項3說「得以自益或他益信託方式辦理」之敘述與保險金信託之典型架構不符，故列為錯誤。保險金匯入信託專戶後信託生效（選項1對）、通常建議選任信託監察人（選項2對）、保單須批註限將保險金匯入受益人信託專戶（選項4對）。"}, {"q": "甲君進行家族傳承之規劃後，也考量須有一筆錢專款照顧自己交棒後之生活，因此想成立 一份甲君為委託人及受益人之信託契約，並希望在信託契約約定由信託業交付保險費，關 於這樣的規劃，下列敘述何者正確？", "options": ["信託契約有約定信託業得代為支付信託，但信託業並不因此取得保險契約當事人之地位", "保險費應由要保人依保險契約規定支付，因此即使信託契約有約定，但信託業仍不得代 為支付", "信託契約雖有約定信託業得代為支付信託，但仍須將保單要保人改為信託業，信託業才 能代為支付保險費", "信託契約雖有約定信託業得代為支付信託，但仍須將保單受益人改為信託業，信託業才 能代為支付保險費"], "ans": 0, "exp": "本題問何者正確。信託契約得約定由信託業以信託財產代為支付保險費，此係信託事務之處理行為，信託業並不因代付保費而取得保險契約當事人（要保人）之地位，故選項1正確。無須改要保人或受益人為信託業始能代付（選項3、4錯）、契約既有約定則信託業即得代付（選項2錯）。"}, {"q": "陳董事長希望藉由資產移轉與人壽保險（要保人及被保險人皆為陳董事長，保險理賠金為 5,000 萬元）進行搭配完成傳承規劃，甲君也願意在陳董事長過世後，由乙君給付款項全數 買下甲君繼承之股票。假設陳董事長過世時資產僅有價值5,000 萬元之公司股票。假設本保 單「不」屬於財政部實質課稅原則之態樣，請問這張保單之設計，下列敘述何者正確？", "options": ["如設定保單身故受益人僅為乙君，此保單違反應繼分，因此甲君可以主張保單無效", "如設定保單身故受益人僅為乙君，此保單違反特留分，因此甲君可以主張保單無效", "可設定保單身故受益人僅為乙君，由該保險理賠金用來給付購買甲君繼承股票之價款", "可設定保單身故受益人僅為甲君，甲君收到保險理賠金5,000 萬元，則陳董事長可立遺 囑由乙君繼承所有資產（即股票5,000 萬元），即不違反特留分"], "ans": 2, "exp": "本題問何者正確。人壽保險金依約給付指定受益人，係保險契約之效力，原則上不構成遺產、亦不受應繼分或特留分之拘束（保險金非被保險人遺產）。故可設定身故受益人僅為乙君，再以該理賠金作為乙君向甲君買受其繼承股票之價款來源，達股權集中目的，選項3正確。指定單一受益人不因違反應繼分或特留分而使保單無效（選項1、2錯）。"}, {"q": "針對A 保單（為人壽保單，要保人與被保險人皆為陳董事長，受益人為甲君與乙君）與B 保單（為人壽保單，要保人為陳董事長，被保險人為乙君，受益人為甲君），在陳董事長死 亡時之相關給付或價值，假設本2 張保單「不」屬於財政部實質課稅原則之態樣，下列敘 述何者正確？", "options": ["A 保單與B 保單，皆不列入陳董事長之遺產", "A 保單與B 保單，皆須列入陳董事長之遺產", "僅A 保單須列入陳董事長之遺產，B 保單不列入陳董事長之遺產", "僅B 保單須列入陳董事長之遺產，A 保單不列入陳董事長之遺產"], "ans": 3, "exp": "本題問何者正確。A保單要保人與被保險人皆為陳董事長、受益人為子女，屬指定受益人之人壽保險身故給付，原則不列入被保險人遺產；B保單要保人為陳董事長、被保險人為乙君，陳董事長身故時被保險人乙君尚生存、保險事故未發生，該保單係以陳董事長之財產購買而存有「保單價值（責任準備金）」，屬陳董事長之遺產應列入。故僅B保單列入、A保單不列入，選項4正確。"}, {"q": "C 保單（為人壽保單，要保人與被保險人皆為陳董事長，受益人為甲君與乙君）如果符合 實質課稅原則，需課徵遺產稅，下列敘述何者正確？", "options": ["陳董事長有2 位繼承人，因此保險給付得扣除7,480 萬元後列入遺產總額", "陳董事長雖有2 位繼承人，因此保險給付仍僅得扣除3,740 萬元後列入遺產總額", "甲君及乙君收到該保單之保險理賠，不會再計入甲君及乙君當年度之基本所得稅額", "繼承人可選擇列入陳董事長之遺產，或計入甲君及乙君當年度之基本所得稅額等2 種方 式擇一申報"], "ans": 2, "exp": "本題問何者正確。C保單若符合實質課稅原則須課遺產稅，則該保險給付係以「遺產」課徵遺產稅；而依所得基本稅額條例，已計入遺產課遺產稅之保險給付，即不再重複計入受益人（甲、乙）當年度之基本所得稅額，故選項3正確。遺產稅之保險金死亡給付扣除額有其定額上限而非按繼承人數倍增（選項1、2錯）、亦非由繼承人任選遺產稅或最低稅負二擇一申報（選項4錯）。"}, {"q": "甲君之配偶為乙君，甲君想購買人壽保險保單，其中受益人為2 人之子丙君，甲君規劃甲 為要保人、乙為被保險人，丙為受益人之保單，下列敘述何者正確？（假定此保單非屬死亡 人壽保險金依實質課稅原則之態樣）", "options": ["在甲過世後，保險公司會給付保險金給丙", "在甲過世後，保單價值準備金為甲之遺產", "在乙過世後，保單價值準備金為乙之遺產", "在甲過世後，保單價值準備金為乙之遺產"], "ans": 1, "exp": "本題問何者正確。要保人甲、被保險人乙、受益人丙之保單，保單價值準備金歸屬於要保人，要保人甲過世時，保單尚未發生保險事故（被保險人乙仍生存），該保單之保單價值準備金應列為要保人甲之遺產，故選項2正確。甲過世時被保險人乙未死亡，保險公司不會給付保險金給丙（選項1錯）；保單價值準備金歸要保人而非被保險人乙，故選項3、4錯誤。"}, {"q": "甲君想未來以其為要保人及被保險人之死亡或失能保險金可以交付信託，因此開始找朋友 詢問保險金信託之觀念，下列觀念何者錯誤？", "options": ["保險金信託可以依甲君之失能保險金照顧甲君", "保險金信託可以依甲君之死亡保險金照顧未成年之小孩", "信託財產為應登記之財產者，應依有關規定為信託登記", "依據保險法138-2 條之規定，保險業經營人身保險業務，保險契約僅得約定保險金一次給 付，無法分期給付"], "ans": 3, "exp": "本題問何者錯誤。依保險法第138條之2規定，保險業經營人身保險業務，保險契約得約定保險金「分期給付」並得約定信託，故選項4稱「僅得一次給付、無法分期給付」係錯誤。保險金信託可依失能保險金照顧被保險人本人、依死亡保險金照顧未成年子女、應登記財產應辦信託登記（選項1、2、3），均為正確觀念。"}, {"q": "甲君想透過人壽保險保單進行預留遺產稅源，規劃乙君為要保人、甲君為被保險人，乙君 為受益人之保單，考量甲君之小孩乙君雖已成年但無力繳付保費，因此由甲君贈與金額給 乙君，再由乙君繳付保費，下列針對本張保單之敘述何者錯誤（假定此2 張保單皆非屬死 亡人壽保險金依實質課稅原則之態樣）？", "options": ["乙君有變更受益人之權利", "甲君贈與乙君繳付保費之金額，須計入甲君贈與年度之贈與總額", "保費係由甲君贈與金額給乙君，因此乙君無變更保險契約之權利", "如保單未解約或未進行其他變更之情形下，甲君過世後之保險給付，符合甲君預留遺產 稅源之規劃"], "ans": 2, "exp": "本題問何者錯誤。本保單乙為要保人、甲為被保險人、乙為受益人。保費來源縱由甲贈與金額給乙再由乙繳付，乙仍為要保人，依法享有變更要保契約（含受益人）之權利，故選項3稱「乙無變更保險契約之權利」係錯誤。乙有變更受益人權利（選項1）、甲贈與乙之金額須計入甲贈與總額（選項2）、被保險人甲過世後保險給付符合預留稅源規劃（選項4），均屬正確。"}, {"q": "傷害保險及死亡保險皆可搭配保險金信託，達成安養信託及保護信託之目的，下列敘述何 者錯誤？", "options": ["搭配傷害保險之信託受益人為保險之被保險人", "搭配死亡保險之信託委託人為保險之被保險人", "搭配死亡保險之信託受益人為保險之受益人", "搭配傷害保險之信託委託人為保險之受益人"], "ans": 1, "exp": "本題問何者錯誤。搭配死亡保險之保險金信託，係由保險受益人於領取死亡保險金後（或約定將保險金）交付信託，故信託委託人應為保險之「受益人」，而非保險之被保險人（被保險人已身故無從為委託人），故選項2稱「委託人為被保險人」係錯誤。傷害保險信託受益人為被保險人、死亡保險信託受益人為保險受益人、傷害保險信託委託人為保險受益人（選項1、3、4），均為正確配置。"}, {"q": "保單可能遭到稅捐稽徵機關以實質課稅原則課徵遺產稅的八大特徵，下列何者錯誤？", "options": ["鉅額投保", "舉債投保", "高齡投保", "保險費低於保險金額"], "ans": 3, "exp": "實質課稅原則下保單常見特徵包括躉繳、鉅額、高齡、重病、舉債、密集、短期、保費與保額相當（甚至保費高於或等於保額）等投保。選項4「保險費低於保險金額」是一般正常保險的常態現象，並非異常規避特徵，故為錯誤敘述；其餘鉅額、舉債、高齡投保均屬八大特徵。"}, {"q": "有關企業主規劃以保險金信託結合安養信託來照顧自己晚年生活，下列敘述何者錯誤？", "options": ["由企業主自己擔任保險契約之要保人兼受益人，及信託契約的委託人兼受益人", "保險險種以人壽保險為限", "此保險金信託屬於自益信託架構", "保單要保人須洽保險公司，約定保險理賠金直接匯入信託專戶，專款專用照顧企業主自 己"], "ans": 1, "exp": "保險金信託結合安養信託照顧自己晚年，保險險種不以人壽保險為限，亦可包含年金保險等，故選項2「保險險種以人壽保險為限」錯誤。企業主自任要保人兼受益人、信託委託人兼受益人形成自益信託架構、約定理賠金直接匯入信託專戶專款專用，均為正確規劃。"}, {"q": "在人壽保險規劃中，若要保人與被保險人不同人，又要保人比被保險人先死亡，該保單會 產生何種稅務問題？", "options": ["受益人的所得稅問題", "保險公司的營利事業所得稅問題", "被保險人的贈與稅問題", "要保人的遺產稅問題"], "ans": 3, "exp": "人壽保險若要保人與被保險人非同一人，且要保人先於被保險人死亡，因保單價值準備金屬要保人之財產，於要保人死亡時該保單（保價金）構成要保人之遺產，須課徵要保人之遺產稅，故選項4正確。"}, {"q": "有關國內辦理「保險金信託」的敘述，下列何者錯誤？", "options": ["可由信託契約受託人擔任保險契約之要保人", "信託契約可用以約定「代要保人交付保險費」", "保險金信託與「高齡者安養信託」結合，係以非身故保險所支付之滿期金、生存金或失 能全殘理賠金等，存入信託專戶用以照顧高齡者生活所需", "保險金信託與「身心障礙者安養信託」結合，一般係以身故理賠金存入信託專戶，用以 照顧身心障礙者安養生活所需"], "ans": 0, "exp": "正解為選項1（敘述錯誤者）。國內保險金信託實務上，受託人僅就「保險金」進行管理運用，並不擔任保險契約之要保人，故選項1錯誤。選項2得約定代要保人交付保費、選項3高齡安養信託結合生存金或滿期金、選項4身心障礙安養信託結合身故理賠金，均為實務常見正確安排。"}, {"q": "在「保險金信託」的架構中，當保險事故發生後，保險人將保險金直接支付給誰？", "options": ["要保人的法定繼承人", "信託監察人，再由其分配給受益人", "保險契約指定之最終受益人", "受託銀行之信託專戶"], "ans": 3, "exp": "正解為選項4。保險金信託架構中，保險事故發生後，保險人係將保險金直接給付至「受託銀行之信託專戶」，再由受託人依信託契約管理運用及分配，故選項4正確。保險金並非直接付予法定繼承人、信託監察人或保險受益人個人。"}, {"q": "國稅局針對人壽保險投保動機，常引用下列何種原則要求納稅義務人補稅？", "options": ["信賴保護", "誠實信用", "稽徵經濟", "實質課稅"], "ans": 3, "exp": "正解為選項4。國稅局針對人壽保險之投保動機（如重病、躉繳、高齡、舉債、鉅額投保等），常援引「實質課稅原則」否認其節稅效果並要求補徵遺產稅，故選項4正確。信賴保護、誠實信用、稽徵經濟均非用以否認保險節稅效果之核心原則。"}, {"q": "甲與乙為夫妻，育有一女兒丙。若甲為避免其死亡時遺留龐大遺產，其繼承人必須繳納巨 額遺產稅之需要，遂以自己為要保人及被保險人、丙為受益人，向A 人壽保險公司（下稱 A 公司）投保死亡給付新臺幣6,000 萬元之死亡險，有關該死亡險之敘述，下列何者正確？", "options": ["甲死亡時，A 公司之死亡給付，僅限於新臺幣3,740 萬，不計入甲之遺產稅", "甲死亡時，A 公司之死亡給付新臺幣6,000 萬元，不計入甲之遺產稅", "甲死亡時，A 公司之死亡給付新臺幣6,000 萬元，由丙繳納所得稅", "甲死亡時，甲之妻乙，得對A 公司之死亡給付新臺幣6,000 萬元，主張剩餘財產分配請 求權"], "ans": 1, "exp": "正解為選項2。甲以自己為要保人及被保險人、丙為受益人投保死亡險，符合人壽保險指定受益人之保險給付不計入遺產之原則，6,000萬死亡給付不計入甲遺產稅，故選項2正確。選項1金額限縮3,740萬無依據；選項3身故保險給付非所得不課所得稅；選項4配偶剩餘財產分配請求權不及於指定受益人之保險給付，三者皆錯。惟若涉實質課稅（鉅額、帶病投保等）情形，實務仍可能調整，本題就一般原則作答。"}, {"q": "甲董事長想成立保險金信託，也考慮透過保險公司之保險金分期給付，針對兩者比較，下 列敘述何者正確？", "options": ["保險金信託與保險金分期給付，皆可設置信託監察人", "能搭配保險金信託之保單，必定可以適用保險金分期給付", "保險金信託可依客戶需求檢附單據進行臨時分配；保險金分期給付則無法指定保險金用途", "保險金信託在信託成立後與保險公司之保險金分期給付開始啟動分期後，皆要開始支付 信託管理費"], "ans": 2, "exp": "正解為選項3。保險金信託可依客戶需求檢附單據進行臨時分配（具彈性運用功能），而保險公司之保險金分期給付僅按約定期程給付、無法另行指定保險金用途，故選項3正確。選項1分期給付無信託監察人機制；選項2能搭配信託之保單未必皆可適用分期給付；選項4分期給付非信託、不收信託管理費，三者皆錯。 --- ## Related Concepts - [[07-保險與傳承]] - [[03-遺產及贈與稅]] - [[05-信託稅制]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "下列何者非屬個人房地合一稅的「非自願性因素」可採用五年內出售的優惠稅率？", "options": ["調職或非自願離職", "依法遭強制執行", "配偶因重大疾病或意外需支付醫藥費", "受贈取得不動產及相關房貸，卻無力償還本金及利息"], "ans": 3, "exp": "正解為選項4。房地合一稅之「非自願性因素」係指非可歸責於納稅人且具急迫性之事由；「受贈取得不動產及相關房貸卻無力償還本息」並不在財政部所列非自願性因素之列，故選項4非屬之。選項1調職或非自願離職、選項2依法遭強制執行、選項3配偶因重大疾病或意外須支付醫藥費，均為列舉之非自願性因素。"}, {"q": "以土地為信託財產者，於信託關係存續中，土地應與受益人在同一直轄市或縣（市）轄區內 所有之土地合併計算地價總額，依相關規定稅率課徵地價稅，其應符合之規定，下列何者 正確？ A.受益人已確定並享有全部信託利益 B.受益人已確定並享有信託期間之孳息利 益 C.委託人未保留變更受益人之權利者 D.委託人保留變更受益人之權利者", "options": ["僅AC 正確", "僅AD 正確", "僅BC 正確", "僅BD 正確"], "ans": 0, "exp": "正解為選項1（僅AC正確）。土地信託期間，須受益人已確定並享有全部信託利益（A），且委託人未保留變更受益人之權利（C），始得將信託土地與受益人在同一直轄市或縣（市）轄區內之土地合併計算地價總額課徵地價稅。B僅享有孳息利益、D委託人保留變更受益人權利者，均不符合此合併計算之要件。"}, {"q": "有關土地增值稅與房地合一稅重購退稅，下列敘述何者錯誤？", "options": ["土地增值稅重購退稅條件之一為本人或配偶、直系親屬設有戶籍", "兩者皆為出售前1 年未供營業使用或出租", "兩者都無次數的限制", "房地合一稅重購退稅只能換大屋"], "ans": 3, "exp": "正解為選項4。房地合一稅之重購退稅得「小屋換大屋」或「大屋換小屋」，僅換大屋者可全額退、換小屋者按比例退，並非「只能換大屋」，故選項4錯誤。選項1土增稅重購退稅須本人或配偶、直系親屬設籍、選項2兩者皆要求出售前一年未供營業或出租、選項3兩者均無次數限制，敘述正確。"}, {"q": "甲109 年9 月以2,000 萬購買不動產，其土地公告現值及房屋評定現值合計200 萬元，同 年利用免稅額贈與兒子乙，僅繳納契稅及印花稅。111 年2 月乙以1,800 萬元出售，出售費 用30 萬元。而下列敘述何者正確？", "options": ["兒子乙取得房屋成本2,000 萬元", "實際虧損卻仍需繳交房地合一稅", "適用房地合一稅制之二年內出售不動產，其稅率35%", "無課稅所得"], "ans": 1, "exp": "正解為選項2。乙受贈取得不動產，其取得成本依房地合一稅規定係以「受贈時之土地公告現值及房屋評定現值」（合計200萬元）為準，而非甲之購入價2,000萬元；乙以1,800萬出售、減除30萬費用，課稅所得＝1,800−200−30＝1,570萬元，雖實際相較甲原始成本為虧損，仍須就此巨額課稅所得繳交房地合一稅，故選項2正確。選項1成本2,000萬、選項4無課稅所得均錯誤；持有期間及稅率之認定亦因受贈而與選項3不符。"}, {"q": "有關房地合一稅自用住宅的相關規定，下列敘述何者錯誤？", "options": ["本人或其配偶、未成年子女必須辦竣戶籍登記，持有並居住連續滿6 年", "在交易前6 年內，房屋不能出租或營業使用", "6 年內只能享有一次自用住宅優惠稅率。但配偶不受限制", "有400 萬的免稅額，課稅所得超過400 萬部分按10%優惠稅率"], "ans": 2, "exp": "正解為選項3。房地合一稅自用住宅優惠之「六年一次」限制係就同一申報戶（含本人、配偶及未成年子女）合併計算，配偶並不能另外再享有一次，故選項3「但配偶不受限制」錯誤。須本人或配偶、未成年子女辦竣戶籍並持有並居住連續滿六年（選項1對）、交易前六年內房屋未出租或營業使用（選項2對）、課稅所得在400萬元以下免稅、超過部分按10%稅率（選項4對）。"}, {"q": "某甲以土地移轉成立信託，該土地因下列情形於信託關係人間移轉所有權時，何者須課徵 土地增值稅？", "options": ["信託行為成立，委託人與受託人間", "信託關係存續中受託人變更時，原受託人與新受託人間", "因遺囑成立之信託，於信託關係消滅時，受託人與受益人間", "信託契約明定信託財產之受益人為非委託人者，信託關係消滅時，受託人與受益人間"], "ans": 3, "exp": "正解為選項4。依土地稅法關於信託土地之規定，原則上於信託關係人間移轉土地所有權多不課徵土地增值稅，惟信託契約明定受益人為「非委託人（他益）」者，於信託關係消滅、受託人移轉予受益人時，因實質受益歸屬已移轉，故須課徵土地增值稅，選項4正確。委託人與受託人間（選項1）、受託人變更時新舊受託人間（選項2）、依遺囑成立信託消滅時移轉等（選項3）均屬不課徵之情形。"}, {"q": "某甲於106 年2 月1 日以1,000 萬元購入一戶不動產，他正在評估如何將該不動產傳承給 兒子，而下列敘述何者錯誤？", "options": ["若採繼承，未來兒子出售不動產時之持有期間得將被繼承人持有期間合併計算", "若採贈與，未來兒子出售不動產計算房地合一稅所得時，仍得以1,000 萬元列計取得成 本", "若採買賣且買賣價格接近市價，未來兒子出售不動產時之房地合一稅稅基可能較小", "若採繼承，未來兒子出售不動產時，僅得減除繼承時之房屋評定現值及公告土地現值按 消費者物價指數調整後之價值"], "ans": 1, "exp": "正解為選項2，此為反向題。若採贈與取得，依房地合一稅規定，受贈人未來出售時之「取得成本」應以「受贈時之房屋評定現值及公告土地現值（按物價指數調整）」為準，而非原所有人當初購入之1,000萬元，故選項2錯誤。採繼承可合併計算被繼承人持有期間（選項1對）；採接近市價之買賣可墊高成本使稅基較小（選項3對）；採繼承之成本以繼承時房屋評定現值及公告土地現值按物價指數調整後價值計（選項4對）。"}, {"q": "王先生於114 年1 月3 日將112 年5 月4 日父親贈與給他的房產以2,000 萬出售，「112 年 5 月4 日房產的實價為1,800萬，時價為1,000 萬」，王先生需繳納多少房地合一稅？（假設 土地漲價總數額為0）", "options": ["76.5 萬", "90 萬", "436.5 萬", "450 萬"], "ans": 2, "exp": "正解為選項3（436.5萬）。受贈房產於114年出售屬贈與取得，取得成本以受贈時之「時價」1,000萬元計（非實價1,800萬）。土地漲價總數額為0。課稅所得＝售價2,000萬－取得成本1,000萬－移轉費用（依售價3%推計）60萬＝940萬。持有期間自112年5月受贈至114年1月，逾2年未逾5年，房地合一2.0適用稅率45%。應納稅額＝940萬×45%＝423萬，惟本題官方核計結果為436.5萬元（係依其採認之費用與稅基計算）。四個選項中以436.5萬最接近上開計算邏輯，故選項3為官方正解。本題屬計算細節（費用減除方式）較易生爭議者，宜以官方公告答案為準。"}, {"q": "張爺爺（非美國籍身分）過去考慮孫子在美國念書，在學區附近置產，讓孫子求學期間安心 讀書，如今孫子學成歸國，放置在美國當地不動產租給其他人使用，收取租金，對張爺爺而 言其租金收入所對應的稅賦，下列敘述何者正確？", "options": ["租金收入應繳美國稅15%", "租金收入應繳美國稅20%", "租金收入應繳美國稅30%", "美國租金收入已繳稅無須申報海外所得"], "ans": 2, "exp": "張爺爺為非美國籍（非居民外國人），其美國境內不動產出租屬美國來源所得。若未選擇按淨額（與美國貿易或營業有關所得）申報，租金屬固定或可確定的定期所得，須由付款人就「總額」按30%扣繳，故選項3正確。15%、20%為錯誤稅率；且海外所得在台灣仍須依最低稅負制申報，故選項4錯誤。"}, {"q": "地價稅符合自用住宅的優惠稅率為何？", "options": ["千分之一", "千分之二", "千分之三", "千分之十"], "ans": 1, "exp": "地價稅符合自用住宅用地要件者，適用優惠稅率為千分之二（2‰），故選項2正確。千分之十為一般用地基本稅率，千分之一、千分之三非地價稅自用住宅優惠稅率。"}, {"q": "有關囤房稅2.0 修法重點之敘述，下列何者錯誤？", "options": ["非自住住家用房屋稅率調高為2%-4.8%，並採全數累進制", "調降全國單一自住稅率", "申報租賃所得可減稅", "囤房稅2.0 實施後，各縣市分開歸戶"], "ans": 3, "exp": "本題為反向題。囤房稅2.0之修法重點之一為將非自住住家用房屋改採「全國歸戶」（跨縣市合併計算戶數），而非各縣市分開歸戶，故選項4錯誤。非自住稅率調高為2%~4.8%並採全數累進、調降全國單一自住稅率、申報租賃所得得減稅均為正確之修法內容。"}, {"q": "某甲於民國108 年購入房屋一間，考量年事已高，正評估如何將此筆房屋傳承給兒子，下 列敘述何者錯誤？", "options": ["若採買賣，因二親等買賣視同贈與，故兒子須舉證資金能力及支付價款證明供稅局審查", "若採贈與，不動產贈與價值按土地公告現值及房屋評定價值計算，可省贈與稅，但未來 兒子處分時，取得成本也被拉低，房地合一稅可能較高", "若採繼承，土增稅可歸零重新起算，不動產遺產價值按土地公告現值及房屋評定價值計 算，且免稅額及扣除額高，遺產稅較低", "若採繼承，某甲持有期間與兒子持有期間不能合併一起計算，以適用較低的房地合一稅 稅率"], "ans": 3, "exp": "本題為反向題。房地合一稅之持有期間計算，「繼承」取得者得將被繼承人持有期間與繼承人持有期間「合併計算」，以適用較低稅率，故選項4稱「不能合併計算」錯誤。二親等買賣視同贈與須舉證資金與付款、贈與雖省贈與稅但壓低取得成本致日後房地合一稅較高、繼承土增稅歸零重起算且免稅扣除額高遺產稅較低，均為正確說明。"}, {"q": "規劃家族藝術品管理時，根據文化藝術獎助及促進條例第29 條第1 項規定，經中央主管機 關認可之文化藝術事業，在中華民國境內辦理文物或藝術品之展覽、拍賣活動，得向中央 主管機關申請核准就個人透過該活動交易文物或藝術品之財產交易所得，由該文化藝術事 業為所得稅扣繳義務人，於給付成交價款予出賣人時，按其成交價額之百分之六為所得額， 依多少稅率扣取稅款，免依所得稅法規定課徵所得稅？", "options": ["百分之五", "百分之六", "百分之十", "百分之二十"], "ans": 3, "exp": "依文化藝術獎助及促進條例第29條第1項，經認可之文化藝術事業辦理文物藝術品展覽、拍賣，得就個人交易所得由該事業為扣繳義務人，按成交價額6%為所得額，依「百分之二十」稅率扣取稅款後免依所得稅法課稅，故選項4正確。實際稅負約為成交價額6%×20%=1.2%。"}, {"q": "有關各項稅務重購退稅，下列敘述何者錯誤？", "options": ["土增稅需為同一所有權人", "土增稅與房地合一稅皆為本人或配偶、直系親屬設戶籍", "土增稅與房地合一稅皆為出售前一年未供出租或營業使用", "土增稅與房地合一稅皆為5 年內不得改作其他用途或出售，否則須繳回退稅"], "ans": 1, "exp": "本題問何者錯誤。土地增值稅重購退稅要求重購之自用住宅用地有「本人或配偶、直系親屬」設籍，但房地合一稅重購退稅（自住房地）係要求本人、配偶或未成年子女設籍，二者設籍範圍不同，故選項2稱兩者皆為「本人或配偶、直系親屬」係錯誤。土增稅須同一所有權人（選項1）、出售前一年未供出租營業（選項3）、五年內不得改作其他用途或出售否則追繳（選項4），為兩稅共通或正確之要件描述。"}, {"q": "委託人某甲將房屋一間辦理他益信託移轉予信託業者乙，並指定兒子丙為全部信託利益之 受益人，且某甲無保留變更受益人之權利。有關信託存續期間房屋稅之相關敘述，下列何 者正確？", "options": ["計算房屋戶數時，應歸戶於某甲", "計算房屋戶數時，應歸戶於兒子丙", "計算房屋戶數時，應歸戶於信託業者乙", "信託存續期間以兒子丙為房屋稅之納稅義務人"], "ans": 1, "exp": "他益信託且委託人無保留變更受益人權利，受益權已確定歸屬受益人，房屋稅之歸戶（戶數認定）應歸於享有信託利益之受益人即兒子丙，故選項2正確。歸戶於委託人甲或受託人乙均不符受益歸屬原則；信託存續期間房屋稅之納稅義務人為受託人（信託業者乙）而非丙，故選項4亦非本題所問之正確歸戶答案。"}, {"q": "有關新制房地合一稅的相關規定，下列敘述何者正確？", "options": ["101 年1 月1 日取得的預售屋適用", "可以用自行申報土地公告現值計算土地漲價總數額", "房地合一稅在計算稅基時，收入在1,000 萬以上費用最高可以扣除30 萬，如果核實單據 有40 萬，也只能扣除30 萬", "出售特定股權要適用房地合一，所謂的特定股權是指個人及營利事業直接或間接持有股 份過半數且該營利事業50%以上由中華民國境內的房屋、土地所構成"], "ans": 3, "exp": "本題問何者正確。房地合一稅2.0之特定股權交易課稅，係指交易之股份其所表彰之營利事業，其價值50%以上由我國境內房屋、土地構成，且交易者（個人或營利事業）直接或間接持有該營利事業過半數股份，故選項4正確。新制適用範圍為105年後取得（非101年）；土地漲價總數額採實際移轉現值而非自行申報公告現值；費用未提示證明者按成交價額一定比率（有上限）推計，能核實者得核實認列，選項1、2、3均有誤。"}, {"q": "張董事長想將名下1 間不動產甲處與A 公司所持有之不動產乙處出租，這2 處不動產就租 金所得之規定，下列敘述何者正確？", "options": ["A 公司需繳付營業稅", "張董事長需繳付營業稅", "A 公司不需任何證明文件，即可扣除43%必要耗損及費用", "張董事長如以甲處作為信託財產，並以信託業擔任受託人，則甲處於信託後再出租，不 會有營業稅之議題"], "ans": 0, "exp": "本題問何者正確。A公司為營利事業，出租不動產收取租金屬銷售勞務，須課徵營業稅，故選項1正確。張董事長以個人身分且過去從未出租、非以營業方式出租，個人租賃所得課所得稅而非營業稅（選項2錯）；個人租賃所得未提示證明者按財政部標準認列必要費用，並非A公司適用且非一律43%（選項3錯）；個人將不動產交付信託後出租，租金仍屬租賃所得課稅範疇，不因信託即無營業稅議題之轉換（選項4錯）。"}, {"q": "委託人某甲將房屋一間辦理他益信託移轉予信託業者乙，並指定兒子丙為全部信託利益之 受益人，且某甲無保留變更受益人之權利。信託終止返還此筆不動產予兒子丙時，有關土 地增值稅之課徵，下列敘述何者正確？", "options": ["兒子丙為土地增值稅之納稅義務人", "信託業者乙為土地增值稅之納稅義務人", "委託人某甲為土地增值稅之納稅義務人", "信託成立時已課徵贈與稅，故免課徵土地增值稅"], "ans": 0, "exp": "本題問何者正確。土地增值稅之納稅義務人為土地所有權移轉時之取得人，於信託關係消滅、受託人將土地移轉返還予享有信託利益之歸屬權利人時，以該受益人兒子丙為納稅義務人，故選項1正確。受託人乙非歸屬權利人、委託人甲已非所有權人，且土地增值稅與信託成立時之贈與稅係不同稅目不得相互免徵，故選項2、3、4錯誤。"}, {"q": "林董事長計畫每年將不動產部分價值新臺幣244 萬元贈與給孫子，依據現行土地增值稅規 定，下列敘述何者正確？", "options": ["贈與土地時，一律適用一般稅率計算土地增值稅", "贈與屬無償移轉，免徵土地增值稅", "贈與土地需按市價計算土地增值稅並繳納", "直系親屬間贈與土地免土地增值稅，但需辦理申報"], "ans": 0, "exp": "本題問何者正確。土地增值稅係於土地所有權移轉（含有償及無償贈與移轉）時課徵，贈與土地予孫子並非免徵，原則上仍須申報並按一般稅率計算土地增值稅，故選項1正確。贈與並非免徵土增稅（選項2錯）；土增稅係按土地漲價總數額（以公告土地現值為計算基礎）課徵而非按市價（選項3錯）；直系親屬間贈與土地並無免徵土增稅之規定（選項4錯）。"}, {"q": "有關「囤房稅2.0」制度，下列敘述何者錯誤？", "options": ["囤房稅主要目的是抑制房屋囤積行為，增加持有成本", "囤房稅是調高房屋稅與地價稅稅率", "自住用房屋（本人、配偶及未成年子女全國限3 戶以內且符合設戶籍規定）房屋稅率不 因囤房稅增加", "囤房稅採全國歸戶"], "ans": 1, "exp": "本題問何者錯誤。囤房稅2.0係針對「房屋稅」調高非自住住家用房屋之稅率並採全國歸戶，並不包含調高「地價稅」，故選項2稱「調高房屋稅與地價稅稅率」係錯誤。其目的在抑制囤房、增加持有成本（選項1）、自住房屋符合本人配偶及未成年子女全國三戶以內且設籍者稅率不增（選項3）、採全國歸戶（選項4），均屬正確。"}, {"q": "有關林董事長評估是否改以公司方式持有不動產，下列敘述何者正確？", "options": ["公司持有不動產，房地合一稅稅率跟個人持有不動產相同", "公司持有不動產，未來移轉股權可達到資產傳承之效果", "公司持有不動產時，仍以土地公告現值為持有成本計算課稅基準", "公司持有不動產後，未來移轉股權與不動產買賣一樣須繳土地增值稅"], "ans": 1, "exp": "本題問何者正確。以公司方式持有不動產，未來欲傳承時可透過移轉「公司股權」之方式間接移轉不動產，達成資產傳承之效果，故選項2正確。公司持有不動產之房地合一稅率與個人不同（選項1錯）；房地合一稅計算課稅基準係以實際成交價及取得成本而非以公告現值為持有成本（選項3錯）；移轉股權係股權交易，不等同不動產買賣，不另課土地增值稅（選項4錯）。"}, {"q": "依我國房地合一稅新制規定，個人房屋、土地交易所得或損失之計算，下列何者不得列為 成本費用減除？", "options": ["購入房屋、土地達可供使用狀態前支付之必要費用（如契稅、印花稅、代書費、規費、公 證費、仲介費等）", "向金融機構借款之利息，包括房屋、土地所有權移轉登記完成後之貸款利息", "取得房屋後，於使用期間支付能增加房屋價值或效能且非二年內所能耗竭之增置、改良 或修繕費", "繼承房地時，如併同繼承被繼承人所遺貸款餘額，該貸款餘額超過繼承時之房地現值部 分"], "ans": 1, "exp": "房地合一稅計算可減除之成本費用，借款利息僅限於「取得（所有權移轉登記完成）前」之利息得計入成本，移轉登記完成後之貸款利息屬持有期間費用，不得列為成本費用減除，故選項2錯誤為本題答案。其餘取得前必要費用、增置改良修繕費、繼承貸款超過房地現值部分，均得減除。"}, {"q": "以房屋為信託財產之「本金自益、孳息他益」之信託，有關信託存續期間之房屋稅，下列敘 述何者正確？", "options": ["以委託人為納稅義務人", "以受益人為納稅義務人", "與受託人持有之房屋合併計算房屋戶數", "與委託人持有之房屋合併計算房屋戶數"], "ans": 3, "exp": "本金自益、孳息他益之房屋信託，信託期間房屋稅之納稅義務人為受託人，但受託人持有之信託房屋因屬委託人原有財產之延伸，依規定應與「委託人」持有之房屋合併計算戶數，以防藉信託分散持有規避非自住高稅率，故選項4正確。"}, {"q": "甲、乙公同共有土地一筆，管理人為丙，信託於丁，受益人為戊；於信託關係存續期間，該 筆土地地價稅之納稅義務人為何？", "options": ["甲及乙", "丙", "丁", "戊"], "ans": 2, "exp": "信託關係存續期間，土地地價稅之納稅義務人為受託人（信託財產之名義所有權人）。本題受託人為丁，故地價稅納稅義務人為丁，選項3正確。原所有人甲、乙、管理人丙、受益人戊均非地價稅納稅義務人。"}, {"q": "周爸爸所簽訂之不動產信託契約屬自益信託，若三年後合建完成，依約受益人可獲配二間 新成屋，但如果周爸爸屆時已過世且已成立遺囑信託，有關周爸爸之繼承人會面臨之稅負， 下列敘述何者正確？", "options": ["因遺囑信託已成立，故當周爸爸繼承人獲配二間新成屋時應課徵贈與稅", "因二間新成屋完工前未申報遺產稅，故周爸爸繼承人獲配二間新成屋時應申報遺產稅", "周爸爸繼承人獲配二間新成屋後出售，若符合房地合一稅規定之取得期間應申報房地合 一稅", "周爸爸繼承人獲配二間新成屋時屬於土地之過戶，應課徵土地增值稅"], "ans": 2, "exp": "周爸爸之不動產信託屬自益信託，二間新成屋於合建完成後配予受益人（周爸爸或其繼承人），日後繼承人「出售」該新成屋時，若符合房地合一稅關於取得日（持有期間）之規定，應申報房地合一稅，故選項3正確。獲配新成屋係自益信託受益人取得信託利益，非贈與（選項1錯）；遺產稅係就被繼承人死亡時之財產（含受益權）課徵，非俟獲配新屋時始申報（選項2錯）；自益信託本金交付受益人時不課土地增值稅（選項4錯）。"}, {"q": "下列何者非房地合一2.0 修正理由？", "options": ["藉由設立營利事業買賣短期持有之不動產減少所得稅負", "減輕換屋族負擔，擴大自用住宅適用重購退稅", "將應稅之房地交易所得轉換為免稅之股票交易所得", "利用增加繳納土地增值稅，減少房地合一所得稅"], "ans": 1, "exp": "正解為選項2（非修正理由者）。房地合一2.0之修正理由在於防杜利用公司或短期交易避稅（選項1、3、4皆為其欲遏止之避稅手法），而「減輕換屋族負擔、擴大自用住宅重購退稅」屬2.0持續維護之優惠而非新增之修正打擊理由，故選項2非屬修正理由。"}, {"q": "以房屋土地為信託財產，受託人於信託關係存續中交易信託財產，有關該房地取得日之認 定，下列敘述何者錯誤？", "options": ["自益信託，以委託人之取得日為取得日", "他益信託，以受益人之取得日為取得日", "信託關係存續中，變更受益人，為變更受益人之日為取得日", "受託人管理信託財產所取得之房地，為受託人取得該房地日為取得日"], "ans": 1, "exp": "正解為選項2（敘述錯誤者）。他益信託之房地取得日，應以「委託人之取得日」為取得日，而非受益人之取得日，故選項2錯誤。選項1自益信託以委託人取得日、選項3信託存續中變更受益人以變更日、選項4受託人管理信託財產所取得房地以受託人取得日，均為正確認定。"}, {"q": "孫媽媽計畫將不動產全部交付受託銀行，成立15 年期不動產信託，孫媽媽及女兒都是受益 人，孫媽媽僅受益每月房租作為生活費，約定信託結束時受託銀行將不動產全部移轉給女 兒，當符合相關信託成立條件時，信託成立與結束各會產生之稅負為何？", "options": ["成立：遺產稅；結束：無", "成立：贈與稅；結束：無", "成立：土地增值稅；結束：贈與稅", "成立：贈與稅；結束：土地增值稅"], "ans": 3, "exp": "正解為選項4。本案不動產交付他益信託，孫媽媽僅受益房租（孳息自益）、本金（不動產）由女兒受益，成立時就移轉予女兒之本金部分課徵贈與稅；信託結束時受託人將不動產實際移轉登記予女兒，發生土地所有權移轉而應課土地增值稅，故選項4「成立：贈與稅；結束：土地增值稅」正確。"}, {"q": "甲109 年花了2,200 萬元買了新北市永和店面，其土地公告現值及房屋評定現值200 萬元， 同一年贈與給兒子乙，僅繳納印花稅及契稅，免土地增值稅。1 年後兒子以2,000 萬元賣出， 可扣抵費用為50 萬元，需繳交多少房地合一稅？", "options": ["787.5 萬元", "612.5 萬元", "437.5 萬元", "175 萬元"], "ans": 0, "exp": "正解為選項1（787.5萬元）。乙取得成本以受贈時房地現值200萬元計（贈與取得），售價2,000萬元，扣除取得成本200萬及費用50萬，課稅所得＝2,000−200−50＝1,750萬元。乙併計甲持有期間後屬持有2年以內（短期），房地合一稅率45%，1,750萬×45%＝787.5萬元，故選項1正確。"}, {"q": "甲於104 年1 月1 日以成本1,000 萬元購入A 地，於108 年10 月1 日成立自益信託，將該 筆土地移轉至受託人乙名下，乙於113 年5 月1 日以2,000 萬元將A 土地出售，該價差 1,000 萬元（假設無相關其他支出），應如何課稅？", "options": ["應申報課徵房地合一稅", "屬舊制土地，土地交易所得免稅", "1,000 萬為受益權，應併入甲113 年度綜合所得稅課稅", "1,000 萬元由受託人扣繳20%納稅"], "ans": 1, "exp": "正解為選項2。甲於104年購入A地、108年成立自益信託移轉予受託人，因受益人即委託人（自益），土地實質仍屬甲所有；該地為105年以前取得之「舊制」土地，受託人113年出售之土地交易所得依舊制免課所得稅（土地交易所得免稅、僅課土地增值稅），故選項2正確。其餘選項誤認應課房地合一稅、併綜所稅或由受託人扣繳。"}, {"q": "甲董事長現在考慮獲利了結，想處分金條、黃金存摺與投資標的在國外之黃金基金其中一 項，但又不想利得被計入綜合所得稅，針對甲董事長之擔憂，下列建議何者正確？", "options": ["處分金條、黃金存摺與投資標的在國外之黃金基金，皆計入綜合所得稅", "應處分金條，因金條以賣價6%分離課稅，不再計入個人綜合所得稅計算", "應處分黃金存摺，因黃金存摺以賣價6%分離課稅，不再計入個人綜合所得稅計算", "應處分黃金基金，因投資標的在國外之黃金基金利得屬海外所得，併入個人基本所得額計算"], "ans": 3, "exp": "正解為選項4。投資標的在國外之黃金基金，其利得屬「海外所得」，併入個人基本所得額（最低稅負制）計算，而非併入綜合所得稅，符合甲不想被計入綜所稅之需求，故選項4正確。選項2、3稱金條、黃金存摺以賣價6%分離課稅並無此規定（其交易所得仍屬境內財產交易所得併入綜所稅），選項1全部併綜所稅亦不正確。 --- ## Related Concepts - [[08-不動產傳承稅務]] - [[03-遺產及贈與稅]] - [[05-信託稅制]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "甲為家族信託規劃顧問師，今受到客戶為設立閉鎖性股份有限公司為相關詢問，而下列敘 述何者錯誤？", "options": ["閉鎖性股份有限公司禁止以募集設立之方式設立", "為維持閉鎖性，閉鎖性股份有限公司可限制股份轉讓", "閉鎖性股份有限公司可以以公開發行股票公司或非公開發行股票公司成立", "閉鎖性股份有限公司性質上仍屬股份有限公司，除公司法中該專節明文規定應優先適用 者外，仍應適用一般股份有限公司之規定"], "ans": 2, "exp": "正解為選項3。閉鎖性股份有限公司因須維持股東人數與股份轉讓之封閉性，不得為公開發行股票公司，僅能以非公開發行方式存在，故選項3「可以以公開發行股票公司成立」錯誤。選項1禁止募集設立、選項2得限制股份轉讓、選項4性質仍屬股份有限公司而於專節未規定時適用一般規定，均正確。"}, {"q": "有關閉鎖性股份有限公司相關轉換方式之敘述，下列何者錯誤？", "options": ["公開發行股票之股份有限公司得經全體股東同意，變更為閉鎖性股份有限公司", "公司不符合公司法第三百五十六條之一閉鎖性股份有限公司規定時，應變更為非閉鎖性 股份有限公司，並辦理變更登記", "公司未依相關規定辦理變更登記者，主管機關得責令限期改正並按次處罰；其情節重大 者，主管機關得依職權命令解散之", "公司得經有代表已發行股份總數三分之二以上股東出席之股東會，以出席股東表決權過 半數之同意，變更為非閉鎖性股份有限公司"], "ans": 0, "exp": "正解為選項1。依公司法第356條之14，非公開發行股票之股份有限公司得經全體股東同意變更為閉鎖性股份有限公司；惟「公開發行股票」之公司因股東眾多無法取得全體同意，且閉鎖性公司不得公開發行，故選項1敘述方向錯誤。選項2不符規定時應變更為非閉鎖性公司、選項3未辦變更登記之處罰與得命解散、選項4變更為非閉鎖性公司之股東會決議門檻，均屬正確。"}, {"q": "有關閉鎖性股份有限公司章程參考範本中，對於投資委員會之敘述，下列何者錯誤？", "options": ["審議轉投資金額達一定金額以上之議案", "審議公司盈餘分派之建議方案", "審議處分公司資產達一定金額以上之議案", "投資委員會應將所提建議提交董事會討論"], "ans": 1, "exp": "正解為選項2。依閉鎖性股份有限公司章程參考範本，投資委員會之職權在於審議轉投資、處分公司資產達一定金額以上之議案，並將建議提交董事會討論；「公司盈餘分派之建議方案」非屬投資委員會之職權，故選項2錯誤。選項1、3、4均屬投資委員會之職權範圍。"}, {"q": "甲為A 上市公司之董事，於股東會選任時持有A 公司3,000 萬股，若甲規劃於任期中將 2,000 萬股成立家族信託，以其配偶及子女為受益人，交由B 銀行管理及處分，有關該信託 規劃之敘述，下列何者正確？", "options": ["因甲為上市公司之董事，其持股不得成立信託", "甲將2,000 萬股設定家族信託，並非出售股份，不影響其董事資格", "甲僅將2,000 萬股設定家族信託，並非轉讓全部股份，不影響其董事資格", "甲將2,000 萬股設定家族信託，構成在任期中轉讓超過選任當時所持有之公司股份數額 二分之一，其董事當然解任"], "ans": 3, "exp": "正解為選項4。依公司法規定，董事於任期中轉讓超過選任當時所持有公司股份數額二分之一者，其董事當然解任；甲選任時持3,000萬股，將2,000萬股成立信託已逾二分之一（1,500萬股），構成股份轉讓而當然解任，故選項4正確。選項1、2、3均誤認設定信託不影響董事資格。"}, {"q": "林董事長有2 個兒子及1 個女兒，如以閉鎖公司結合股權信託方式辦理傳承，規劃由大兒 子接班經營時，下列何種做法對於大兒子掌控經營權並非有利？", "options": ["為公平起見，讓2 個兒子及1 個女兒可行使之閉鎖公司股東表決權數均相同", "於閉鎖公司章程中訂明有利大兒子擔任閉鎖性股份有限公司董事長之選舉方式", "讓大兒子成為持有複數表決權之特別股股東", "讓大兒子成為持有特定事項否決權（黃金股）之特別股股東"], "ans": 0, "exp": "正解為選項1。題目問「對大兒子掌控經營權並非有利」者。讓三名子女表決權數均相同，會稀釋大兒子之控制力，對其掌握經營權並非有利，故選項1正確（為非有利做法）。選項2章程訂明有利大兒子當選董事長之選舉方式、選項3讓大兒子持複數表決權特別股、選項4讓大兒子持黃金股（否決權特別股），均有利其掌控經營權。"}, {"q": "王董設立A 閉鎖性股份有限公司之目的係希望將所擁有之股權傳承，並讓下一代能順利掌 握公司經營權，而下列敘述何者錯誤？", "options": ["A 公司可發行行使表決權順序之特別股，並應於章程中記載", "A 公司可發行限制型特別股或無表決權特別股，並應於章程中記載", "A 公司可發行複數表決權特別股或對於特定事項之否決權特別股，並應於章程中記載", "基於股東平等主義，A 公司不可以發行禁止或限制特別股股東被選舉為董事、監察人之 特別股"], "ans": 3, "exp": "正解為選項4。閉鎖性股份有限公司基於股權傳承與經營權安排之彈性，得發行禁止或限制特別股股東被選舉為董事、監察人之特別股，並非受股東平等主義所禁止，故選項4錯誤。選項1得發行行使表決權順序特別股、選項2得發行限制型或無表決權特別股、選項3得發行複數表決權或特定事項否決權特別股，且均應於章程記載，敘述正確。"}, {"q": "有關閉鎖性股份有限公司結合家族信託機制之優點，下列敘述何者正確？", "options": ["如閉鎖性股份有限公司無法正常運作時，受託人可依公司章程管理處分家族企業有價證 券", "對於不法或未經正當決策程序之指示，受託人可依信託監察人之指示拒絕執行", "受託人得依信託契約之條款，反向監督家族委員會之指示是否具合法性及程序正當性", "受託人可避免閉鎖性股份有限公司之股東或管理階層侵占公司財產或從事其他不法行為"], "ans": 3, "exp": "正解為選項4。閉鎖性股份有限公司結合家族信託之優點在於：透過受託人持股之外部監督，可避免閉鎖公司之股東或管理階層侵占公司財產或從事其他不法行為，故選項4正確。選項1、2、3將受託人之角色描述為依章程管理處分企業有價證券、依信託監察人指示拒絕執行、反向監督家族委員會等，均逾越或誤解受託人於此架構下之地位而錯誤。"}, {"q": "有關家族資產納入閉鎖性公司應注意事項，下列敘述何者錯誤？", "options": ["企業主辦理家族信託前，應先評估哪些現金、股票、公司債或不動產適合納入", "以股票作價出資，免課徵證券交易稅", "以土地作價出資，應以該作價視為土地現值，繳納土地增值稅", "以上櫃股票作價抵繳股款，得以衡量日前一天收盤價估定之"], "ans": 3, "exp": "正解為選項4。依規定以上櫃股票作價抵繳股款者，應以一定查核基礎（如鑑價或合理價值）估定，並非單純逕以衡量日「前一天」收盤價估定，故選項4敘述錯誤。辦理家族信託前應先評估資產適宜性（選項1對）、以股票作價出資免課證券交易稅（選項2對）、以土地作價出資應以作價視為土地現值繳納土地增值稅（選項3對）。"}, {"q": "王董依公司法規定成立一閉鎖性股份有限公司，為了方便遍居海外的家族成員開會，讓家 族成員亦得以不同方式參與股東會，下列敘述何者錯誤？", "options": ["公司章程得訂明股東會開會時，以視訊會議為之", "股東會開會時，如以視訊會議為之，其股東以視訊參與會議者，視為親自出席", "公司章程得訂明經全體股東同意，股東就每次股東會議案以書面方式行使其表決權，而 不實際集會", "公司召開股東會時，若採行書面行使表決權者，以書面方式行使表決權之股東，視為親 自出席股東會"], "ans": 2, "exp": "正解為選項3。依閉鎖性公司相關規定，公司章程得訂明經「全體股東同意」，股東就「當次股東會」之議案以書面行使表決權而不實際集會，惟選項3敘述以「每次股東會議案」之概括方式為之，與條文僅就特定該次會議之安排不符，故為錯誤。視訊會議得以章程訂明（選項1對）、視訊參與視為親自出席（選項2對）、書面行使表決權者視為親自出席（選項4對）。"}, {"q": "有關企業主辦理家族信託，下列敘述何者錯誤？", "options": ["以勞務出資者，應經全體股東同意並於章程載明其種類、抵充之金額及公司核給之股數", "為避免家族成員任意修改公司章程，可提高修改章程的股東出席人數", "為避免家族成員任意修改公司章程，可提高修改章程的出席人數表決門檻", "為確保公司資產之收益及安全，可在章程中設置分配委員會"], "ans": 3, "exp": "正解為選項4。為確保公司資產收益及安全所設置者，性質上屬信託架構或家族治理機制之安排，於公司章程中設置「分配委員會」並非公司法所定之公司內部機關設計，故選項4敘述錯誤。以勞務出資須經全體股東同意並於章程載明種類、抵充金額及股數（選項1對）；提高修改章程之出席人數及表決門檻，可防止家族成員任意修章（選項2、3對）。"}, {"q": "甲、乙、丙為A 閉鎖性股份有限公司（下稱A 公司）之股東，A 公司章程規定非經全體股 東同意，股東不得將股份轉讓給他人。若乙未經全體股東同意將其股份轉讓給丁，其效力 為何？", "options": ["有效", "無效", "有條件生效", "效力未定"], "ans": 1, "exp": "正解為選項2。閉鎖性股份有限公司之特性即在於股份轉讓受限，章程既規定「非經全體股東同意不得轉讓」，乙未經全體股東同意逕將股份轉讓予丁，違反章程之轉讓限制，該轉讓行為「無效」，故選項2正確。"}, {"q": "王董欲成立一閉鎖性股份有限公司，經詢問家族信託規劃顧問師，詢問最具有維持公司經 營權功能之方式，而下列敘述何者錯誤？", "options": ["發行複數表決權特別股", "發行當選一定席次董事名額權利之特別股", "針對特別股分派股息及紅利之順序特別規定", "發行特定事項否決特別股，該特別股具有黃金股之功能，得針對變更章程、公司解散、 公司併購享有最終決定權"], "ans": 2, "exp": "正解為選項3，此為反向題。維持公司經營權之特別股設計，係著眼於「表決權與經營控制」面向，如複數表決權特別股（選項1）、保障當選一定董事席次之特別股（選項2）、否決權（黃金股）特別股（選項4）。選項3「分派股息及紅利順序之特別規定」屬財產分配權之安排，與維持經營權無關，故為最不具維持經營權功能者（即敘述錯誤之選項）。"}, {"q": "張董家族擬以股作價成立閉鎖性（股）有限公司，依公司法規定必須以下列何種方式成立？", "options": ["發起設立", "募集設立", "變更組織設立", "辦理公開發行"], "ans": 0, "exp": "正解為選項1。依公司法規定，閉鎖性股份有限公司不得公開募集，僅得以「發起設立」方式成立（由發起人認足全部股份），不得採募集設立或公開發行，故以股作價成立閉鎖性公司須採發起設立。"}, {"q": "張董家族會合採二階段換股模式，其最主要考量原因為下列何者？", "options": ["擔心造成股價波動", "擔心股票在交易市場被買走", "無足夠現金來做股權的交易", "擔心董事持股出售超過二分之一"], "ans": 3, "exp": "正解為選項4。上市公司董事於任期中轉讓持股超過二分之一者，其董事當然解任。張董以股作價成立閉鎖性公司涉及大量股權移轉，為避免一次性移轉導致董事持股出售超過二分之一而當然解任、喪失經營權，故採二階段換股模式分次進行，選項4為最主要考量。"}, {"q": "依公司法規定，有關閉鎖性股份有限公司出資之規定，下列敘述何者錯誤？", "options": ["發起人之出資得以公司事業所需之財產抵充之", "發起人之出資得以公司事業所需之技術抵充之", "發起人之出資不得以公司事業所需之勞務抵充之", "公司申請設立登記之資本額，應經會計師查核簽證"], "ans": 2, "exp": "本題為反向題。依公司法閉鎖性股份有限公司之規定，發起人出資得以公司事業所需之財產、技術抵充，且勞務出資亦為閉鎖性公司之特色（在一定比例內得以勞務抵充），故選項3稱「不得以勞務抵充」錯誤。財產、技術得抵充及設立資本額應經會計師查核簽證均正確。"}, {"q": "下列何者為閉鎖性股份有限公司與一般股份有限公司之差異點？", "options": ["發行特別股，應於章程訂定特別股股東被選為董事之禁止或限制", "發行特別股，應於章程訂定特別股股東被選為監察人之禁止或限制", "發行特別股，應於章程訂定特別股股東當選一定名額董事之權利", "發行特別股，應於章程訂定特別股股東當選一定名額監察人之權利"], "ans": 3, "exp": "閉鎖性股份有限公司相較一般股份有限公司之特色，在於得於章程訂明特別股股東「當選一定名額董事」之權利（一般公司不得），故選項4（監察人版本）為本題依官方所列之正解；題目區辨重點在於閉鎖性公司章程得就特別股賦予當選一定名額董監之權利安排，係其與一般公司之差異點。其餘選項所述禁止或限制非屬閉鎖性公司之特有差異。"}, {"q": "客戶持有股票A（為上櫃公司）、B（為興櫃公司）與C（為非上市、非上櫃且非興櫃公司）， 該客戶的哪些股票可以作價抵繳股款成立閉鎖性股份有限公司？", "options": ["僅A", "僅AB", "ABC 皆可", "ABC 皆無法作價抵繳股款"], "ans": 2, "exp": "閉鎖性股份有限公司之發起人出資得以「公司事業所需之財產」抵充，股票屬有價證券財產，無論為上櫃（A）、興櫃（B）或非上市櫃非興櫃（C）公司股票，均得作價抵繳股款（須經一定估價程序），故ABC皆可，選項3正確。"}, {"q": "公司董事長想要進行家族傳承，因此計畫以閉鎖性股份有限公司以掌控家族資產，該公司 股東人數為5 人，持股皆為20%，有關公司法針對閉鎖性股份有限公司之規定，下列敘述 何者錯誤？", "options": ["股東人數沒有超過閉鎖性股份有限公司之股東人數限制", "公司章程得訂明股東會開會時，5 位股東皆可以視訊會議召開", "公司章程得訂明經5 位股東全體同意，股東就當次股東會議案以書面方式行使其表決權， 而不實際集會", "如一般公司私募轉換公司債，應經董事會及股東會決議，即使閉鎖性股份有限公司也無 法於公司章程中規定不須經股東會決議"], "ans": 3, "exp": "本題為反向題。閉鎖性股份有限公司之特色在於高度自治，得於章程放寬決議方式。私募轉換公司債等事項，閉鎖性公司本得於章程中作較一般公司寬鬆之安排，並非「即使閉鎖性公司也無法於章程規定不須經股東會決議」，故選項4錯誤。股東5人未逾人數上限、得章程訂明視訊開會、得經全體同意以書面行使表決權不實際集會，均屬正確。"}, {"q": "為達家族企業永續傳承及經營，在不修法的情形下，信託公會規劃以家族財產設立閉鎖性 股份有限公司，再以何人為委託人及受益人，設立自益信託管理家族財產之家族信託？", "options": ["企業主本人", "閉鎖性股份有限公司", "全體家族成員", "家族企業接班人"], "ans": 1, "exp": "依信託公會在不修法情形下之規劃，係以家族財產設立閉鎖性股份有限公司後，再由該「閉鎖性股份有限公司」為委託人及受益人，設立自益信託以管理家族財產，故選項2正確。以企業主本人、全體家族成員或接班人為委託人受益人均非此規劃架構。"}, {"q": "依公司法規定，有關閉鎖性股份有限公司之敘述，下列何者錯誤？", "options": ["除另有規定，不得公開發行有價證券", "除另有規定，不得公開募集有價證券", "不得經由證券主管機關許可之證券商經營股權群眾募資平臺募資", "不論以何方式募資，仍受公司章程所定股份轉讓之限制"], "ans": 2, "exp": "本題為反向題。閉鎖性股份有限公司原則不得公開發行及公開募集有價證券，但例外「得」經證券主管機關許可，透過證券商經營之股權群眾募資平臺募資，故選項3稱「不得」群募錯誤。不得公開發行、公開募集，及不論以何方式募資仍受章程所定股份轉讓限制，均屬正確。"}, {"q": "於家族資產傳承可運用之法律框架中，若希望提高股東結合度，下列何者錯誤？", "options": ["表決權拘束契約", "閉鎖性公司", "遺囑之特留分限制", "表決權信託"], "ans": 2, "exp": "本題為反向題，問何者「非」提高股東結合度之工具。表決權拘束契約、閉鎖性公司、表決權信託均可強化股東間表決一致與結合度；而「遺囑之特留分限制」係繼承法上對遺產處分自由的限制，與提高股東結合度無關，故選項3錯誤。"}, {"q": "陳董事長為該公司之內部人，陳董事長想將所持有股票部分交付信託，假設所移轉之股票 包括本次交付信託之股票，合計低於選任董事時之50%，下列敘述何者正確？", "options": ["陳董事長如為信託之委託人及受益人，且委託人保留對信託財產之運用決定權，則信託 財產本金（股票）之股票可計入全體董監之持股數", "如陳董事長設立之信託為本金自益，孳息他益之信託，雖委託人保留對信託財產之運用 決定權，但信託財產之本金（股票）已不可計入全體董監之持股數", "如陳董事長設立之信託為本金自益，孳息他益之信託，假定信託股票價值為1 億元，則 信託期間越短，當次成立信託所需繳付之贈與稅愈高", "假定陳董事長已知今年公司股票之配息狀況，於是趁在公司尚未配息前設立之信託為本 金自益，孳息他益之信託仍得適用訂約時以郵局1 年期定存利率計算贈與價值"], "ans": 0, "exp": "本題問何者正確。內部人陳董事長設立信託，若為「委託人即受益人之自益信託，且委託人保留對信託財產之運用決定權」，則委託人實質仍掌控該股票，信託財產本金（股票）仍應計入全體董監持股數，故選項1正確。若為本金自益孳息他益且保留運用決定權，本金仍計入持股（選項2錯）；孳息他益信託期間越長設算贈與價值越高、贈與稅越高（選項3稱期間越短稅愈高，錯）；已知配息仍於配息前成立者，依實質課稅不得適用郵局定存利率設算（選項4錯）。"}, {"q": "下列何者是閉鎖性公司專屬之特性？", "options": ["章程可限制轉讓", "可期中分派盈餘", "可以技術及勞務出資", "可發行特別股"], "ans": 0, "exp": "閉鎖性股份有限公司專屬特性在於得於章程明定股份「轉讓之限制」，這是閉鎖性最核心的制度設計，故選項1正確。期中分派盈餘、以技術或勞務出資、發行特別股，在一般股份有限公司或經修法後之非公開發行公司亦可為之，並非閉鎖性公司獨有的專屬特性，故錯誤。"}, {"q": "依公司法規定，有關閉鎖性股份有限公司之敘述，下列何者錯誤？", "options": ["有關新股發行之規定，適用公司法第二百六十七條", "新股認購人之出資方式，得以對公司所有之貨幣債權抵充之", "公司發行新股，除章程另有規定者外，應由董事會以董事三分之二以上之出席，及出席 董事過半數同意之決議行之", "公司得經有代表已發行股份總數三分之二以上股東出席之股東會，以出席股東表決權過 半數之同意，變更為非閉鎖性股份有限公司"], "ans": 0, "exp": "本題問何者錯誤。閉鎖性股份有限公司發行新股，依公司法明文「不適用」第二百六十七條（員工及原股東優先認購）之規定，以維持其閉鎖性，故選項1稱「適用第二六七條」係錯誤。出資得以對公司之貨幣債權抵充（選項2）、發行新股原則由董事會三分之二以上出席、出席過半同意（選項3）、變更為非閉鎖性公司須經代表已發行股份三分之二以上股東出席、出席過半同意（選項4），均為正確規定。"}, {"q": "依公司法規定，閉鎖性股份有限公司發起人選任董事及監察人之方式，下列敘述何者錯誤？", "options": ["除章程另有規定，選任董事時，每一股份有與應選出董事人數相同之選舉權", "除章程另有規定，選任董事時，不得集中選舉一人，當選為董事", "除章程另有規定，選任董事時，得分配選舉數人，當選為董事", "除章程另有規定，選任董事時，由所得選票代表選舉權較多者，當選為董事"], "ans": 1, "exp": "本題問何者錯誤。閉鎖性公司發起人選任董事監察人，除章程另有規定外，每一股份有與應選董事人數相同之選舉權，「得」集中選舉一人或分配選舉數人（即採累積投票精神），由得票較多者當選。選項2稱「不得集中選舉一人」與此相反，故為錯誤。選項1、3、4均符合上開累積投票選任規則。"}, {"q": "依公司法規定，有限公司之董事非得其他股東表決權多少比例以上之同意，不得以其出資 之全部或一部，轉讓於他人？", "options": ["二分之一", "三分之二", "四分之三", "五分之四"], "ans": 1, "exp": "依公司法規定，有限公司之董事非得「其他股東表決權三分之二以上」之同意，不得以其出資全部或一部轉讓於他人（一般股東則為過半數同意）。故選項2「三分之二」為正解，其餘比例均非法定門檻。"}, {"q": "信託公會研議將信託與閉鎖性股份有限公司結合之家族信託模式，利用閉鎖性公司之閉鎖 性規定，於何處載明除因繼承而轉讓者外，股東不得轉讓其股份予非家族成員之人，以避 免受益人直接為欲傳承之子孫而子孫任意將受益權轉讓之情形，以達到財富代代傳承之目 的？", "options": ["信託契約", "家族憲章", "閉鎖性股份有限公司章程", "接班人計劃"], "ans": 2, "exp": "信託與閉鎖性公司結合之家族傳承模式，係利用閉鎖性公司之「閉鎖性」，於「閉鎖性股份有限公司章程」中載明股東除因繼承外不得將股份轉讓予非家族成員，以鎖住股權於家族內，故選項3正確。信託契約、家族憲章、接班人計劃均無公司法上拘束股份轉讓對抗效力之強制效果，故非正解。"}, {"q": "假設A 公司為非公開發行公司，與張董事長想成立之閉鎖性公司D 公司之比較，下列敘述 何者錯誤？", "options": ["皆可發行無表決權特別股", "股東人數皆不得超過50 人", "皆可發行無票面金額之股票", "皆可發行複數表決權特別股"], "ans": 1, "exp": "本題問何者錯誤。非公開發行公司並無股東人數五十人之上限，僅閉鎖性股份有限公司股東人數不得超過五十人，故選項2稱「皆不得超過50人」係錯誤。兩者皆得發行無表決權特別股、無票面金額股票及複數表決權特別股（選項1、3、4），故為正確。"}, {"q": "依公司法規定，閉鎖性股份有限公司發行特別股，下列何者事項應記載於章程中？ A.特 別股分派股息及紅利之順序、定額或定率 B.特別股轉讓之限制 C.特別股股東被選舉為 董事、監察人之禁止或限制，或當選一定名額之權利 D.特別股分派公司賸餘財產之順序、 定額或定率", "options": ["僅ABD", "僅BCD", "僅ABC", "ABCD"], "ans": 3, "exp": "依公司法規定，閉鎖性股份有限公司發行特別股，應於章程載明之事項包括：特別股分派股息紅利之順序定額定率（A）、特別股轉讓之限制（B）、特別股股東當選董監之禁止限制或當選一定名額之權利（C）、特別股分派賸餘財產之順序定額定率（D），四者皆須記載，故選項4「ABCD」正確。"}, {"q": "甲與乙為閉鎖性股份有限公司A 之股東，想在該公司章程中約定股份轉讓之限制，依據相 關法規及函釋，下列敘述何者錯誤？", "options": ["可約定公司股份僅得移轉給企業主甲或乙之直系親屬", "可約定本公司股東因法律上的原因，必須出售其股份時，本公司其他股東享有優先購買 權", "可約定公司股份僅得移轉特定身分之人，並在公司成立15 年後，得經全體股東同意後， 轉讓給特定身分以外之人", "因閉鎖性股份有限公司之受託人須為信託業，因此「不得」約定因繼承造成公司股東人 數超過公司法之上限時，其後取得股份之股東可以以其他股東為受託人，將所取得之股 份交付信託"], "ans": 3, "exp": "本題問何者錯誤。閉鎖性公司章程得約定股份轉讓限制，且依相關函釋，因繼承致股東人數超過公司法上限時，後取得股份之股東「得」以其他股東為受託人將股份交付信託以維持閉鎖性，並非「不得」如此約定，且該股份信託之受託人不以信託業為限，故選項4錯誤。選項1、2、3所述限制移轉對象、優先購買權及一定年限後經全體股東同意得放寬等約定，均屬合法可行。"}, {"q": "閉鎖性股份有限公司的發起人出資，不包含下列何者？", "options": ["現金", "公司所需之信用", "公司所需之財產", "公司所需之技術或勞務"], "ans": 1, "exp": "閉鎖性股份有限公司之發起人出資得以現金、公司事業所需之財產、技術或勞務抵充，但不得以「信用」出資（公司法已刪除信用出資），故選項2「公司所需之信用」不包含在內，為正確答案。"}, {"q": "有關閉鎖性股份有限公司，下列敘述何者錯誤？", "options": ["必須於章程載明閉鎖性之屬性", "股份轉讓之限制方式，不得由公司自行規定", "許多家族企業會選擇成立閉鎖性股份有限公司來傳承家族的資產", "可利用股東協議或家族憲章協議，給予家族成員股份之優先承購權"], "ans": 1, "exp": "閉鎖性股份有限公司之核心特徵即由公司以章程自行訂定股份轉讓之限制方式，並非不得自行規定，故選項2錯誤。須於章程載明閉鎖性屬性、家族企業常用以傳承資產、可藉股東協議或家族憲章約定優先承購權，均為正確敘述。"}, {"q": "A 公司為閉鎖性股份有限公司，其公司章程規定，股東若欲轉讓股份，應經其他全體股東 之書面同意，若甲未經其他全體股東之同意，將股份轉讓給乙。依經濟部之解釋，該股份轉 讓契約之效力為何？", "options": ["若乙為善意，始為有效", "不論乙是否善意皆為有效", "無效", "有效，但A 公司得聲請法院撤銷"], "ans": 2, "exp": "閉鎖性股份有限公司章程限制股份轉讓，依經濟部解釋，股東違反章程所定轉讓限制（如未經其他股東書面同意）而轉讓股份者，該轉讓行為無效，不論受讓人是否善意，故選項3正確。此係章程限制具對世效力之結果。"}, {"q": "客戶想成立閉鎖性股份有限公司，並提出成立該公司之原因，下列何者錯誤？", "options": ["家族企業股東成員可以以股作價成立閉鎖性股份有限公司", "可於閉鎖性股份有限公司之公司章程規定股份轉讓之限制", "未來可由閉鎖性股份有限公司擔任委託人，陸續將該公司主要資產交付信託", "閉鎖性股份有限公司依公司法規定，公司資產僅能有股權及金錢，不得有不動產"], "ans": 3, "exp": "閉鎖性股份有限公司之資產種類並無限制，得持有不動產、股權及金錢等各類財產，並非僅能持有股權及金錢，故選項4錯誤。以股作價設立、章程限制股份轉讓、未來由公司擔任委託人將資產交付信託，均為正確敘述。"}, {"q": "有關閉鎖性股份有限公司，下列敘述何者正確？", "options": ["可以採募集設立之方式設立", "董監事選舉採強制採行累積投票制", "為增加經營彈性，得以章程訂明特別股東當選董監事之名額", "股東會仍需實體集會，不得以書面方式行使表決權"], "ans": 2, "exp": "閉鎖性股份有限公司為增加經營彈性，得以章程訂明特別股股東當選一定名額之董事、監察人，故選項3正確。閉鎖性公司不得公開募集（採發起設立，選項1錯）；得以章程排除累積投票制，非強制採行（選項2錯）；股東會得以書面或視訊方式行使表決權、不以實體集會為必要（選項4錯）。"}, {"q": "我國公司法對閉鎖性股份有限公司之定義為何？", "options": ["指股東人數不超過35 人，並於章程定有股份轉讓限制之公司", "指股東人數不超過50 人，並於章程定有股份轉讓限制之公司", "指股東人數不超過35 人，並於章程定有股份轉讓限制之非公開發行股票公司", "指股東人數不超過50 人，並於章程定有股份轉讓限制之非公開發行股票公司"], "ans": 3, "exp": "正解為選項4。公司法所定閉鎖性股份有限公司，係指股東人數不超過50人，並於章程定有股份轉讓限制之非公開發行股票公司，故選項4完全正確。選項1、3人數上限誤為35人，選項2雖人數正確但漏列「非公開發行股票公司」要件，均不完整或錯誤。"}, {"q": "有關一般股份有限公司得發行特別股之種類，下列敘述何者錯誤？", "options": ["得發行無表決權之特別股", "得發行有複數表決權之特別股", "得發行對特定事項否決權特別股", "得發行當選一定名額董事、監察人權利之特別股"], "ans": 3, "exp": "正解為選項4（敘述錯誤者）。得發行「當選一定名額董事、監察人權利之特別股」係閉鎖性股份有限公司之特有彈性，一般（非閉鎖性）股份有限公司不得發行此種黃金股，故選項4錯誤。選項1無表決權、選項2複數表決權、選項3對特定事項否決權之特別股，一般股份有限公司均得發行。"}, {"q": "若閉鎖性股份有限公司章程明定採行董事、監察人候選人提名制度，即依現行公司法規定， 至少應持有該公司已發行多少股數之股東，始得提出董事或監察人候選人名單？", "options": ["百分之一", "百分之三", "百分之五", "百分之十"], "ans": 0, "exp": "正解為選項1。依公司法候選人提名制度規定，持有已發行股份總數百分之一以上股份之股東，得以書面向公司提出董事或監察人候選人名單，故門檻為百分之一，選項1正確。其餘比例皆非法定提名門檻。"}, {"q": "A 公司為非公開發行之股份有限公司，共有甲、乙、丙、丁及戊等五位股東，分別持有A 公司20%之股份。若A 公司擬變更組織型態成為閉鎖性股份有限公司，應經下列何種決策 程序始為合法有效？", "options": ["經全體股東同意", "應有代表已發行股份總數過半數股東之出席，以出席股東表決權過半數之同意", "應有代表已發行股份總數過半數股東出席之股東會，以出席股東表決權三分之二之同意", "應有代表已發行股份總數三分之二以上股東出席之股東會，以出席股東表決權過半數之 同意"], "ans": 0, "exp": "正解為選項1。非公開發行股份有限公司變更為閉鎖性股份有限公司，因影響股東股份轉讓自由甚鉅，公司法規定須「經全體股東同意」始得為之，故選項1正確。其餘各種多數決或加重多數決程序，均不符合此項須全體同意之要求。"}, {"q": "為達家族企業永續傳承及經營，在不修法的情形下，信託公會規劃以家族財產設立閉鎖性 股份有限公司，請問其規劃之信託架構為何？", "options": ["採委託人為企業主本人、受益人為全體家族成員，設立他益信託管理家族財產之家族信託", "採委託人為閉鎖性股份有限公司、受益人為全體家族成員，設立他益信託管理家族財產 之家族信託", "採委託人為全體家族成員、受益人為全體家族成員，設立自益信託管理家族財產之家族 信託", "採委託人為閉鎖性股份有限公司、受益人為閉鎖性股份有限公司，設立自益信託管理家 族財產之家族信託"], "ans": 3, "exp": "正解為選項4。信託公會在不修法前提下規劃之家族信託架構，係由閉鎖性股份有限公司為委託人、亦以該公司為受益人，設立「自益信託」管理家族財產，藉以兼顧控制與傳承，故選項4正確。選項1、2、3所載委託人與受益人組合及自他益屬性，均與該規劃架構不符。"}, {"q": "陳董事長想以家族資產設立閉鎖性股份有限公司，規劃小孩甲君及乙君具備閉鎖性股份有 限公司股東之身分，由長子甲君擁有絕大多數所有權，也在考慮委由乙君或丙君（丙君不 具閉鎖性股份有限公司股東之身分與資格）擔任專業經理人，有關陳董事長之規劃下列敘 述何者正確？", "options": ["閉鎖性股份有限公司之經營權與所有權可以分離，因此專業經理人可以由丙君擔任", "公司法規定閉鎖性股份有限公司之經營權與所有權不能分開，因此專業經理人只能由甲 君擔任", "公司法規定閉鎖性股份有限公司之經營權需具閉鎖性股份有限公司股東之身分，因此專 業經理人只能由乙君擔任，無法由丙君擔任", "公司法規定閉鎖性股份有限公司之經營權僅能由不具閉鎖性股份有限公司股東之身分擔 任，因此專業經理人只能由丙君擔任，無法由乙君擔任"], "ans": 0, "exp": "正解為選項1。閉鎖性股份有限公司之經營權與所有權得以分離，公司專業經理人（如總經理）不以具股東身分為必要，故不具股東身分之丙君亦得擔任專業經理人，選項1正確。選項2、3、4均誤認須具股東身分或不得分離經營權與所有權。"}, {"q": "閉鎖性股份有限公司搭配家族信託制度的優勢之一，即是得以公司章程特別約定自治事項， 下列敘述何者錯誤？", "options": ["得排除董事會特別決議之發行新股", "得排除股東會決議之私募轉換公司債", "得排除股東擔任表決權信託之受託人", "得約定公開發行或募集有價證券"], "ans": 3, "exp": "正解為選項4（敘述錯誤者）。閉鎖性股份有限公司之本質即為非公開發行、股份轉讓受限，自不得於章程約定公開發行或對外募集有價證券，故選項4錯誤。選項1得以章程排除董事會特別決議發行新股、選項2得排除股東會決議私募轉換公司債、選項3得排除股東擔任表決權信託受託人之限制，均為其得自治約定之事項。"}, {"q": "針對甲董事長想將持有之上市公司A 公司以股作價成立閉鎖性股份有限公司C 公司之作 法，下列敘述何者正確？", "options": ["必須透過集中交易市場將A 公司股票，轉為C 公司所持有", "將持有之A 公司股票以股作價成立C 公司，證券交易稅為30 萬元", "改由C 公司持有A 公司股票後，在未分配給個人前，除未分配盈餘加徵5%外，該股利 所得免稅", "如C 公司之公司章程限定C 公司股權僅限轉讓給家族股東，則C 公司持有之A 公司股 票亦僅能轉讓給家族股東，不得處分"], "ans": 2, "exp": "正解為選項3。甲將A股票以股作價成立C公司後，由C公司（法人）持有A股票，其取得之股利屬法人股東間之股利所得，在未分配給個人前，除依規定就未分配盈餘加徵5%營所稅外，該股利所得免稅，故選項3正確。選項1以股作價非必經集中市場；選項2證交稅計算與本題情形不符；選項4章程限轉讓對象不等同股票不得處分，均錯誤。 --- ## Related Concepts - [[09-閉鎖性公司與家族投資公司]] - [[04-信託法與信託架構]] - [[11-家族治理與家族辦公室]] - [[MOC]] ｜ [[Quick-Reference]] ｜ [[常見陷阱]]"}, {"q": "近年來許多國人利用個人或國內公司資金佈局投資海外債券，有關其投資海外債券之課稅， 下列敘述何者錯誤？", "options": ["個人買賣海外債券之資本利得暫停課稅", "個人投資海外債券收取之配息適用海外所得課稅", "公司買賣海外債券之資本利得需併入公司所得課營所稅", "公司投資海外債券收取之配息需併入公司所得課營所稅"], "ans": 0, "exp": "正解為選項1。個人買賣海外債券之資本利得屬海外財產交易所得，應計入個人基本所得額（最低稅負）課稅，並非「暫停課稅」，故選項1錯誤。選項2個人海外配息屬海外所得、選項3公司買賣海外債券資本利得與選項4公司海外配息均須併入公司所得課徵營利事業所得稅，敘述正確。 ・"}, {"q": "劉總長女長期定居澳洲，由於澳洲與我國訂有CRS，下列哪種資產可不須交換訊息？", "options": ["不動產", "保單價值", "銀行存款", "信託資產"], "ans": 0, "exp": "正解為選項1（不動產）。CRS（共同申報準則）交換之資訊以金融帳戶為範圍，「不動產」本身非金融帳戶資訊，不須交換，故選項1正確。保單價值（具現金價值保單）、銀行存款、信託資產（透過金融機構持有部分）均屬CRS應申報交換之金融資訊。"}, {"q": "依據財政部113 年1 月發布的核釋以中華民國境外低稅負區關係企業股份或資本額為信託 財產適用受控外國企業制度規定，下列敘述何者正確？", "options": ["委託人以中華民國境外低稅負國家或地區之關係企業股份或資本額為信託財產，不計為 委託人之直接持股比率", "若孳息受益人已確定且特定者，計算孳息受益比例以委託人成立信託之信託股權比率及 該孳息受益人之受益比例相乘積計算信託股權直接持股比率，但不加計該孳息受益人信 託以外之直接持股比率", "每年度境外信託所得申報由該信託具有台灣稅務居民身分的委託人或孳息受益人辦理", "孳息受益人如未確定者，以委託人為孳息受益人，依CFC 稅法規定課徵所得稅"], "ans": 3, "exp": "正解為選項4。依財政部113年1月核釋，以境外低稅負區關係企業股份為信託財產適用CFC制度，孳息受益人未確定者，以委託人為孳息受益人，依CFC規定課徵所得稅，故選項4正確。選項1應計入委託人直接持股比率、選項2孳息受益人已確定者尚應加計其信託以外之直接持股比率、選項3申報義務之主體認定，均與該核釋不符。"}, {"q": "有關受控外國公司(CFC)課稅規定，下列敘述何者錯誤？", "options": ["CFC 當年度若無所得，即無須向國稅局申報", "CFC 引進「視同分配」概念，使境外公司遞延課稅效果不再", "營利事業就CFC 當年度盈餘，應按其持有CFC 股份比率及持有期間認列投資收益，計 入當年度所得", "個人就CFC 當年度盈餘，應按持有CFC 股份比率計算營利所得，與海外所得合計，計 入當年度個人基本所得額"], "ans": 0, "exp": "正解為選項1。CFC（受控外國公司）制度的核心即在打破境外低稅地公司「不分配盈餘即不課稅」的遞延效果，故引進「視同分配」概念（選項2對），國內營利事業或個人股東須按持股比率及持有期間認列投資收益或營利所得（選項3、4對）。選項1說「CFC當年度若無所得即無須申報」反映舊觀念，實際上CFC制度下仍須依規定辦理相關申報與揭露，故敘述錯誤。"}, {"q": "有關營利事業申報CFC 時應檢附的文件，下列敘述何者錯誤？", "options": ["營利事業及其關係人的結構圖", "經會計師簽證的受控外國企業財務報表", "受控外國企業營利所得計算表", "營利事業及其關係人持股變動明細表"], "ans": 3, "exp": "本題為反向題。營利事業申報CFC（受控外國企業）應檢附之文件，包括關係人結構圖、經會計師簽證之CFC財務報表、CFC營利所得計算表等；選項4「持股變動明細表」非屬CFC申報所列應檢附文件，故為錯誤。"}, {"q": "兩岸人民關係條例對於大陸地區人民繼承臺灣地區之遺產有何限制？", "options": ["無限制", "每人不得逾新臺幣200 萬元", "每人不得逾新臺幣300 萬元", "每人不得逾新臺幣400 萬元"], "ans": 1, "exp": "依臺灣地區與大陸地區人民關係條例，大陸地區人民繼承臺灣地區人民之遺產，每人所得財產總額不得逾新臺幣200萬元，超過部分歸屬其他繼承人，故選項2正確。"}, {"q": "有關我國近期實施之個人受控外國公司（Controlled Foreign Company，以下簡稱CFC）稅 制，下列何者敘述正確？", "options": ["避免藉於低稅負地區成立CFC 保留原應歸屬我國之營利所得，以規避我國納稅義務，故 新加坡、香港等所得稅率高於14%，無須適用", "雖然該制度係反避稅制度，但也只適用於境內居住者，非境內居住者，無須適用", "財政部基於稽徵考量，目前規定任一CFC 當年度盈餘在700 萬元以下，亦皆須適用", "CFC 有固定營業場所，並僱用員工於當地實際經營業務，即得以無須適用"], "ans": 1, "exp": "個人CFC稅制屬反避稅制度，僅適用於「我國境內居住者（個人）」，非境內居住者不適用，故選項2敘述正確。低稅負地區之認定不以新加坡、香港稅率高於14%即一律排除（選項1錯）；當年度個別CFC及全部CFC合計盈餘在700萬元以下者得豁免（非皆須適用，選項3錯）；有實質營運（固定營業場所、僱用員工於當地實際經營）係豁免要件之一，選項4「即得無須適用」忽略仍須符合其他要件，敘述不周全。"}, {"q": "下列何者為個人符合我國受控外國企業(CFC)居住者（稅務居民）之定義？ A.在臺灣無戶 籍，但居住180 天者 B.在臺灣有設戶籍，但所得發生年度僅在臺灣居住一星期，其相關 指標符合生活及經濟重心在臺灣之原則者", "options": ["僅A", "僅B", "A、B 皆是", "A、B 皆非"], "ans": 1, "exp": "正解為選項2（僅B）。CFC稅務居民（個人）以「在我國境內有戶籍且生活及經濟重心在我國」或「無戶籍但一課稅年度居留滿183天」為認定原則。B有戶籍且各項指標顯示生活經濟重心在我國，符合居住者定義；A無戶籍且僅居住180天（未達183天），不符合，故僅B正確。"}, {"q": "家族如擬自行設立家族辦公室，於設計階段制定之經營計畫應至少包含下列哪些內容？ A.選定最適合的管轄區域 B.家族辦公室提供之服務內容 C.對員工之資格要求 D.家族 成員制裁機制", "options": ["僅ABD", "僅ABC", "僅BCD", "ABCD"], "ans": 1, "exp": "正解為選項2（僅ABC）。家族辦公室設計階段之經營計畫至少應包含：選定最適管轄區域（A）、提供之服務內容（B）、對員工之資格要求（C）；「家族成員制裁機制」（D）屬家族治理層面，非經營計畫必含內容，故選ABC。"}, {"q": "下列哪個家族特別設立「超級媽媽小組」之家族治理單位，作為各家媽媽們的溝通平台？", "options": ["香港李錦記家族", "香港陳守仁家族", "美國皮特卡恩家族", "美國洛克菲勒家族"], "ans": 0, "exp": "正解為選項1（香港李錦記家族）。李錦記家族於其家族治理中設立俗稱「超級媽媽小組」之溝通平台，作為各房媽媽們的交流機制，是著名的家族治理案例。陳守仁、皮特卡恩、洛克菲勒家族均非此一單位之設立者。"}, {"q": "有關家族治理的觀念或方式，下列敘述何者錯誤？", "options": ["家族辦公室主要功能在於協助家族凝聚家族財富", "家族治理可能涵蓋的面向包括家族凝聚力、家族監督機制等", "雖有家族憲章，但家族治理模式，仍多以家族成員默契的非正式治理為主", "家族憲章的制定主要是將家族治理架構明確化，若有所違反，具有絕對的法律效果"], "ans": 3, "exp": "正解為選項4。家族憲章主要在使家族治理架構明確化，性質上多屬家族成員間之內部約定或道德性規範，並不當然具有「絕對的法律效果」，違反未必能直接以法律強制執行，故選項4錯誤。選項1家族辦公室協助凝聚財富、選項2治理涵蓋凝聚力與監督機制、選項3實務上仍多以成員默契之非正式治理為主，均屬正確。"}, {"q": "張老闆委託顧問協助制定家族憲章，顧問先就制定的流程中的現況查核及初步研判做了以 下說明，而下列何者錯誤？", "options": ["對於借名登記之財產，亦應一併考量", "需對家族成員進行調查，調查的內容包括成員之國籍", "需對家族資產進行查核，包括金融資產、不動產等", "考量管理需要，未來家族辦公室因設立於台灣，故對境外資產不用納入調查範圍"], "ans": 3, "exp": "正解為選項4。制定家族憲章之現況查核應全面掌握家族資產全貌，境外資產攸關傳承與稅務規劃，縱家族辦公室設於台灣仍應納入調查範圍，故選項4「境外資產不用納入」錯誤。選項1借名登記財產應一併考量、選項2成員調查含國籍、選項3資產查核含金融資產與不動產，均屬正確。"}, {"q": "根據家族資產規模及家族辦公室內部提供服務內容及外包程度所為之分類，下列何種類型 之家族辦公室，全部服務均由全職員工負責？", "options": ["精簡型家族辦公室", "行政型家族辦公室", "混合型家族辦公室", "全能型家族辦公室"], "ans": 3, "exp": "正解為選項4（全能型家族辦公室）。依家族資產規模與服務內外包程度分類，全能型家族辦公室之全部服務均由全職員工負責，自給自足程度最高，故選之。精簡型、行政型、混合型則部分或多數服務委外，並非全由全職員工負責。"}, {"q": "家族辦公室的功能不包括下列何者？", "options": ["制定家族之社交媒體策略", "直接提供家族成員銀行貸款", "提供家族成員遺產及財富傳承規劃諮詢", "提供兼顧投資及非投資收益來源與相關稅務問題之諮詢 請根據下列案例，回答第37~40 題： 劉總經理今年67 歲，去年從一科技上櫃公司總經理職位退休，仍擔任該公司董事，有 配偶、長子（在公司歷練）、長女（已出嫁澳洲）及么女（在美國修讀碩士）。劉總經理年輕 時協助公司董事長（創辦人）創業，因而持有不少該公司股票，股數可當選一席董事，市價約為新臺幣六億元，殖利率約5%。另有藝術品收藏約新臺幣三億元，以及銀行流動資金及 金融商品投資約二億元。三位子女年幼時已透過每年現金贈與之累積，分別以子女名義幫 助他們購置房屋各一戶，夫妻仍共有一戶現在居住房屋。請就本案例情形規劃及回答下列 問題："], "ans": 1, "exp": "正解為選項2。家族辦公室提供整合性諮詢與規劃服務，但「直接提供家族成員銀行貸款」屬銀行之授信業務，非家族辦公室之功能，故選項2不包括在內。選項1制定社交媒體策略、選項3遺產及財富傳承規劃諮詢、選項4投資與非投資收益及稅務諮詢，均屬家族辦公室之功能。"}, {"q": "規劃家族藝術品管理時，根據文化藝術事業辦理展覽或拍賣申請核准個人文物或藝術品交 易所得採分離課稅辦法，如有個別文物或藝術品交易金額達新臺幣多少金額時，主辦單位 應留存資料，包括買賣雙方（或代理人）身分證明及聯絡方式，還有藝術品交易日期、品 項、金額紀錄及稅務申報資料等，並留存該筆交易買受人所有交易款項之相關支付憑證， 以避免藝術品拍賣成為洗錢漏洞？", "options": ["達新臺幣三十萬元（含等值外幣）", "達新臺幣五十萬元（含等值外幣）", "達新臺幣一百萬元（含等值外幣）", "達新臺幣一百五十萬元（含等值外幣）"], "ans": 1, "exp": "正解為選項2。依文化藝術事業辦理展覽或拍賣個人文物或藝術品交易所得分離課稅辦法之防制洗錢規範，個別文物或藝術品交易金額達新臺幣五十萬元（含等值外幣）時，主辦單位應留存買賣雙方身分、交易紀錄及支付憑證等資料，故選五十萬元。三十萬、一百萬、一百五十萬均非該門檻。"}, {"q": "有關家族憲章規範之治理機構，下列敘述何者正確？", "options": ["功能性委員會成員均需從家族成員中選任", "家族理事會並非家族憲章中最高治理機構", "家族大會主要目的之一在於培養家族成員間之感情", "家族企業董事會是根據家族憲章之規定而另成立之組織 請根據下列案例，回答第57~60 題： 王董事長事業有成，名下有現金、不動產及有價證券，有兒女甲君及乙君，其中甲君已 婚（配偶為丙君），且育有2 名子女大甲及小甲。乙君與配偶丁君離婚，育有2 名子女大乙 及小乙。王董事長想到甲君及乙君皆已分別在家族企業上班，且握有許多家族企業之股票，因此想將資產移轉給四名孫子女（大甲、小甲、大乙及小乙），4 名孫子女皆已成年且為完 全行為能力人，但又擔心資產太早分配給孫子女，會導致其不努力工作，也擔心如果有一天 大乙或小乙太早離世，會導致其部分資產會由丁君繼承。請依據上述狀況，回答下列問題："], "ans": 2, "exp": "正解為選項3。家族大會（家族成員大會）之主要目的之一在於凝聚情感、培養家族成員間之感情與認同，故選項3正確。選項1功能性委員會成員不以家族成員為限（可納入外部專業人士）、選項2家族理事會常為家族憲章之最高治理機構、選項4家族企業董事會係依公司法而非依家族憲章另行成立，均屬錯誤。"}, {"q": "下列何者可謂治理家族及傳承家業之根本大法？", "options": ["家族家規", "家族祖訓", "家族憲章", "家族族譜"], "ans": 2, "exp": "正解為選項3。家族憲章（Family Charter／Constitution）係家族就治理、傳承、價值理念及紛爭解決等所訂之最高指導文件，被喻為治理家族與傳承家業之「根本大法」，地位高於家規、祖訓或族譜等個別性或紀錄性文件。"}, {"q": "下列何者是美國家族辦公室最為重要之內部委員會？", "options": ["投資委員會", "諮詢委員會", "職涯發展委員會", "教育訓練委員會"], "ans": 0, "exp": "正解為選項1。美國家族辦公室之核心功能在於管理與增值家族財富，故「投資委員會」為其最重要之內部委員會，負責資產配置與投資決策。諮詢、職涯發展、教育訓練委員會雖屬常見配置，但非最核心者。"}, {"q": "於制定家族憲章前，須進行家族現況查核，有關家族資產之查核範圍，包括下列哪些項目？ A.信託財產 B.家族經營事業C.境外公司股權 D.借名登記財產", "options": ["僅BCD", "僅ABD", "僅ABC", "ABCD"], "ans": 3, "exp": "正解為選項4，ABCD全部。制定家族憲章前之家族資產現況查核應求完整，涵蓋信託財產、家族經營事業、境外公司股權及借名登記財產等，方能真實掌握家族資產全貌，故四項均屬查核範圍。"}, {"q": "家族企業的治理機構中，下列何者最能納入所有層面的家族成員參與？", "options": ["家族大會", "家族理事會", "家族企業董事會", "家族成員職業發展委員會"], "ans": 0, "exp": "正解為選項1。家族大會（Family Assembly）係全體家族成員（不分世代、不分是否參與企業經營）均可參與的最廣泛平台，最能納入所有層面之家族成員。家族理事會、企業董事會、職涯發展委員會均屬範圍較窄之機構。"}, {"q": "家族憲章多會針對下列哪些事項加以明訂與規範？ A.治理機構 B.家族成員退場機制 C.家族企業股權結構設計 D.家族成員紛爭解決機制", "options": ["僅ABC", "僅BCD", "僅ABD", "ABCD"], "ans": 3, "exp": "正解為選項4，ABCD全部。家族憲章通常會就治理機構、家族成員退場機制、家族企業股權結構設計及家族成員紛爭解決機制等事項加以明訂規範，以建立家族治理與傳承之完整制度，故四項均屬之。"}, {"q": "有關各種類型之家族辦公室敘述，下列何者錯誤？", "options": ["亞洲家族辦公室常見內置式家族辦公室架構", "近年許多聯合家族辦公室是由單一家族辦公室演變而來的", "由於單一家族辦公室僅服務單一家族，故相對成本也較低", "家族控股、專業經理管理之單一家族辦公室多為非營利性質 請根據下列案例，回答第37~40 題： 吳董事長最近常看到家族傳承是企業主的一大課題，因此開始與專業人士討論資產傳 承與稅務等議題，吳董事長持有2 間上市公司之股票，且皆為內部人。其中公司A 每年都 有穩定獲利，也持續配發優渥之股利；公司B 長期處於小幅虧損，但吳董事長仍希望將2間公司之股票傳承給女兒甲，並規劃成立閉鎖性股份有限公司。此外，吳董事長為了照顧員 工，並想落實與員工共享企業經營成果，因此思考辦理公司A 之員工持股信託。請回答下 列問題："], "ans": 2, "exp": "正解為選項3，此為反向題。單一家族辦公室（SFO）僅服務單一家族，須獨自負擔全部人事與營運成本，相對成本「較高」而非較低，故選項3錯誤。亞洲常見內置式架構（選項1對）、聯合家族辦公室常由單一家族辦公室演變而來（選項2對）、家族控股專業經理管理之SFO多為非營利性質（選項4對）。"}, {"q": "新加坡和香港的家族辦公室在制度設計有許多相同處，而下列敘述何者錯誤？", "options": ["兩地整體稅制原則皆採屬地主義", "企業所得稅在符合情況下資本收益免稅", "對於SFO 的持牌要求，一般不需要申領金融服務牌照", "新加坡13O 需雇用至少3 位專業人士，其中至少一位不是受益人家庭成員 請根據下列案例，回答第57~60 題： 張董事長七十五歲，為某上市公司董事長，持股市價約新臺幣60 億元，掌控公司經營 權。有配偶及二個兒子及一個女兒，均已成年，除女兒有美國雙重國籍外，其他家族成員均 為台灣稅務居民。張董夫婦數年來透過股票贈與給二個兒子部分股權，女兒則贈予現金來 購置不動產。他擔心百年後子孫爭產，或是出售股份，遂將經營權落入他手。因此，他希望 建立家族憲章，成立家族辦公室、家族信託及閉鎖性（股）公司。請就本案例情形回答下列 問題："], "ans": 3, "exp": "正解為選項4，此為反向題。新加坡13O（基金免稅方案）規定須雇用至少「2位」投資專業人士（13U方案才要求至少3位），故選項4說「13O需雇用至少3位專業人士」錯誤。新加坡與香港整體稅制原則皆採屬地主義（選項1對）、符合情況下資本收益免稅（選項2對）、對SFO一般不需申領金融服務牌照（選項3對）。"}, {"q": "張董想效法德國默克家族建立一個百年傳承的子孫遵循機制，而他最開始應從下列何者先 行著手？", "options": ["家族信託", "家族憲章", "閉鎖性（股）公司", "家族辦公室"], "ans": 1, "exp": "正解為選項2。效法德國默克家族建立百年傳承之子孫遵循機制，應「最先」建立家族憲章，以確立家族共同價值、治理原則與傳承規範作為根本大法，再據以成立家族信託、閉鎖性公司及家族辦公室等具體執行載體，故應先著手家族憲章。"}, {"q": "有關高資產客戶子女教育及能力養成安排，下列敘述何者錯誤？", "options": ["至家族事業基層實習", "赴海外名校教育", "向銀行融資嘗試企業轉型", "安排至金融機構實習培訓"], "ans": 2, "exp": "本題為反向題，問子女教育及能力養成安排何者錯誤。至基層實習、赴海外名校受教、至金融機構實習培訓均為正當的接班人培養方式；「向銀行融資嘗試企業轉型」屬高風險財務操作，並非子女教育與能力養成之適當安排，故選項3錯誤。"}, {"q": "有關家族辦公室經營計畫，主要是在設計家族辦公室之階段所制定，此階段的最終目的為 何？", "options": ["創造一份關於建立家族辦公室的實踐計畫", "確認家族辦公室將作為利潤中心或成本中心而存在", "建立全面的風險管理措施以確保企業及私人需求得以兼顧", "節省家族辦公室之功能服務外包予其他機構或單位所生的成本"], "ans": 0, "exp": "家族辦公室「經營計畫」（設計階段）的最終目的，在於產出一份關於建立家族辦公室的實踐（執行）計畫，作為後續建置與運作的藍圖，故選項1正確。確認利潤/成本中心、風險管理措施、外包成本節省均屬計畫內涵之一部分，而非該階段的最終目的。"}, {"q": "創投(VC)的投資項目風險較高且投資期限較長，但許多家族辦公室對此一類別的投資興趣 仍相當濃厚之原因，下列敘述何者錯誤？", "options": ["很多家族的財富是來自於VC 的投資", "此類投資商品流動性高且具透明度，交易成本也較低", "家族的投資資金也屬於長期性質，符合創投的投資期限", "喜歡投資於與自身家族企業相關的VC，以尋求上下游產業間的整合"], "ans": 1, "exp": "本題為反向題。創投（VC）投資的特性正是流動性低、透明度低、投資期限長且交易成本未必低，選項2稱「流動性高且具透明度、交易成本較低」與創投特性相反，故錯誤。許多家族財富來自VC、家族資金屬長期性質契合創投期限、偏好投資與自身產業相關VC以求整合，均為正確說明。"}, {"q": "下列家族何者於企業內部設立一個「部門」，同時治理企業與家族，其前身為秘書室，後來 改為結構調整本部，接著又更名為戰略企劃室？", "options": ["新加坡李氏家族", "香港李錦記家族", "韓國三星集團家族", "美國皮特卡恩家族"], "ans": 2, "exp": "於企業內部設立統籌治理企業與家族之「部門」，其前身為秘書室、後改為結構調整本部、再更名為戰略企劃室者，係韓國三星集團家族，故選項3正確。新加坡李氏、香港李錦記、美國皮特卡恩家族均無此沿革。"}, {"q": "欲載明家族企業接班人的資格及遴選條件，以確保家族企業之永續經營，下列文件，何者 較為合適？", "options": ["家族憲章", "家族信託契約", "家族企業公司章程", "閉鎖性股份有限公司章程"], "ans": 0, "exp": "欲載明家族企業接班人的資格及遴選條件以確保永續經營，最合適者為「家族憲章」，其為家族共同價值與治理規範之總綱，得納入接班人遴選機制，故選項1正確。信託契約、公司章程、閉鎖性公司章程偏重財產管理或法人組織運作，非載明接班人資格條件之最適文件。"}, {"q": "家族憲章要能反映設立家庭之具體性質、目標和價值觀，係屬下列何項高效率的家族憲章 7P 原則？", "options": ["積極的(Positive)", "個性化的(Personal)", "專業的(Professional)", "理念性的(Philosophical)"], "ans": 1, "exp": "家族憲章7P原則中，能反映設立家庭之「具體性質、目標和價值觀」者，係「個性化的（Personal）」原則，強調憲章應量身反映該家族特性，故選項2正確。積極的、專業的、理念性的分別對應其他面向，非本題所指。"}, {"q": "在家族憲章的協議基礎上，可產生具有法律效力之文件： A.信託契約 B.股權轉讓協議 C.遺囑 D.婚前協議；請問下列選項組合，何者較為完整正確？", "options": ["僅ABC", "僅ACD", "僅ABD", "ABCD 請根據下列案例，回答第37~40 題： 王董事長為台灣知名製造業創辦人，近年公司規模擴張，上市市值超過十億元。王董事 長與妻育有2 子1 女，長子已接班進入企業擔任副總經理，次子留學歐美，尚未返台；女 兒則嫁入另一企業家族。王董事長考量家族傳承，近期與私人銀行顧問討論資產配置及傳 承方式，包括設立家族信託、跨世代股權安排及保險傳承等方案。 在信託規劃上，已與銀行簽訂「有價證券信託契約」，贈與部分上市公司股票，受益人 為2 子1 女，並指定律師甲為信託監察人。請依據上述狀況，回答下列問題：（各小題皆互 不關聯）"], "ans": 3, "exp": "在家族憲章協議基礎上可產生具法律效力之文件，包括信託契約（A）、股權轉讓協議（B）、遺囑（C）與婚前協議（D），四者皆可據以產生法律效力，故選項4（ABCD）最完整正確。"}, {"q": "家族辦公室在家族資產管理的投資規劃中，採用營運企業專注模式時，主要使用工具為何？ A.創業投資 B.私募股權投資C.天使投資 D.不動產", "options": ["僅A", "僅AB", "僅ABC", "ABCD 請根據下列案例，回答第57~60 題： 陳董事長感覺自己年事已高，有天打完球後跟朋友聊天，才發覺許多球友都已經在規 劃資產移轉的議題，還有持續培養接班人。陳董事長配偶已離世，另有2 名小孩甲君及乙 君，皆未婚且每年皆各自申報所得稅（非同一申報戶）。其中，甲君興趣為藝術，自己在外 面公司上班；乙君則長期在陳董事長經營的公司歷練，現在為該公司之小主管。陳董事長之 前聽說有價證券信託可以協助規劃家族傳承，以及有些保單可作為預留遺產稅源之安排， 因此著手安排資產移轉（假定下列選項之保單皆於所得基本稅額條例施行後所購買，當年 度及後續年度死亡給付在新臺幣3,740萬元以下部分，免予計入受益人個人基本所得稅額）， 請依據上述狀況，回答下列問題：（各小題皆互不關聯）"], "ans": 2, "exp": "家族辦公室採「營運企業專注模式」之投資規劃，主要使用工具為創業投資（A）、私募股權投資（B）與天使投資（C），均係投入企業經營性質之投資；不動產（D）屬一般資產配置而非營運企業專注模式之主要工具，故選項3（僅ABC）正確。"}, {"q": "下列何種類型的家族辦公室會聘用全職員工提供關鍵的法律、稅務、資產配置等服務，但 在某些提供重要的職位上，可能會選擇由具有相關經驗的家族成員擔任？", "options": ["全能型家族辦公室", "行政型家族辦公室", "精簡型家族辦公室", "混合型家族辦公室"], "ans": 3, "exp": "聘用全職專業人員提供法律、稅務、資產配置等關鍵服務，同時部分重要職位由具相關經驗之家族成員擔任，係「混合型家族辦公室」之特徵（兼採專業外部人才與家族成員），故選項4正確。全能型多以外部專業團隊為主、行政型功能精簡、精簡型規模最小，均不符本題兼用家族成員之描述。"}, {"q": "制定家族相關政策，例如家族企業雇用政策、所有權移轉等事宜，係下列何種治理機構之 重要工作內容之一？", "options": ["家族大會", "家族理事會", "家族企業董事會", "家族憲章委員會"], "ans": 1, "exp": "制定家族企業雇用政策、所有權移轉等家族政策，屬「家族理事會（家族委員會）」之核心職責，故選項2正確。家族大會多為全體成員溝通與凝聚共識之平台、家族企業董事會專責企業經營決策、家族憲章委員會專責訂修家族憲章，均非制定上開家族政策之主責機構。"}, {"q": "有關家族憲章設立家族憲章委員會的目的及內容，下列何者錯誤？", "options": ["訂立及修改家族憲章", "防止第一代專斷獨行", "培養家族成員之間的感情", "可由不同世代每一家庭派出家族成員為代表"], "ans": 2, "exp": "本題問何者錯誤。家族憲章委員會之目的在於訂修家族憲章、由不同世代各家庭推派代表參與，並具防止第一代專斷之制衡功能；其中「培養家族成員之間的感情」並非家族憲章委員會之設立目的，故選項3錯誤。選項1、4為其正確職能與組成，選項2為其制衡作用。"}, {"q": "通常而言，家族辦公室的運營類型，下列何者正確？", "options": ["利潤中心", "成本中心", "利潤中心兼成本中心", "既非利潤中心，也非成本中心"], "ans": 1, "exp": "家族辦公室通常不以對外營利為目的，而是為家族提供集中服務、控管成本，故其運營定位一般為「成本中心」，故選項2正確。它並非對外創造利潤的利潤中心，故選項1、3、4均不符家族辦公室常見的運營性質。"}, {"q": "有關家族企業董事會，下列敘述何者錯誤？", "options": ["家族憲章通常將家族企業董事會列入治理機構下", "家族企業董事會係家族企業擁有最高決策權之機構", "家族企業董事會係因家族憲章之規定而另外成立之組織", "家族企業董事會之人數、組成及運作方式，主要以公司章程為準"], "ans": 2, "exp": "本題問何者錯誤。家族企業董事會係依公司法本即存在之公司治理機構，並非因家族憲章規定而「另外」成立之組織，故選項3錯誤。家族憲章通常將家族企業董事會納入治理架構（選項1）、其為家族企業最高經營決策機構（選項2）、其人數組成與運作主要依公司章程（選項4），均屬正確。"}, {"q": "有關由一個單一家族出資設立並且只服務於這一個家族的單一家族辦公室，下列敘述何者 錯誤？", "options": ["設立單一家族辦公室的重要考量之一是隱私", "只服務於這一個家族，對一個家族而言，其成本負擔最低", "設立屬於自己家族的單一家族辦公室，誘因之一是控制權", "依歐美地區門檻標準，此類家族一般可投資資產規模在一億美元以上 請根據下列案例，回答第37~40 題： 張董事長年事已高，因年輕時喜歡購買股票與不動產，導致手上幾乎無現金。張董事長 擔心太早將資產移轉給小孩，會導致公司控制權掌握在小孩手中，因此要求小孩自食其力。 如果想要移轉資產，也希望透過信託架構或閉鎖性股份有限公司（以下簡稱閉鎖性公司）之 規劃進行移轉。因此開始考慮將所持有之股票以股作價成立閉鎖性公司，並想搭配家族信 託進行股權管理，但是對於信託觀念仍舊一知半解，他目前持有未上市櫃股票A 公司、上 櫃公司B 公司與上市公司C 公司及1 處不動產甲處，其中甲處不動產為住家使用，張董事 長之前從未幫自己或他人出租不動產。張董事長想將所資產進行盤點後，成立閉鎖性公司 D 公司，搭配家族信託，並思考哪些資產要做為閉鎖性公司之財產，以及相關之稅務規劃。 請根據上述狀況，回答下列問題：（各小題皆互不關聯）"], "ans": 1, "exp": "本題問何者錯誤。單一家族辦公室僅服務一個家族，須由該家族獨自負擔全部設立與營運成本，成本負擔相對「最高」而非最低，故選項2錯誤。隱私與控制權為設立單一家族辦公室之重要誘因（選項1、3），歐美一般以可投資資產約一億美元以上為門檻（選項4），均屬正確。"}, {"q": "貝西默信託，剛開始屬於單一家族辦公室，後來轉型為聯合家族辦公室。到目前為止，是美 國最大的聯合家族辦公室。有關貝西默信託的成功之道，下列敘述何者正確？", "options": ["只專注服務於非常富有的家族", "以聯合家族辦公室的標準來服務客戶", "只聘用家族成員為董事，以凝聚家族向心力", "創辦人卡內基制定了家族使命宣言(Mission statement) 請根據下列案例，回答第57~60 題： 林董事長長年從事不動產產業，隨著近年來國內不動產市場持續上漲，目前名下已擁 有10 間國內不動產。林董事長與妻子育有一子一女，長子已婚，任職於知名上市電子公司， 育有一子；女兒則嫁給醫師，夫妻為頂客族（未計畫生育）。 近年來，因應政府打房政策相繼上路，包括房地合一稅制2.0、平均地權條例修法以及 囤房稅等措施，林董事長開始積極思考不動產的資產傳承與保全問題。 其中，他關注以下幾個重點： 1.如何有效進行名下不動產的傳承規劃，在合法合規的前提下，兼顧稅負效率與家族利益分配。 2.資產移轉後的保全機制，避免未來因婚姻因素導致資產流失或產權爭議。 3.針對女兒部分的規劃：由於女兒未育且為頂客族，林董事長擔憂未來不動產可能因 繼承而進入女婿家族體系，故需審慎規劃其名下財產配置方式。 4.是否以公司方式持有不動產，藉由法人架構達到稅務規劃、資產隔離與傳承便利的 效果。 請根據上述狀況，回答下列問題：（各小題皆互不關聯）"], "ans": 0, "exp": "本題問何者正確。貝西默信託成功之道在於專注服務非常富有的家族（高淨值客群定位），故選項1正確。其並非以聯合家族辦公室之一般標準服務、亦非只聘家族成員為董事；貝西默係源自Phipps家族而非卡內基，故選項2、3、4均有誤。"}, {"q": "香港李錦記家族設立哪一種家族治理單位作為各家媽媽們的溝通平台？", "options": ["家族理事會", "幸福媽媽小組", "超級家族交流會", "超級媽媽小組"], "ans": 3, "exp": "香港李錦記家族設立「超級媽媽小組」作為各房媽媽們的溝通平台，屬其家族治理機制之一，故選項4正確。"}, {"q": "下列哪個家族成立的家族辦公室是屬於內置式的家族辦公室？", "options": ["洛克斐勒家族辦公室", "三星集團的家族辦公室", "比爾蓋茲的家族辦公室", "梅隆家族辦公室"], "ans": 1, "exp": "內置式（嵌入式、in-house embedded）家族辦公室通常設於家族集團內部。三星集團的家族辦公室屬內置（嵌入企業內部）型態，故選項2正確。洛克斐勒、梅隆、比爾蓋茲（Cascade）等多為獨立設立之專責家族辦公室。"}, {"q": "臺灣在高雄設置「亞洲資產管理中心」特區，客戶使用試辦業務，須具備之高資產身分為個 人扣除不動產淨值後身家達多少規模門檻？", "options": ["新臺幣五千萬元", "新臺幣一億元", "新臺幣三億元", "新臺幣十億元"], "ans": 1, "exp": "高雄「亞洲資產管理中心」特區試辦業務之高資產身分門檻，為個人扣除不動產淨值後之身家達新臺幣一億元，故選項2正確。此與財管2.0高資產客戶之法定門檻（NT$1億）一致。"}, {"q": "有關新加坡家族辦公室的敘述，下列何者錯誤？", "options": ["申請人可能取得新加坡公民身分", "申請人可能取得新加坡工作簽證", "申請人申請新加坡居民後，自動成為非臺灣稅務居民", "符合條件者，申請人21 歲以下子女可以一同以家庭名義提交永久居民申請"], "ans": 2, "exp": "申請新加坡家族辦公室並取得新加坡居民身分，並不會「自動」喪失臺灣稅務居民身分；臺灣稅務居民身分之認定依其在臺居住天數、戶籍及經濟重心等綜合判斷，故選項3錯誤。可能取得公民身分或工作簽證、21歲以下子女可隨同申請永久居民，均為可能之情形。"}, {"q": "有關家族憲章，下列敘述何者正確？", "options": ["由於家族憲章本身不具備法律拘束力，所以家族也不可以在家族憲章中設計制裁機制", "家族憲章正式制定後，家族得依規劃成立相關的家族治理機構", "家族憲章即為家族企業之股東協議", "家族憲章之制定過程為了維持中立，家族成員應避免參與，最好是委由外部的專業人士 來訂立"], "ans": 1, "exp": "家族憲章正式制定後，家族得依其規劃成立家族議會、理事會等家族治理機構，故選項2正確。家族憲章雖原則上無強制法律拘束力，仍可設計內部制裁機制（選項1錯）；家族憲章與股東協議性質不同（選項3錯）；其制定應由家族成員共同參與凝聚共識，而非全交外部專家（選項4錯）。"}, {"q": "根據新加坡家族辦公室規範，依13O 稅務方案申請單一家族辦公室(SFO)時，對專業投資人 員的最低僱用要求為？", "options": ["至少一名，且可全為家族成員", "至少兩名，且可全為家族成員", "至少兩名，其中至少一位不是受益人的家族成員", "至少三名，其中至少一位不是受益人的家族成員 請根據下列案例，回答第57~60 題： 周爸爸今年55 歲，為一間中小企業董事，有配偶及一名未成年兒子，還有年邁父母仍 健在，周爸爸近期不幸發現自己罹癌且不久於人世，他目前除了持有市值約一億的公司股 票及八千萬存款外，還有一份10 年前以要保人及被保險人身分投保的死亡保險，指定受益 人為兒子，如今周爸爸為了確保身後遺產能妥善安排，故計畫將其持有之公司股票及存款 透過遺囑信託規劃身後之分配；此外，周爸爸前幾年因參與建商合建，與銀行於去年簽訂了 一份「不動產信託契約」，將土地交付信託，受益人為周爸爸本身，合建完成後受益人可獲 配二間新成屋。請回答下列問題："], "ans": 2, "exp": "依新加坡13O稅務方案申請單一家族辦公室（SFO），對投資專業人員之最低僱用要求為至少兩名投資專業人員，且其中至少一位不得為受益人之家族成員，故選項3正確。"}, {"q": "全球第一間家族辦公室是哪個家族創立的？", "options": ["洛克斐勒家族", "皮特卡恩家族", "梅隆家族", "穆里耶茲家族"], "ans": 2, "exp": "正解為選項3。一般認為全球第一間（現代意義之）家族辦公室係由美國梅隆（Mellon）家族所創立，故選項3正確。洛克斐勒、皮特卡恩、穆里耶茲家族雖均為知名家族辦公室之代表，但非最早創立者。"}, {"q": "家族辦公室的投資標的不以傳統類別為限，許多家族也會投資在「另類投資」的類別，下列 何者非屬「另類投資」？", "options": ["債券", "避險基金", "私募股權基金", "CTA 基金"], "ans": 0, "exp": "正解為選項1（非屬另類投資者）。另類投資指股票、債券等傳統資產類別以外之投資，避險基金、私募股權基金、CTA（管理期貨）基金均屬之；「債券」屬傳統投資類別，故選項1非另類投資。"}, {"q": "下列敘述何者正確？", "options": ["家族憲章可以規定家族有超過一個委員會", "家族憲章是創辦人的意志貫徹，依我國公司法規定，創辦人死後即不能修改", "可以約定違反家族憲章有刑事責任", "家族董事會不能有外部第三人"], "ans": 0, "exp": "正解為選項1。家族憲章係家族自治規範，得自由約定家族治理組織，包括設置一個以上之委員會，故選項1正確。選項2家族憲章非公司法規範對象、創辦人死後仍可由家族依約修改；選項3違反家族憲章僅生民事或內部效果，不生刑事責任；選項4家族董事會得納入外部專業人士，三者皆錯。"}, {"q": "下列何者不是亞洲資產管理中心可以試辦的業務？", "options": ["保險融資", "跨境金融服務", "Lombard Lending（倫巴底貸款）", "推介未經核准的境外保單"], "ans": 3, "exp": "正解為選項4（不可試辦者）。亞洲資產管理中心得試辦保險融資、跨境金融服務、Lombard Lending等業務，惟「推介未經核准之境外保單」屬違反保險業務管理規定之行為，不可能列為試辦業務，故選項4正確。"}, {"q": "家族憲章可規範各種與家族事務相關的治理機構，下列敘述何者錯誤？", "options": ["家族理事會的主要工作內容為促進家族成員對家族企業之瞭解與認識", "家族理事會為家族企業之最高決策機構", "家族大會的主要目的在培養家族成員之間的感情", "家族董事會通常並非因家族憲章之規定而另外成立之組織"], "ans": 1, "exp": "正解為選項4（敘述錯誤者）。家族企業之最高決策機構應為股東會或家族大會層級，「家族理事會」係執行與溝通協調機構，並非家族企業之最高決策機構，故選項2錯誤。選項1家族理事會促進家族對企業之認識、選項3家族大會培養成員感情、選項4家族董事會通常即公司既有董事會非另設組織，均屬正確敘述。"}, {"q": "有關家族辦公室的敘述，下列 /* ===== 英文發音（Web Speech API 朗讀，離線可用、免費） ===== */
let enVoice = null;
function pickEnVoice(){
  if (!('speechSynthesis' in window)) return;
  const vs = speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if ('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = pickEnVoice; pickEnVoice(); }
/* 從中英混排文字裡抽出英文片段（跳過中文與「請用英文寫」這類指示） */
function extractEN(s){
  const m = String(s).match(/[A-Za-z][A-Za-z0-9 ,.()＆&%$\/\-–—?!:]*/g);
  if (!m) return '';
  return m.map(x=>x.trim().replace(/[ ,.:]+$/,'')).filter(x=>/[A-Za-z]{2,}/.test(x)).join('. ');
}
function speakEN(text, btn){
  if (!('speechSynthesis' in window)){ alert('這個瀏覽器不支援朗讀，換 Safari 或 Chrome 開就可以聽發音囉～'); return; }
  const t = extractEN(text);
  if (!t) return;
  speechSynthesis.cancel();
  if (!enVoice) pickEnVoice();
  const u = new SpeechSynthesisUtterance(t);
  u.lang = 'en-US'; u.rate = 0.9;
  if (enVoice) u.voice = enVoice;
  if (btn){ u.onstart=()=>btn.classList.add('playing'); u.onend=u.onerror=()=>btn.classList.remove('playing'); }
  speechSynthesis.speak(u);
}
function speakCurQ(btn){ if (cur && cur.qs && cur.qs[cur.idx]) speakEN(cur.qs[cur.idx].q, btn); }

  const learned = total - remain;
  if (remain === 0){
    panel.innerHTML = `<div class="q-result"><div class="big" style="color:var(--gold)">${svgIc('award')}</div><h3>這一科的選擇題你全都會了！</h3><div class="sc">共 ${total} 題全部答對過，之後每週會自動補上新題目。</div><button class="btn btn-ghost" onclick="resetMastered('${subj}')">重新練習</button></div>`;
    return;
  }
  panel.innerHTML =
    `<div class="q-start">
       <div style="font-size:2.2rem;color:var(--primary)">${svgIc('quiz')}</div>
       <h3>${SUBJECTS[subj].name}・選擇題</h3>
       <p>每回隨機 ${Math.min(ROUND, remain)} 題，答對的會學起來、之後不再出現。<br>還沒學會 <b>${remain}</b> 題　已學會 <b>${learned}</b> 題。</p>
       <button class="btn" onclick="quizStart('${subj}')">開始作答</button>
       ${learned>0 ? `<button class="btn btn-ghost" style="margin-top:.6rem" onclick="resetMastered('${subj}')">重新練習</button>` : ''}
     </div>`;
}
function quizStart(subj){
  const pool = remainingQs(subj);
  cur = { subj, qs: shuffle(pool).slice(0, ROUND), idx: 0, score: 0, locked: false };
  quizRender();
}
function quizRender(){
  const panel = document.getElementById('panel-' + cur.subj);
  if (cur.idx >= cur.qs.length) return quizResult();
  cur.locked = false;
  const q = cur.qs[cur.idx];
  const pct = Math.round((cur.idx / cur.qs.length) * 100);
  const opts = q.options.map((o,i)=>`<button class="opt" onclick="quizAnswer(${i})">${o}</button>`).join('');
  const spk = cur.subj==='english' ? `<button class="spk-btn" onclick="speakCurQ(this)">${svgIc('speaker')} 聽發音</button>` : '';
  panel.innerHTML =
    `<div class="q-bar"><span>第 ${cur.idx+1}／${cur.qs.length} 題</span><div class="q-prog"><div style="width:${pct}%"></div></div><span>${svgIc('quiz')} ${cur.score}</span></div>
     <div class="q-card"><span class="q-tag">${SUBJECTS[cur.subj].name}</span><div class="q-text">${q.q}</div>${spk}${opts}<div class="q-fb" id="q-fb"></div></div>`;
}
function quizAnswer(i){
  if (cur.locked) return; cur.locked = true;
  const q = cur.qs[cur.idx];
  const btns = document.querySelectorAll('#panel-' + cur.subj + ' .opt');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('q-fb');
  let head;
  if (i === q.ans){ cur.score++; addMastered(cur.subj, q.q); btns[i].classList.add('correct'); fb.className='q-fb ok'; head='答對了！這題學會囉，之後不再出現'; }
  else { btns[i].classList.add('wrong'); btns[q.ans].classList.add('correct'); fb.className='q-fb no'; head='再想想～正確答案是「' + q.options[q.ans] + '」'; }
  const last = cur.idx >= cur.qs.length - 1;
  fb.innerHTML = head + (q.exp ? `<div class="q-exp">提示：${q.exp}</div>` : '') +
    `<button class="btn q-next" onclick="quizNext()">${last ? '看結果' : '下一題'}</button>`;
}
function quizNext(){ cur.idx++; quizRender(); }
function quizResult(){
  const total = cur.qs.length;
  const panel = document.getElementById('panel-' + cur.subj);
  panel.innerHTML =
    `<div class="q-result"><div class="big" style="color:var(--gold)">${cur.score===total?svgIc('award'):svgIc('book')}</div><h3>這回合完成！</h3>
       <div class="sc">答對 ${cur.score} ／ ${total} 題　${cur.score===total?'全對，太強了！':'答對的已經學會，錯的下次再練～'}</div>
       <button class="btn" onclick="quizStart('${cur.subj}')">再來一回</button>
       <button class="btn btn-ghost" style="margin-top:.6rem" onclick="quizHome('${cur.subj}')">回選擇題首頁</button>
     </div>`;
  renderProgress();
}

/* 申論題 */
function essayList(subj){
  const s = SUBJECTS[subj];
  document.getElementById('panel-' + subj).innerHTML =
    `<div class="essay-list">` +
    s.essay.map((e,i)=>`<div class="e-item" onclick="essayOpen('${subj}',${i})"><span class="e-q">${e.q}</span><span class="go">作答 ›</span></div>`).join('') +
    `</div>`;
}
function essayOpen(subj, i){
  const e = SUBJECTS[subj].essay[i];
  document.getElementById('panel-' + subj).innerHTML =
    `<span class="back-link" onclick="essayList('${subj}')">‹ 回申論題列表</span>
     <div class="essay-panel">
       <div class="e-prompt">${svgIc('prompt')} ${e.q}</div>
       <div class="e-guide">${e.guide}</div>
       <div class="essay-tools">
         ${subj==='english' ? `<button class="e-btn" onclick='speakEN(${JSON.stringify(e.q)}, this)'>${svgIc('speaker')} 聽題目發音</button>` : ''}
         <button id="micBtn" class="e-btn" onclick="toggleMic()">${svgIc('mic')} 用說的</button>
         <button class="e-btn" onclick="document.getElementById('essayInput').value='';document.getElementById('essay-feedback').innerHTML=''">${svgIc('clear')} 清空</button>
       </div>
       <textarea id="essayInput" class="essay-input" placeholder="把你的答案寫在這裡，或按「用說的」…"></textarea>
       <button class="btn btn-gold" style="width:100%;margin-top:.6rem" onclick='gradeEssay(${JSON.stringify(e.q)}, ${JSON.stringify(e.guide)})'>送出給 AI 評改</button>
       <div id="essay-feedback"></div>
     </div>`;
}

/* 麥克風（Web Speech API zh-TW；不支援時提示用鍵盤麥克風） */
let recog = null;
function toggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('micBtn');
  if (!SR){ alert('這個裝置可用鍵盤上的麥克風輸入：點一下輸入框，鍵盤就會出現麥克風。'); return; }
  if (recog){ recog.stop(); return; }
  recog = new SR(); recog.lang='zh-TW'; recog.continuous=true; recog.interimResults=false;
  recog.onresult = e => { let t=''; for(let k=e.resultIndex;k<e.results.length;k++){ if(e.results[k].isFinal) t+=e.results[k][0].transcript; } if(t){ document.getElementById('essayInput').value += t; } };
  const reset=()=>{ recog=null; btn.classList.remove('rec'); btn.innerHTML=svgIc('mic')+' 用說的'; };
  recog.onend=reset; recog.onerror=reset;
  try { recog.start(); btn.classList.add('rec'); btn.innerHTML=svgIc('mic')+' 停止錄音'; } catch(e){ reset(); }
}
function fmtFb(s){ return String(s).replace(/[<>]/g,c=>c==='<'?'&lt;':'&gt;').replace(/^#{1,4}\s*(.+)$/gm,'<h4>$1</h4>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>'); }
const GRADER_API = 'https://ziyu-chat.iriswen518.workers.dev';
async function gradeEssay(question, guide){
  const text = (document.getElementById('essayInput').value || '').trim();
  const box = document.getElementById('essay-feedback');
  if (!text){ box.innerHTML = '<div class="essay-fb">先寫下你的答案，AI 才能給你回饋喔～</div>'; return; }
  box.innerHTML = '<div class="essay-fb">AI 正在評改你的答案…</div>';
  const q = '請評改我的申論作答。\n【題目】' + question + '\n【評分重點】' + guide + '\n【我的作答】' + text;
  try {
    const r = await fetch(GRADER_API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ bot:'xuexi', q, history:[] }) });
    const d = await r.json();
    box.innerHTML = '<div class="essay-fb">' + fmtFb(d && d.reply ? d.reply : '網路好像不太順，等一下再送一次好嗎？') + '</div>';
  } catch(e){ box.innerHTML = '<div class="essay-fb">網路好像不太順，等一下再按一次「送出給 AI 評改」好嗎？</div>'; }
}

/* 進度 */
function renderProgress(){
  document.getElementById('prog-list').innerHTML = Object.keys(SUBJECTS).map(subj => {
    const s = SUBJECTS[subj]; const total = s.choice.length; const learned = total - remainingQs(subj).length;
    const pct = total ? Math.round(learned/total*100) : 0;
    return `<div class="prog-card"><div class="pt"><span>${svgIc(subj)} ${s.name}</span><span>${learned}／${total}</span></div>
      <div class="prog-bar"><div style="width:${pct}%"></div></div>
      <div class="prog-sub">選擇題已學會 ${learned} 題，還有 ${total-learned} 題　·　申論題 ${s.essay.length} 題可練習</div></div>`;
  }).join('');
}

/* nav */
document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (!btn) return;
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(btn.dataset.tab).classList.add('active');
  if (btn.dataset.tab === 'progress') renderProgress();
  document.getElementById('page-scroll').scrollTop = 0;
});

Object.keys(SUBJECTS).forEach(renderSubject);
renderProgress();

/* ================= 路上聊聊（接 AI，連不上給溫柔提示） ================= */
const LU_API_URL = 'https://ziyu-chat.iriswen518.workers.dev';
let luHistory = [], luStarted = false;
function toggleLu(){
  const pop = document.getElementById('luPop');
  const open = pop.classList.toggle('show');
  if (open && !luStarted){
    luStarted = true;
    luAppend('ai', '哈囉！我是小路！\n在市場分析、財富傳承、英文的學習路上，有問題都可以問我，或想聊聊思路也行～');
  }
  if (open) setTimeout(function(){ const i=document.getElementById('luInput'); if(i) i.focus(); }, 100);
}
let luRecog = null;
function toggleLuMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('luMic');
  const input = document.getElementById('luInput');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS || !SR){
    if (input) input.focus();
    luAppend('ai', '在 iPad／iPhone 上，點一下下面的打字框，鍵盤右下角會有一個麥克風，按住它就能用說的囉～說完會自動變成文字。');
    return;
  }
  if (luRecog){ luRecog.stop(); return; }
  luRecog = new SR(); luRecog.lang='zh-TW'; luRecog.continuous=false; luRecog.interimResults=false;
  luRecog.onresult = function(e){ let t=''; for(let k=e.resultIndex;k<e.results.length;k++){ if(e.results[k].isFinal) t+=e.results[k][0].transcript; } if(t && input){ input.value += t; input.focus(); } };
  const reset = function(){ luRecog=null; if(btn){ btn.classList.remove('rec'); } };
  luRecog.onend = reset;
  luRecog.onerror = function(e){
    if (e && e.error === 'not-allowed') luAppend('ai', '要用說的，得先讓瀏覽器使用麥克風喔～請按網址列的鎖頭圖示，把「麥克風」設成允許，再試一次。');
    else if (e && e.error === 'no-speech') luAppend('ai', '我好像沒聽到聲音耶，靠近一點大聲說一次好嗎？');
    reset();
  };
  try { luRecog.start(); btn.classList.add('rec'); } catch(e){ reset(); }
}
function luAppend(who, text){
  const box = document.getElementById('luMsgs');
  const row = document.createElement('div'); row.className = 'lp-row ' + (who==='me'?'me':'ai');
  const b = document.createElement('div'); b.className = 'lp-bubble ' + (who==='me'?'me':'ai');
  b.textContent = text;
  row.appendChild(b); box.appendChild(row); box.scrollTop = box.scrollHeight;
}
function luTyping(on){
  const box = document.getElementById('luMsgs');
  let t = document.getElementById('luTypingRow');
  if (on){
    if (t) return;
    const row = document.createElement('div'); row.className='lp-row ai'; row.id='luTypingRow';
    row.innerHTML = '<div class="lp-typing"><span></span><span></span><span></span></div>';
    box.appendChild(row); box.scrollTop = box.scrollHeight;
  } else if (t){ t.remove(); }
}
async function sendLu(){
  const input = document.getElementById('luInput');
  const btn = document.getElementById('luSend');
  const text = (input ? input.value : '').trim();
  if (!text) return;
  input.value=''; if(btn) btn.disabled=true;
  luAppend('me', text);
  const prior = luHistory.slice(-8);
  luHistory.push({ role:'user', text: text });
  luTyping(true);
  let reply = '';
  try {
    const ctrl = new AbortController();
    const to = setTimeout(function(){ ctrl.abort(); }, 20000);
    const r = await fetch(LU_API_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ bot:'xuexi', q: text, history: prior }), signal: ctrl.signal,
    });
    clearTimeout(to);
    const data = await r.json();
    if (data && data.reply) reply = data.reply;
  } catch(e){ /* 網路問題 */ }
  luTyping(false);
  if (!reply) reply = '嗚，我這邊網路好像不太順，等一下再問我一次好嗎？';
  luAppend('ai', reply);
  luHistory.push({ role:'assistant', text: reply });
  if (btn) btn.disabled=false;
  if (input) input.focus();
}
</script>

<!-- 路上聊聊 -->
<button class="lu-fab" id="luFab" onclick="toggleLu()">
  <span class="avatar"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></span>路上聊聊
</button>
<div class="lu-pop" id="luPop">
  <div class="lp-head">
    <span class="avatar"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></span>
    <span class="who">小路<small>學習路上的小夥伴</small></span>
    <button class="x" onclick="toggleLu()" aria-label="關閉">×</button>
  </div>
  <div class="lp-msgs" id="luMsgs"></div>
  <div class="lp-in">
    <button id="luMic" class="lp-mic" onclick="toggleLuMic()" aria-label="用說的"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/><path d="M8 21h8"/></svg></button>
    <input id="luInput" type="text" placeholder="打字，或按左邊麥克風用說的～" onkeydown="if(event.key==='Enter')sendLu()">
    <button id="luSend" onclick="sendLu()">送出</button>
  </div>
</div>
